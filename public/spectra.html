<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SPECTRA — cbay</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0a0a14;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #b0d0e0;
      -webkit-user-select: none;
      user-select: none;
      touch-action: manipulation;
    }

    #app {
      display: flex;
      flex-direction: column;
      width: 100%; height: 100%;
      height: 100dvh;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 44px;
      padding: 0 12px;
      background: rgba(10, 10, 20, 0.92);
      border-bottom: 1px solid #1e1e3a;
      position: relative;
      z-index: 10;
      flex-shrink: 0;
    }

    .topbar a {
      color: #00E5FF;
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 2px;
    }

    .topbar .title {
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #8888aa;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-weight: 600;
    }

    .topbar .controls {
      display: flex;
      gap: 8px;
    }

    .topbar button {
      background: none;
      border: 1px solid #1e1e3a;
      border-radius: 8px;
      color: #b0d0e0;
      width: 32px; height: 32px;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
      transition: border-color 0.2s, background 0.2s;
    }

    .topbar button:active {
      background: rgba(0, 229, 255, 0.15);
      border-color: #00E5FF;
    }

    /* ── Viewport ── */
    .viewport {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #000;
    }

    canvas {
      width: 100%; height: 100%;
      display: block;
    }

    /* ── Bottom bar ── */
    .bottombar {
      background: rgba(10, 10, 20, 0.95);
      border-top: 1px solid #1e1e3a;
      padding: 10px 12px 14px;
      position: relative;
      z-index: 10;
      flex-shrink: 0;
    }

    .modes {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-bottom: 8px;
    }

    .modes button {
      background: rgba(255,255,255,0.03);
      border: 1px solid #1e1e3a;
      border-radius: 8px;
      color: #8888aa;
      padding: 8px 12px;
      font-family: inherit;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      min-width: 48px;
    }

    .modes button.active {
      border-color: #00E5FF;
      color: #00E5FF;
      background: rgba(0, 229, 255, 0.08);
    }

    .modes button:active {
      background: rgba(0, 229, 255, 0.15);
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .slider-row.hidden { display: none; }

    .slider-label {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #8888aa;
      min-width: 40px;
    }

    input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 2px;
      background: #1e1e3a;
      outline: none;
      border-radius: 1px;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      background: #00E5FF;
      border-radius: 50%;
      cursor: pointer;
    }

    input[type="range"]::-moz-range-thumb {
      width: 14px; height: 14px;
      background: #00E5FF;
      border-radius: 50%;
      border: none;
      cursor: pointer;
    }

    /* ── Overlay ── */
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      background: #0a0a14;
      z-index: 5;
    }

    .overlay p {
      font-size: 11px;
      letter-spacing: 2px;
      color: #8888aa;
      text-align: center;
      max-width: 280px;
      line-height: 1.8;
    }

    .overlay .error { color: #ff4466; }

    .overlay button {
      background: none;
      border: 1px solid #00E5FF;
      border-radius: 8px;
      color: #00E5FF;
      padding: 10px 24px;
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
    }

    .overlay button:active {
      background: rgba(0, 229, 255, 0.15);
    }

    /* ── Mode indicator HUD ── */
    .hud {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 4;
      pointer-events: none;
    }

    .hud-mode {
      font-size: 9px;
      letter-spacing: 3px;
      color: rgba(0, 229, 255, 0.5);
      text-transform: uppercase;
    }

    .hud-fps {
      font-size: 8px;
      letter-spacing: 1px;
      color: rgba(136, 136, 170, 0.4);
      margin-top: 4px;
    }

    @media (max-width: 380px) {
      .modes button { padding: 8px 8px; font-size: 9px; min-width: 40px; }
    }

    @media (env(safe-area-inset-bottom)) {
      .bottombar { padding-bottom: calc(14px + env(safe-area-inset-bottom)); }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="topbar">
      <a href="/">&larr; cbay</a>
      <span class="title">SPECTRA</span>
      <div class="controls">
        <button id="captureBtn" title="capture frame">&#x2299;</button>
        <button id="flipBtn" title="flip camera">&#x21CC;</button>
      </div>
    </div>

    <div class="viewport">
      <canvas id="gl"></canvas>
      <div class="hud">
        <div class="hud-mode" id="hudMode">NRM</div>
        <div class="hud-fps" id="hudFps"></div>
      </div>
      <div class="overlay" id="overlay">
        <p id="overlayMsg">initializing spectra...</p>
      </div>
    </div>

    <div class="bottombar">
      <div class="modes" id="modes">
        <button class="active" data-mode="0">NRM</button>
        <button data-mode="1">NV</button>
        <button data-mode="2">THM</button>
        <button data-mode="3">EDG</button>
        <button data-mode="4">MOT</button>
      </div>
      <div class="slider-row hidden" id="sliderRow">
        <span class="slider-label" id="sliderLabel">GAIN</span>
        <input type="range" id="gainSlider" min="0" max="100" value="50">
      </div>
    </div>
  </div>

  <script>
    (function() {
      'use strict';

      // ═══════════════════════════════════════════════
      // SPECTRA — computational vision engine
      // ═══════════════════════════════════════════════

      var canvas = document.getElementById('gl');
      var overlay = document.getElementById('overlay');
      var overlayMsg = document.getElementById('overlayMsg');
      var sliderRow = document.getElementById('sliderRow');
      var sliderLabel = document.getElementById('sliderLabel');
      var gainSlider = document.getElementById('gainSlider');
      var captureBtn = document.getElementById('captureBtn');
      var flipBtn = document.getElementById('flipBtn');
      var modeButtons = document.querySelectorAll('#modes button');
      var hudMode = document.getElementById('hudMode');
      var hudFps = document.getElementById('hudFps');

      var MODE_NAMES = ['NRM', 'NV', 'THM', 'EDG', 'MOT'];
      var SLIDER_LABELS = ['', 'GAIN', 'GAIN', 'GAIN', 'SENS'];

      var currentMode = 0;
      var gain = 0.5;
      var useFront = false;
      var video = null;
      var stream = null;
      var gl = null;
      var program = null;
      var uniforms = {};
      var cameraTextures = [];
      var frameIdx = 0;
      var running = false;
      var needCapture = false;
      var firstFrame = true;

      // FPS counter
      var fpsFrames = 0;
      var fpsTime = performance.now();

      // ── Shader sources ──

      var VERT = [
        'attribute vec2 aPosition;',
        'varying vec2 vUv;',
        'void main() {',
        '  vUv = aPosition * 0.5 + 0.5;',
        '  gl_Position = vec4(aPosition, 0.0, 1.0);',
        '}'
      ].join('\n');

      var FRAG = [
        '#ifdef GL_FRAGMENT_PRECISION_HIGH',
        '  precision highp float;',
        '#else',
        '  precision mediump float;',
        '#endif',
        '',
        'varying vec2 vUv;',
        'uniform sampler2D uCamera;',
        'uniform sampler2D uPrevFrame;',
        'uniform int uMode;',
        'uniform float uTime;',
        'uniform vec2 uResolution;',
        'uniform vec2 uVideoSize;',
        'uniform float uGain;',
        'uniform float uMirror;',
        '',
        'vec2 adjustUv(vec2 uv) {',
        '  if (uMirror > 0.5) uv.x = 1.0 - uv.x;',
        '  uv.y = 1.0 - uv.y;',
        '  float va = uVideoSize.x / uVideoSize.y;',
        '  float ca = uResolution.x / uResolution.y;',
        '  if (ca > va) {',
        '    float s = va / ca;',
        '    uv.y = uv.y * s + (1.0 - s) * 0.5;',
        '  } else {',
        '    float s = ca / va;',
        '    uv.x = uv.x * s + (1.0 - s) * 0.5;',
        '  }',
        '  return uv;',
        '}',
        '',
        'float lum(vec3 c) { return dot(c, vec3(0.299, 0.587, 0.114)); }',
        '',
        'float rand(vec2 co) {',
        '  return fract(sin(dot(co, vec2(12.9898, 78.233))) * 43758.5453);',
        '}',
        '',
        '// IRONBOW thermal palette',
        'vec3 thermal(float t) {',
        '  t = clamp(t, 0.0, 1.0);',
        '  if (t < 0.14) return mix(vec3(0.0), vec3(0.0, 0.0, 0.36), t / 0.14);',
        '  if (t < 0.28) return mix(vec3(0.0, 0.0, 0.36), vec3(0.45, 0.0, 0.55), (t - 0.14) / 0.14);',
        '  if (t < 0.45) return mix(vec3(0.45, 0.0, 0.55), vec3(0.85, 0.1, 0.0), (t - 0.28) / 0.17);',
        '  if (t < 0.65) return mix(vec3(0.85, 0.1, 0.0), vec3(1.0, 0.55, 0.0), (t - 0.45) / 0.20);',
        '  if (t < 0.82) return mix(vec3(1.0, 0.55, 0.0), vec3(1.0, 1.0, 0.0), (t - 0.65) / 0.17);',
        '  return mix(vec3(1.0, 1.0, 0.0), vec3(1.0, 1.0, 1.0), (t - 0.82) / 0.18);',
        '}',
        '',
        'void main() {',
        '  vec2 uv = adjustUv(vUv);',
        '',
        '  if (uv.x < 0.0 || uv.x > 1.0 || uv.y < 0.0 || uv.y > 1.0) {',
        '    gl_FragColor = vec4(0.0, 0.0, 0.0, 1.0);',
        '    return;',
        '  }',
        '',
        '  vec4 color = texture2D(uCamera, uv);',
        '  float g = 0.5 + uGain * 4.5;',
        '',
        '  if (uMode == 0) {',
        '    // ── NORMAL ──',
        '    gl_FragColor = color;',
        '',
        '  } else if (uMode == 1) {',
        '    // ── NIGHT VISION (low-light amplified) ──',
        '    vec2 tx = 1.0 / uVideoSize;',
        '    // Temporal denoise: blend with previous frame',
        '    vec3 prev = texture2D(uPrevFrame, uv).rgb;',
        '    vec3 acc = mix(color.rgb, prev, 0.5);',
        '    // Spatial denoise: 5-tap cross filter',
        '    vec3 n1 = texture2D(uCamera, uv + vec2(-tx.x, 0.0)).rgb;',
        '    vec3 n2 = texture2D(uCamera, uv + vec2( tx.x, 0.0)).rgb;',
        '    vec3 n3 = texture2D(uCamera, uv + vec2(0.0, -tx.y)).rgb;',
        '    vec3 n4 = texture2D(uCamera, uv + vec2(0.0,  tx.y)).rgb;',
        '    acc = acc * 0.5 + (n1 + n2 + n3 + n4) * 0.125;',
        '    float l = lum(acc);',
        '    // Aggressive gamma boost',
        '    l = pow(l, 1.0 / g);',
        '    // Contrast stretch — expand usable range',
        '    l = smoothstep(0.015, 0.85, l);',
        '    vec3 nv = vec3(l * 0.15, l, l * 0.18);',
        '    // Subdued grain — less noise at high gain',
        '    float noise = rand(uv * uResolution + uTime) * 0.025;',
        '    nv += noise * vec3(0.08, 0.4, 0.08);',
        '    float dist = length(vUv - 0.5) * 1.5;',
        '    nv *= smoothstep(1.0, 0.3, dist);',
        '    nv *= 0.95 + 0.05 * sin(vUv.y * uResolution.y * 1.5);',
        '    gl_FragColor = vec4(nv, 1.0);',
        '',
        '  } else if (uMode == 2) {',
        '    // ── THERMAL (low-light boosted) ──',
        '    vec3 prev = texture2D(uPrevFrame, uv).rgb;',
        '    vec3 acc = mix(color.rgb, prev, 0.4);',
        '    float l = lum(acc);',
        '    l = pow(l, 1.0 / g);',
        '    l = smoothstep(0.01, 0.9, l);',
        '    gl_FragColor = vec4(thermal(l), 1.0);',
        '',
        '  } else if (uMode == 3) {',
        '    // ── EDGE DETECTION (low-light boosted) ──',
        '    vec2 tx = 1.0 / uVideoSize;',
        '    float invG = 1.0 / g;',
        '    // Pre-boost samples with gamma before Sobel — reveals edges in darkness',
        '    float tl = pow(lum(texture2D(uCamera, uv + vec2(-tx.x, tx.y)).rgb), invG);',
        '    float tc = pow(lum(texture2D(uCamera, uv + vec2(0.0, tx.y)).rgb), invG);',
        '    float tr = pow(lum(texture2D(uCamera, uv + vec2(tx.x, tx.y)).rgb), invG);',
        '    float ml = pow(lum(texture2D(uCamera, uv + vec2(-tx.x, 0.0)).rgb), invG);',
        '    float mr = pow(lum(texture2D(uCamera, uv + vec2(tx.x, 0.0)).rgb), invG);',
        '    float bl = pow(lum(texture2D(uCamera, uv + vec2(-tx.x, -tx.y)).rgb), invG);',
        '    float bc = pow(lum(texture2D(uCamera, uv + vec2(0.0, -tx.y)).rgb), invG);',
        '    float br = pow(lum(texture2D(uCamera, uv + vec2(tx.x, -tx.y)).rgb), invG);',
        '    float gx = -tl - 2.0*ml - bl + tr + 2.0*mr + br;',
        '    float gy = -tl - 2.0*tc - tr + bl + 2.0*bc + br;',
        '    float edge = sqrt(gx*gx + gy*gy) * 2.5;',
        '    gl_FragColor = vec4(edge * 0.15, edge, edge * 0.2, 1.0);',
        '',
        '  } else if (uMode == 4) {',
        '    // ── MOTION DETECTION (low-light boosted) ──',
        '    vec4 prev = texture2D(uPrevFrame, uv);',
        '    float invG = 1.0 / g;',
        '    // Gamma-boost both frames before diff — reveals motion in darkness',
        '    vec3 curB = pow(color.rgb, vec3(invG));',
        '    vec3 prevB = pow(prev.rgb, vec3(invG));',
        '    vec3 diff = abs(curB - prevB);',
        '    float motion = lum(diff) * 3.0;',
        '    motion = smoothstep(0.02, 0.15, motion);',
        '    vec3 mc = vec3(motion, motion * 0.4, motion * 0.1);',
        '    gl_FragColor = vec4(curB * 0.15 + mc, 1.0);',
        '  }',
        '}'
      ].join('\n');

      // ── WebGL Setup ──

      function compileShader(type, src) {
        var s = gl.createShader(type);
        gl.shaderSource(s, src);
        gl.compileShader(s);
        if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
          var log = gl.getShaderInfoLog(s);
          gl.deleteShader(s);
          return null;
        }
        return s;
      }

      function initGL() {
        gl = canvas.getContext('webgl', {
          premultipliedAlpha: false,
          preserveDrawingBuffer: true,
          antialias: false,
          alpha: false,
        });

        if (!gl) {
          showError('webgl not supported');
          return false;
        }

        var vs = compileShader(gl.VERTEX_SHADER, VERT);
        var fs = compileShader(gl.FRAGMENT_SHADER, FRAG);
        if (!vs || !fs) {
          showError('shader compilation failed');
          return false;
        }

        program = gl.createProgram();
        gl.attachShader(program, vs);
        gl.attachShader(program, fs);
        gl.linkProgram(program);
        if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
          showError('shader link failed');
          return false;
        }

        gl.useProgram(program);

        // Cache uniform locations
        ['uCamera', 'uPrevFrame', 'uMode', 'uTime',
         'uResolution', 'uVideoSize', 'uGain', 'uMirror'].forEach(function(name) {
          uniforms[name] = gl.getUniformLocation(program, name);
        });

        // Fullscreen quad
        var quad = new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]);
        var buf = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buf);
        gl.bufferData(gl.ARRAY_BUFFER, quad, gl.STATIC_DRAW);

        var aPos = gl.getAttribLocation(program, 'aPosition');
        gl.enableVertexAttribArray(aPos);
        gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

        // Create ping-pong textures for camera frames
        for (var i = 0; i < 2; i++) {
          var tex = gl.createTexture();
          gl.bindTexture(gl.TEXTURE_2D, tex);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
          cameraTextures.push(tex);
        }

        return true;
      }

      // ── Camera ──

      function startCamera() {
        if (stream) {
          stream.getTracks().forEach(function(t) { t.stop(); });
        }

        var constraints = {
          video: {
            facingMode: useFront ? 'user' : 'environment',
            width: { ideal: 1920 },
            height: { ideal: 1080 },
          },
          audio: false,
        };

        return navigator.mediaDevices.getUserMedia(constraints)
        .catch(function() {
          // Fallback: drop facingMode constraint (desktop may not support 'environment')
          return navigator.mediaDevices.getUserMedia({ video: { width: { ideal: 1920 }, height: { ideal: 1080 } }, audio: false });
        }).then(function(s) {
          stream = s;

          // Try to boost camera exposure for low light
          var track = stream.getVideoTracks()[0];
          if (track && track.getCapabilities && track.applyConstraints) {
            var caps = track.getCapabilities();
            var adv = [];
            if (caps.exposureCompensation) {
              adv.push({ exposureCompensation: caps.exposureCompensation.max });
            }
            if (caps.exposureMode) {
              adv.push({ exposureMode: 'continuous' });
            }
            if (adv.length > 0) {
              track.applyConstraints({ advanced: adv }).catch(function() {});
            }
          }

          if (!video) {
            video = document.createElement('video');
            video.setAttribute('playsinline', '');
            video.setAttribute('autoplay', '');
            video.muted = true;
          }

          video.srcObject = stream;
          return video.play();
        }).then(function() {
          firstFrame = true;
          overlay.style.display = 'none';
          return true;
        }).catch(function(err) {
          if (err.name === 'NotAllowedError') {
            showError('camera access denied');
          } else if (err.name === 'NotFoundError') {
            showError('no camera found');
          } else if (err.name === 'NotReadableError') {
            showError('camera in use by another app');
          } else {
            showError('camera error');
          }
          return false;
        });
      }

      function showError(msg) {
        overlayMsg.textContent = msg;
        overlayMsg.className = 'error';

        // Add retry button if not already there
        var existing = overlay.querySelector('button');
        if (!existing) {
          var btn = document.createElement('button');
          btn.textContent = 'retry';
          btn.addEventListener('pointerdown', function(e) {
            e.preventDefault();
            overlayMsg.textContent = 'requesting camera...';
            overlayMsg.className = '';
            btn.remove();
            startCamera().then(function(ok) {
              if (ok) {
                running = true;
                render();
              }
            });
          });
          overlay.appendChild(btn);
        }

        overlay.style.display = 'flex';
      }

      // ── Resize ──

      function resize() {
        var dpr = Math.min(window.devicePixelRatio || 1, 2);
        var rect = canvas.getBoundingClientRect();
        canvas.width = Math.round(rect.width * dpr);
        canvas.height = Math.round(rect.height * dpr);
        if (gl) gl.viewport(0, 0, canvas.width, canvas.height);
      }

      // ── Render Loop ──

      var time = 0;

      function render() {
        if (!running) return;

        requestAnimationFrame(render);

        if (!video || video.readyState < 2) return;

        time += 0.016;

        var currentTex = cameraTextures[frameIdx];
        var prevTex = cameraTextures[1 - frameIdx];

        // On first frame, seed both textures
        if (firstFrame) {
          for (var i = 0; i < 2; i++) {
            gl.activeTexture(gl.TEXTURE0 + i);
            gl.bindTexture(gl.TEXTURE_2D, cameraTextures[i]);
            gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, video);
          }
          firstFrame = false;
        }

        // Upload current camera frame
        gl.activeTexture(gl.TEXTURE0);
        gl.bindTexture(gl.TEXTURE_2D, currentTex);
        gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, video);

        // Bind previous frame
        gl.activeTexture(gl.TEXTURE1);
        gl.bindTexture(gl.TEXTURE_2D, prevTex);

        // Set uniforms
        gl.uniform1i(uniforms.uCamera, 0);
        gl.uniform1i(uniforms.uPrevFrame, 1);
        gl.uniform1i(uniforms.uMode, currentMode);
        gl.uniform1f(uniforms.uTime, time);
        gl.uniform2f(uniforms.uResolution, canvas.width, canvas.height);
        gl.uniform2f(uniforms.uVideoSize, video.videoWidth, video.videoHeight);
        gl.uniform1f(uniforms.uGain, gain);
        gl.uniform1f(uniforms.uMirror, useFront ? 1.0 : 0.0);

        // Draw
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

        // Capture if requested
        if (needCapture) {
          needCapture = false;
          canvas.toBlob(function(blob) {
            if (!blob) return;
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = 'spectra-' + MODE_NAMES[currentMode].toLowerCase() + '-' + Date.now() + '.png';
            a.click();
            setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
          }, 'image/png');
        }

        // Swap ping-pong index
        frameIdx = 1 - frameIdx;

        // FPS
        fpsFrames++;
        var now = performance.now();
        if (now - fpsTime >= 1000) {
          hudFps.textContent = fpsFrames + ' fps';
          fpsFrames = 0;
          fpsTime = now;
        }
      }

      // ── Event Handlers ──

      function setMode(mode) {
        currentMode = mode;
        hudMode.textContent = MODE_NAMES[mode];
        for (var i = 0; i < modeButtons.length; i++) {
          if (parseInt(modeButtons[i].getAttribute('data-mode'), 10) === mode) {
            modeButtons[i].classList.add('active');
            modeButtons[i].style.borderColor = '#6a8a4a';
          } else {
            modeButtons[i].classList.remove('active');
            modeButtons[i].style.borderColor = '';
          }
        }
        if (mode === 0) {
          sliderRow.classList.add('hidden');
        } else {
          sliderRow.classList.remove('hidden');
          sliderLabel.textContent = SLIDER_LABELS[mode];
        }
      }

      for (var i = 0; i < modeButtons.length; i++) {
        (function(btn) {
          btn.addEventListener('pointerdown', function(e) {
            e.preventDefault();
            setMode(parseInt(btn.getAttribute('data-mode'), 10));
          });
        })(modeButtons[i]);
      }

      gainSlider.addEventListener('input', function() {
        gain = gainSlider.value / 100;
      });

      flipBtn.addEventListener('pointerdown', function(e) {
        e.preventDefault();
        useFront = !useFront;
        startCamera();
      });

      captureBtn.addEventListener('pointerdown', function(e) {
        e.preventDefault();
        needCapture = true;
      });

      window.addEventListener('resize', resize);

      // ── Initialize ──

      resize();

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        showError('camera api not available — use https');
      } else if (initGL()) {
        overlayMsg.textContent = 'SPECTRA';
        overlayMsg.className = '';
        var startBtn = document.createElement('button');
        startBtn.textContent = 'enable camera';
        startBtn.addEventListener('pointerdown', function(e) {
          e.preventDefault();
          startBtn.remove();
          overlayMsg.textContent = 'requesting camera...';
          startCamera().then(function(ok) {
            if (ok) {
              running = true;
              render();
            }
          });
        });
        overlay.appendChild(startBtn);
      } else {
        showError('webgl init failed');
      }

    })();
  </script>
</body>
</html>
