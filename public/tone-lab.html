<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TONE LAB — cbay</title>
  <link rel="manifest" href="data:application/json,%7B%22name%22%3A%22TONE%20LAB%22%2C%22short_name%22%3A%22TONE%20LAB%22%2C%22start_url%22%3A%22%2Ftone-lab%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%230a0a14%22%2C%22theme_color%22%3A%22%23FFD600%22%7D">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a14">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden;background:#0a0a14;font-family:system-ui,-apple-system,sans-serif;color:#b0c8d0;-webkit-user-select:none;user-select:none;touch-action:manipulation}
    #app{display:flex;flex-direction:column;width:100%;height:100%;height:100dvh}

    .topbar{display:flex;align-items:center;justify-content:space-between;height:40px;padding:0 12px;background:rgba(10,10,20,.92);border-bottom:1px solid #1e1e3a;flex-shrink:0;z-index:10;position:relative}
    .topbar a{color:#FFD600;text-decoration:none;font-size:11px;letter-spacing:2px}
    .topbar .title{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:#8888aa;position:absolute;left:50%;transform:translateX(-50%);font-weight:600}

    .main{flex:1;display:flex;flex-direction:column;padding:8px;gap:6px;overflow-y:auto}

    /* Category tabs */
    .cat-tabs{display:flex;gap:3px}
    .cat-tabs button{font-family:inherit;font-size:7px;letter-spacing:1.5px;text-transform:uppercase;padding:5px 8px;border-radius:6px;border:1px solid #1e1e3a;background:rgba(255,255,255,.02);color:#666;cursor:pointer;transition:all .2s;flex:1}
    .cat-tabs button.active{background:rgba(255,214,0,.1);border-color:rgba(255,214,0,.3);color:#FFD600}

    /* Pad grid */
    .pad-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
    .pad{aspect-ratio:1;border-radius:10px;border:1px solid #1e1e3a;background:rgba(255,255,255,.02);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .12s;-webkit-tap-highlight-color:transparent}
    .pad:active,.pad.playing{background:rgba(255,214,0,.12);border-color:rgba(255,214,0,.35);transform:scale(0.96)}
    .pad-name{font-size:8px;letter-spacing:1px;color:#999;text-transform:uppercase;font-weight:600}
    .pad-freq{font-size:7px;color:#444;margin-top:2px}

    /* FX */
    .fx-panel{display:flex;flex-wrap:wrap;gap:4px}
    .fx-slider{flex:1 1 48%;display:flex;align-items:center;gap:6px;min-width:0}
    .fx-label{font-size:7px;letter-spacing:1px;color:#555;text-transform:uppercase;width:50px;flex-shrink:0}
    .fx-slider input[type=range]{flex:1;-webkit-appearance:none;height:2px;border-radius:1px;background:#1e1e3a;outline:none}
    .fx-slider input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#FFD600;cursor:pointer}

    /* Sequencer */
    .seq-bar{display:flex;align-items:center;gap:4px;padding:4px 0}
    .seq-bar button{font-family:inherit;font-size:7px;letter-spacing:1.5px;padding:4px 8px;border-radius:5px;border:1px solid #1e1e3a;background:rgba(255,255,255,.02);color:#888;cursor:pointer}
    .seq-bar button.active{background:rgba(255,214,0,.1);border-color:rgba(255,214,0,.3);color:#FFD600}
    .seq-grid{display:grid;grid-template-columns:repeat(16,1fr);gap:2px}
    .seq-step{aspect-ratio:1;border-radius:4px;border:1px solid #1e1e3a;background:rgba(255,255,255,.02);cursor:pointer;transition:background .1s;min-height:14px}
    .seq-step.on{background:rgba(255,214,0,.25);border-color:rgba(255,214,0,.3)}
    .seq-step.current{box-shadow:0 0 0 1px #FFD600}
    .bpm-row{display:flex;align-items:center;gap:8px;font-size:8px;color:#555}
    .bpm-row input[type=range]{width:80px;-webkit-appearance:none;height:2px;background:#1e1e3a;border-radius:1px;outline:none}
    .bpm-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#FFD600;cursor:pointer}

    /* Volume */
    .vol-row{display:flex;align-items:center;gap:8px;padding:4px 0}
    .vol-row .fx-label{width:40px}
    .vol-row input[type=range]{flex:1;-webkit-appearance:none;height:3px;background:#1e1e3a;border-radius:2px;outline:none}
    .vol-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#FFD600;cursor:pointer}

    .info-bar{display:flex;justify-content:space-between;font-size:8px;color:#333;padding:4px 0;border-top:1px solid #1e1e3a;margin-top:auto}
  </style>
</head>
<body>
  <div id="app">
    <div class="topbar">
      <a href="/store?tier=audio">← STORE</a>
      <span class="title">TONE LAB</span>
      <span style="font-size:8px;letter-spacing:2px;color:#FFD600;" id="nowPlaying">—</span>
    </div>
    <div class="main">
      <div class="cat-tabs" id="catTabs"></div>
      <div class="pad-grid" id="padGrid"></div>

      <div class="fx-panel" id="fxPanel">
        <div class="fx-slider"><span class="fx-label">Drive</span><input type="range" min="0" max="100" value="0" data-fx="drive"></div>
        <div class="fx-slider"><span class="fx-label">Filter</span><input type="range" min="100" max="8000" value="8000" data-fx="filter"></div>
        <div class="fx-slider"><span class="fx-label">Reverb</span><input type="range" min="0" max="100" value="20" data-fx="reverb"></div>
        <div class="fx-slider"><span class="fx-label">Delay</span><input type="range" min="0" max="100" value="0" data-fx="delay"></div>
      </div>

      <div class="vol-row"><span class="fx-label">Vol</span><input type="range" min="0" max="100" value="70" id="masterVol"></div>

      <div class="seq-bar">
        <button id="seqPlay">▶ SEQ</button>
        <button id="seqClear">CLR</button>
        <div class="bpm-row">
          <span>BPM</span><input type="range" min="40" max="300" value="120" id="bpmSlider"><span id="bpmVal">120</span>
        </div>
      </div>
      <div class="seq-grid" id="seqGrid"></div>

      <div class="info-bar"><span id="statusText">Ready</span><span>cbay.ing/tone-lab</span></div>
    </div>
  </div>

<script>
(function(){
  // ── Pad definitions ──
  var CATS = [
    { name: 'Solfeggio', pads: [
      {n:'UT',f:174},{n:'RE',f:285},{n:'MI',f:396},{n:'FA',f:417},
      {n:'SOL',f:528},{n:'LA',f:639},{n:'TI',f:741},{n:'SI',f:852}
    ]},
    { name: 'Chant', pads: [
      {n:'OM',f:136.1},{n:'AUM',f:432},{n:'HU',f:594},{n:'RAM',f:315},
      {n:'YAM',f:341},{n:'LAM',f:256}
    ]},
    { name: 'Binaural', pads: [
      {n:'Schumann',f:7.83},{n:'Alpha',f:10},{n:'Beta',f:20},{n:'Gamma',f:40},
      {n:'Delta',f:2},{n:'Theta',f:6}
    ]},
    { name: 'Noise', pads: [
      {n:'White',f:0,t:'white'},{n:'Pink',f:0,t:'pink'},{n:'Brown',f:0,t:'brown'},
      {n:'Rain',f:0,t:'rain'},{n:'Wind',f:0,t:'wind'},{n:'Static',f:0,t:'static'}
    ]},
    { name: 'Ultra', pads: [
      {n:'15k',f:15000},{n:'16k',f:16000},{n:'17k',f:17000},{n:'18k',f:18000},
      {n:'19k',f:19000},{n:'20k',f:20000}
    ]}
  ];

  var ctx = null, masterGain = null, dryGain = null, wetGain = null, delayNode = null, delayFb = null, filter = null, reverbGain = null, convolver = null;
  var currentCat = 0;
  var activePads = {}; // key: padIndex -> { nodes }
  var seqSteps = new Array(16).fill(-1); // pad index or -1
  var seqPlaying = false, seqPos = 0, seqTimer = null, bpm = 120;
  var fxDrive = 0, fxFilter = 8000, fxReverb = 0.2, fxDelay = 0;

  function initAudio() {
    if (ctx) return;
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = ctx.createGain();
    masterGain.gain.value = 0.7;

    // Effects chain: filter → convolver(reverb) → delay → masterGain → dest
    filter = ctx.createBiquadFilter();
    filter.type = 'lowpass'; filter.frequency.value = 8000; filter.Q.value = 0.707;

    // Reverb (simple convolution)
    convolver = ctx.createConvolver();
    var irLen = ctx.sampleRate * 3;
    var irBuf = ctx.createBuffer(1, irLen, ctx.sampleRate);
    var d = irBuf.getChannelData(0);
    for (var i = 0; i < irLen; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / irLen, 3);
    convolver.buffer = irBuf;
    dryGain = ctx.createGain(); dryGain.gain.value = 0.8;
    reverbGain = ctx.createGain(); reverbGain.gain.value = 0.2;

    // Delay
    delayNode = ctx.createDelay(2);
    delayNode.delayTime.value = 0;
    delayFb = ctx.createGain();
    delayFb.gain.value = 0.4;
    delayNode.connect(delayFb);
    delayFb.connect(delayNode);

    // Routing: filter → dry → masterGain, filter → convolver → reverbGain → masterGain, filter → delay → masterGain
    filter.connect(dryGain);
    dryGain.connect(masterGain);
    filter.connect(convolver);
    convolver.connect(reverbGain);
    reverbGain.connect(masterGain);
    filter.connect(delayNode);
    delayNode.connect(masterGain);
    masterGain.connect(ctx.destination);
  }

  function createWaveshaper(amount) {
    if (amount < 0.01) return null;
    var ws = ctx.createWaveShaper();
    var k = 2 * amount / (1 - amount + 0.001);
    var n = 44100, curve = new Float32Array(n);
    for (var i = 0; i < n; i++) {
      var x = i * 2 / n - 1;
      curve[i] = (1 + k) * x / (1 + k * Math.abs(x));
    }
    ws.curve = curve;
    ws.oversample = '2x';
    return ws;
  }

  // ── Play a pad ──
  function playPad(catIdx, padIdx) {
    initAudio();
    var pad = CATS[catIdx].pads[padIdx];
    var key = catIdx + '_' + padIdx;
    if (activePads[key]) { stopPad(key); return; }

    var nodes = [];
    var outGain = ctx.createGain();
    outGain.gain.value = 1;

    if (pad.t) {
      // Noise types
      var buf = 4096;
      var proc = ctx.createScriptProcessor(buf, 0, 1);
      if (pad.t === 'white') {
        proc.onaudioprocess = function(e) { var o = e.outputBuffer.getChannelData(0); for (var i=0;i<buf;i++) o[i] = Math.random()*2-1; };
      } else if (pad.t === 'pink') {
        var b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
        proc.onaudioprocess = function(e) {
          var o = e.outputBuffer.getChannelData(0);
          for (var i=0;i<buf;i++) {
            var w = Math.random()*2-1;
            b0=0.99886*b0+w*0.0555179;b1=0.99332*b1+w*0.0750759;b2=0.969*b2+w*0.153852;
            b3=0.8665*b3+w*0.3104856;b4=0.55*b4+w*0.5329522;b5=-0.7616*b5-w*0.0168980;
            o[i]=(b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.11;b6=w*0.115926;
          }
        };
      } else if (pad.t === 'brown') {
        var last = 0;
        proc.onaudioprocess = function(e) {
          var o = e.outputBuffer.getChannelData(0);
          for (var i=0;i<buf;i++) { last = (last + Math.random()*0.2-0.1)*0.998; o[i] = last * 3.5; }
        };
      } else if (pad.t === 'rain') {
        proc.onaudioprocess = function(e) {
          var o = e.outputBuffer.getChannelData(0);
          for (var i=0;i<buf;i++) o[i] = (Math.random()*2-1) * (Math.random() < 0.03 ? 0.8 : 0.05);
        };
      } else if (pad.t === 'wind') {
        var wlast = 0;
        proc.onaudioprocess = function(e) {
          var o = e.outputBuffer.getChannelData(0);
          for (var i=0;i<buf;i++) { wlast = wlast*0.995 + (Math.random()*2-1)*0.15; o[i] = wlast; }
        };
      } else { // static
        proc.onaudioprocess = function(e) {
          var o = e.outputBuffer.getChannelData(0);
          for (var i=0;i<buf;i++) o[i] = Math.random() < 0.4 ? (Math.random()*2-1)*0.6 : 0;
        };
      }
      proc.connect(outGain);
      nodes.push(proc);
    } else if (catIdx === 2) {
      // Binaural: base 200Hz carrier, beat freq = pad.f
      var merger = ctx.createChannelMerger(2);
      var oL = ctx.createOscillator(); oL.type = 'sine'; oL.frequency.value = 200;
      var oR = ctx.createOscillator(); oR.type = 'sine'; oR.frequency.value = 200 + pad.f;
      oL.connect(merger, 0, 0); oR.connect(merger, 0, 1);
      merger.connect(outGain);
      oL.start(); oR.start();
      nodes.push(oL, oR, merger);
    } else {
      // Tone oscillator
      var osc = ctx.createOscillator();
      osc.type = 'sine'; osc.frequency.value = pad.f;
      osc.connect(outGain);
      osc.start();
      nodes.push(osc);
    }

    // Optional waveshaper
    var ws = createWaveshaper(fxDrive);
    if (ws) {
      outGain.connect(ws); ws.connect(filter);
      nodes.push(ws);
    } else {
      outGain.connect(filter);
    }
    nodes.push(outGain);
    activePads[key] = { nodes: nodes };

    document.getElementById('nowPlaying').textContent = pad.n;
    updatePadUI();
  }

  function stopPad(key) {
    if (!activePads[key]) return;
    activePads[key].nodes.forEach(function(n) {
      try { n.stop ? n.stop() : n.disconnect(); } catch(e) {}
    });
    delete activePads[key];
    var keys = Object.keys(activePads);
    document.getElementById('nowPlaying').textContent = keys.length > 0 ? '...' : '—';
    updatePadUI();
  }

  function stopAll() {
    Object.keys(activePads).forEach(stopPad);
  }

  // ── UI ──
  function renderCatTabs() {
    var el = document.getElementById('catTabs');
    el.innerHTML = '';
    CATS.forEach(function(cat, i) {
      var b = document.createElement('button');
      b.textContent = cat.name;
      if (i === currentCat) b.classList.add('active');
      b.addEventListener('click', function() {
        stopAll();
        currentCat = i;
        renderCatTabs();
        renderPads();
      });
      el.appendChild(b);
    });
  }

  function renderPads() {
    var el = document.getElementById('padGrid');
    el.innerHTML = '';
    CATS[currentCat].pads.forEach(function(pad, i) {
      var d = document.createElement('div');
      d.className = 'pad';
      d.innerHTML = '<span class="pad-name">' + pad.n + '</span>' + (pad.f ? '<span class="pad-freq">' + pad.f + ' Hz</span>' : '');
      d.addEventListener('pointerdown', function(e) {
        e.preventDefault();
        playPad(currentCat, i);
      });
      el.appendChild(d);
    });
    updatePadUI();
  }

  function updatePadUI() {
    var pads = document.querySelectorAll('.pad');
    CATS[currentCat].pads.forEach(function(_, i) {
      var key = currentCat + '_' + i;
      if (pads[i]) pads[i].classList.toggle('playing', !!activePads[key]);
    });
  }

  // ── FX sliders ──
  document.querySelectorAll('[data-fx]').forEach(function(sl) {
    sl.addEventListener('input', function() {
      initAudio();
      var fx = this.dataset.fx;
      if (fx === 'drive') fxDrive = this.value / 100;
      else if (fx === 'filter') { fxFilter = parseInt(this.value); filter.frequency.setTargetAtTime(fxFilter, ctx.currentTime, 0.02); }
      else if (fx === 'reverb') { fxReverb = this.value / 100; dryGain.gain.value = 1 - fxReverb * 0.5; reverbGain.gain.value = fxReverb; }
      else if (fx === 'delay') { var v = this.value / 100; delayNode.delayTime.setTargetAtTime(v * 0.5, ctx.currentTime, 0.02); }
    });
  });

  document.getElementById('masterVol').addEventListener('input', function() {
    initAudio();
    masterGain.gain.setTargetAtTime(this.value / 100, ctx.currentTime, 0.02);
  });

  // ── Sequencer ──
  var seqGrid = document.getElementById('seqGrid');
  for (var s = 0; s < 16; s++) {
    var cell = document.createElement('div');
    cell.className = 'seq-step';
    cell.dataset.step = s;
    (function(idx) {
      cell.addEventListener('click', function() {
        if (seqSteps[idx] === -1) {
          // Assign currently visible first pad or cycle
          var pads = CATS[currentCat].pads;
          var next = 0;
          // Find a pad to toggle: just use the first active pad or pad 0
          seqSteps[idx] = currentCat * 100 + next;
          this.classList.add('on');
          this.style.background = 'rgba(255,214,0,0.25)';
        } else {
          // Cycle through pads or clear
          var catI = Math.floor(seqSteps[idx] / 100);
          var padI = seqSteps[idx] % 100;
          padI++;
          if (catI === currentCat && padI < CATS[currentCat].pads.length) {
            seqSteps[idx] = currentCat * 100 + padI;
            this.textContent = CATS[currentCat].pads[padI].n.charAt(0);
          } else {
            seqSteps[idx] = -1;
            this.classList.remove('on');
            this.textContent = '';
            this.style.background = '';
          }
        }
      });
    })(s);
    seqGrid.appendChild(cell);
  }

  document.getElementById('seqPlay').addEventListener('click', function() {
    initAudio();
    seqPlaying = !seqPlaying;
    this.classList.toggle('active', seqPlaying);
    this.textContent = seqPlaying ? '■ SEQ' : '▶ SEQ';
    if (seqPlaying) { seqPos = 0; seqTick(); }
    else { clearTimeout(seqTimer); stopAll(); highlightStep(-1); }
  });

  document.getElementById('seqClear').addEventListener('click', function() {
    seqSteps = new Array(16).fill(-1);
    seqGrid.querySelectorAll('.seq-step').forEach(function(c) { c.classList.remove('on'); c.textContent = ''; c.style.background = ''; });
  });

  document.getElementById('bpmSlider').addEventListener('input', function() {
    bpm = parseInt(this.value);
    document.getElementById('bpmVal').textContent = bpm;
  });

  function seqTick() {
    if (!seqPlaying) return;
    highlightStep(seqPos);
    var val = seqSteps[seqPos];
    if (val !== -1) {
      var catI = Math.floor(val / 100);
      var padI = val % 100;
      if (CATS[catI] && CATS[catI].pads[padI]) {
        stopAll();
        playPad(catI, padI);
      }
    }
    seqPos = (seqPos + 1) % 16;
    var interval = 60000 / bpm / 4; // 16th notes
    seqTimer = setTimeout(seqTick, interval);
  }

  function highlightStep(pos) {
    seqGrid.querySelectorAll('.seq-step').forEach(function(c, i) {
      c.classList.toggle('current', i === pos);
    });
  }

  // Init
  renderCatTabs();
  renderPads();
})();
</script>
</body>
</html>
