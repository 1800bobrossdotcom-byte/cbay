<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TONE LAB — cbay</title>
  <link rel="manifest" href="data:application/json,%7B%22name%22%3A%22TONE%20LAB%22%2C%22short_name%22%3A%22TONE%20LAB%22%2C%22start_url%22%3A%22%2Ftone-lab%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%230a0a14%22%2C%22theme_color%22%3A%22%23FFD600%22%7D">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a14">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #060610;
      --surface: rgba(255,255,255,0.03);
      --surface-hover: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.06);
      --border-hover: rgba(255,255,255,0.12);
      --text: #e8e8f0;
      --text-dim: rgba(255,255,255,0.4);
      --text-muted: rgba(255,255,255,0.2);
      --accent: #FFD600;
      --accent-dim: rgba(255,214,0,0.10);
      --accent-border: rgba(255,214,0,0.30);
      --accent-glow: rgba(255,214,0,0.08);
      --radius: 12px;
    }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -webkit-user-select: none; user-select: none;
      touch-action: manipulation;
    }
    #app { display: flex; flex-direction: column; width: 100%; height: 100dvh; }

    /* ── Topbar ── */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      height: 48px; padding: 0 16px;
      background: rgba(6,6,16,0.85);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0; z-index: 10; position: relative;
    }
    .topbar a {
      color: var(--accent); text-decoration: none;
      font-size: 11px; letter-spacing: 2px; font-weight: 500;
      opacity: 0.8; transition: opacity 0.2s;
    }
    .topbar a:hover { opacity: 1; }
    .topbar .title {
      font-size: 10px; letter-spacing: 5px; text-transform: uppercase;
      color: var(--text-dim); font-weight: 700;
      position: absolute; left: 50%; transform: translateX(-50%);
    }
    .topbar .now-playing {
      font-size: 10px; letter-spacing: 2px; color: var(--accent); font-weight: 600;
    }
    .topbar .controls { display: flex; gap: 8px; align-items: center; }
    .topbar .controls button {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); width: 40px; height: 40px;
      font-size: 16px; cursor: pointer; display: flex; align-items: center;
      justify-content: center; font-family: inherit; transition: border-color 0.2s, background 0.2s;
    }
    .topbar .controls button:hover { border-color: var(--border-hover); }
    .topbar .controls button:active { background: var(--accent-dim); border-color: var(--accent-border); }

    .main { flex: 1; display: flex; flex-direction: column; padding: 10px; gap: 8px; overflow-y: auto; }

    /* ── Category tabs ── */
    .cat-tabs { display: flex; gap: 4px; }
    .cat-tabs button {
      font-family: inherit; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
      padding: 10px 10px; border-radius: 10px; flex: 1;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text-muted); cursor: pointer; transition: all 0.2s;
      min-height: 40px;
    }
    .cat-tabs button:hover { border-color: var(--border-hover); color: var(--text); }
    .cat-tabs button.active {
      background: var(--accent-dim); border-color: var(--accent-border); color: var(--accent);
    }

    /* ── Pad grid ── */
    .pad-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
    .pad {
      aspect-ratio: 1; border-radius: var(--radius);
      border: 1px solid var(--border); background: var(--surface);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.12s; -webkit-tap-highlight-color: transparent;
    }
    .pad:hover { border-color: var(--border-hover); background: var(--surface-hover); }
    .pad:active, .pad.playing {
      background: var(--accent-dim); border-color: var(--accent-border);
      transform: scale(0.96); box-shadow: 0 0 16px var(--accent-glow);
    }
    .pad-name { font-size: 10px; letter-spacing: 1px; color: var(--text-dim); text-transform: uppercase; font-weight: 600; }
    .pad-freq { font-size: 8px; color: var(--text-muted); margin-top: 3px; }

    /* ── FX panel ── */
    .fx-panel { display: flex; flex-wrap: wrap; gap: 6px; }
    .fx-slider { flex: 1 1 48%; display: flex; align-items: center; gap: 8px; min-width: 0; }
    .fx-label { font-size: 9px; letter-spacing: 1.5px; color: var(--text-muted); text-transform: uppercase; width: 50px; flex-shrink: 0; }
    .fx-slider input[type=range] {
      flex: 1; -webkit-appearance: none; height: 3px; border-radius: 2px;
      background: rgba(255,255,255,0.08); outline: none;
    }
    .fx-slider input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%;
      background: var(--accent); cursor: pointer; box-shadow: 0 0 8px var(--accent-glow);
    }

    /* ── Volume ── */
    .vol-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; }
    .vol-row .fx-label { width: 40px; }
    .vol-row input[type=range] {
      flex: 1; -webkit-appearance: none; height: 4px;
      background: rgba(255,255,255,0.08); border-radius: 2px; outline: none;
    }
    .vol-row input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 26px; height: 26px; border-radius: 50%;
      background: var(--accent); cursor: pointer; box-shadow: 0 0 12px var(--accent-glow);
    }

    /* ── Sequencer ── */
    .seq-bar { display: flex; align-items: center; gap: 6px; padding: 4px 0; }
    .seq-bar button {
      font-family: inherit; font-size: 10px; letter-spacing: 1.5px;
      padding: 8px 12px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text-dim); cursor: pointer; transition: all 0.2s;
      min-height: 36px;
    }
    .seq-bar button:hover { border-color: var(--border-hover); color: var(--text); }
    .seq-bar button.active {
      background: var(--accent-dim); border-color: var(--accent-border); color: var(--accent);
    }
    .seq-grid { display: grid; grid-template-columns: repeat(16, 1fr); gap: 3px; }
    .seq-step {
      aspect-ratio: 1; border-radius: 5px; min-height: 22px;
      border: 1px solid var(--border); background: var(--surface);
      cursor: pointer; transition: background 0.1s;
      display: flex; align-items: center; justify-content: center;
      font-size: 7px; color: var(--text-muted);
    }
    .seq-step:hover { border-color: var(--border-hover); }
    .seq-step.on { background: rgba(255,214,0,0.20); border-color: var(--accent-border); }
    .seq-step.current { box-shadow: 0 0 0 1.5px var(--accent); }
    .bpm-row { display: flex; align-items: center; gap: 8px; font-size: 10px; color: var(--text-muted); }
    .bpm-row input[type=range] {
      width: 80px; -webkit-appearance: none; height: 3px;
      background: rgba(255,255,255,0.08); border-radius: 2px; outline: none;
    }
    .bpm-row input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%;
      background: var(--accent); cursor: pointer;
    }

    .info-bar {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 10px; letter-spacing: 1px; color: var(--text-muted);
      padding: 8px 0; border-top: 1px solid var(--border); margin-top: auto;
    }

    .share-toast {
      position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
      background: var(--accent); color: var(--bg); padding: 10px 20px;
      border-radius: 10px; font-size: 11px; letter-spacing: 1.5px;
      text-transform: uppercase; font-weight: 700; z-index: 200;
      opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    .share-toast.show { opacity: 1; }

    @media (max-width: 380px) {
      .main { padding: 6px; gap: 6px; }
      .pad-grid { gap: 3px; }
      .cat-tabs button { padding: 8px 6px; font-size: 9px; }
    }
  </style>
</head>
<body>
  <div class="share-toast" id="shareToast">link copied</div>
  <div id="app">
    <div class="topbar">
      <a href="/apps" aria-label="Back to apps">&larr; apps</a>
      <span class="title">TONE LAB</span>
      <div class="controls">
        <span class="now-playing" id="nowPlaying">&mdash;</span>
        <button id="shareBtn" title="share">&#x2197;</button>
      </div>
    </div>
    <div class="main">
      <div class="cat-tabs" id="catTabs" role="tablist" aria-label="Pad categories"></div>
      <div class="pad-grid" id="padGrid" role="group" aria-label="Sound pads"></div>

      <div class="fx-panel" id="fxPanel">
        <div class="fx-slider"><span class="fx-label">Drive</span><input type="range" min="0" max="100" value="0" data-fx="drive" aria-label="Drive"></div>
        <div class="fx-slider"><span class="fx-label">Filter</span><input type="range" min="100" max="8000" value="8000" data-fx="filter" aria-label="Filter"></div>
        <div class="fx-slider"><span class="fx-label">Reverb</span><input type="range" min="0" max="100" value="20" data-fx="reverb" aria-label="Reverb"></div>
        <div class="fx-slider"><span class="fx-label">Delay</span><input type="range" min="0" max="100" value="0" data-fx="delay" aria-label="Delay"></div>
      </div>

      <div class="vol-row"><span class="fx-label">Vol</span><input type="range" min="0" max="100" value="70" id="masterVol" aria-label="Master volume"></div>

      <div class="seq-bar">
        <button id="seqPlay" aria-label="Toggle sequencer">&triangleright; SEQ</button>
        <button id="seqClear" aria-label="Clear sequencer">CLR</button>
        <div class="bpm-row">
          <span>BPM</span><input type="range" min="40" max="300" value="120" id="bpmSlider" aria-label="BPM"><span id="bpmVal">120</span>
        </div>
      </div>
      <div class="seq-grid" id="seqGrid" role="group" aria-label="Sequencer steps"></div>

      <div class="info-bar"><span id="statusText">Ready</span><span>cbay.ing/tone-lab</span></div>
    </div>
  </div>

<script>
(function(){
  /* ── Share ── */
  var shareBtn = document.getElementById('shareBtn');
  var shareToast = document.getElementById('shareToast');
  shareBtn.addEventListener('pointerdown', function(e) {
    e.preventDefault();
    if (navigator.share) {
      navigator.share({ title: 'TONE LAB — cbay.ing', url: window.location.href }).catch(function(){});
    } else {
      navigator.clipboard.writeText(window.location.href).then(function() {
        shareToast.classList.add('show');
        setTimeout(function() { shareToast.classList.remove('show'); }, 1800);
      }).catch(function(){});
    }
  });

  var CATS = [
    { name: 'Solfeggio', pads: [
      {n:'UT',f:174},{n:'RE',f:285},{n:'MI',f:396},{n:'FA',f:417},
      {n:'SOL',f:528},{n:'LA',f:639},{n:'TI',f:741},{n:'SI',f:852}
    ]},
    { name: 'Chant', pads: [
      {n:'OM',f:136.1},{n:'AUM',f:432},{n:'HU',f:594},{n:'RAM',f:315},
      {n:'YAM',f:341},{n:'LAM',f:256}
    ]},
    { name: 'Binaural', pads: [
      {n:'Schumann',f:7.83},{n:'Alpha',f:10},{n:'Beta',f:20},{n:'Gamma',f:40},
      {n:'Delta',f:2},{n:'Theta',f:6}
    ]},
    { name: 'Noise', pads: [
      {n:'White',f:0,t:'white'},{n:'Pink',f:0,t:'pink'},{n:'Brown',f:0,t:'brown'},
      {n:'Rain',f:0,t:'rain'},{n:'Wind',f:0,t:'wind'},{n:'Static',f:0,t:'static'}
    ]},
    { name: 'Ultra', pads: [
      {n:'15k',f:15000},{n:'16k',f:16000},{n:'17k',f:17000},{n:'18k',f:18000},
      {n:'19k',f:19000},{n:'20k',f:20000}
    ]}
  ];

  var ctx = null, masterGain = null, dryGain = null, wetGain = null, delayNode = null, delayFb = null, filterNode = null, reverbGain = null, convolver = null;
  var currentCat = 0;
  var activePads = {};
  var seqSteps = new Array(16).fill(-1);
  var seqPlaying = false, seqPos = 0, seqTimer = null, bpm = 120;
  var fxDrive = 0, fxFilter = 8000, fxReverb = 0.2, fxDelay = 0;
  var workletReady = false;

  /* ── AudioWorklet noise processor (inline, handles all 6 types) ── */
  var workletCode = [
    'class LabNoiseProcessor extends AudioWorkletProcessor {',
    '  constructor() {',
    '    super();',
    '    this.type = "white";',
    '    this.b0=0;this.b1=0;this.b2=0;this.b3=0;this.b4=0;this.b5=0;this.b6=0;',
    '    this.brownLast=0; this.windLast=0;',
    '    this.port.onmessage = (e) => { this.type = e.data.type; };',
    '  }',
    '  process(inputs, outputs) {',
    '    const out = outputs[0][0]; if (!out) return true;',
    '    const len = out.length;',
    '    const t = this.type;',
    '    if (t === "white") {',
    '      for (let i=0;i<len;i++) out[i] = Math.random()*2-1;',
    '    } else if (t === "pink") {',
    '      for (let i=0;i<len;i++) {',
    '        const w=Math.random()*2-1;',
    '        this.b0=0.99886*this.b0+w*0.0555179;this.b1=0.99332*this.b1+w*0.0750759;',
    '        this.b2=0.969*this.b2+w*0.153852;this.b3=0.8665*this.b3+w*0.3104856;',
    '        this.b4=0.55*this.b4+w*0.5329522;this.b5=-0.7616*this.b5-w*0.0168980;',
    '        out[i]=(this.b0+this.b1+this.b2+this.b3+this.b4+this.b5+this.b6+w*0.5362)*0.11;',
    '        this.b6=w*0.115926;',
    '      }',
    '    } else if (t === "brown") {',
    '      for (let i=0;i<len;i++) { this.brownLast=(this.brownLast+Math.random()*0.2-0.1)*0.998; out[i]=this.brownLast*3.5; }',
    '    } else if (t === "rain") {',
    '      for (let i=0;i<len;i++) out[i] = (Math.random()*2-1) * (Math.random()<0.03?0.8:0.05);',
    '    } else if (t === "wind") {',
    '      for (let i=0;i<len;i++) { this.windLast=this.windLast*0.995+(Math.random()*2-1)*0.15; out[i]=this.windLast; }',
    '    } else {', // static
    '      for (let i=0;i<len;i++) out[i] = Math.random()<0.4?(Math.random()*2-1)*0.6:0;',
    '    }',
    '    return true;',
    '  }',
    '}',
    'registerProcessor("lab-noise-processor", LabNoiseProcessor);'
  ].join('\n');

  function initAudio() {
    if (ctx) return Promise.resolve();
    ctx = new AudioContext();
    masterGain = ctx.createGain();
    masterGain.gain.value = 0.7;

    filterNode = ctx.createBiquadFilter();
    filterNode.type = 'lowpass'; filterNode.frequency.value = 8000; filterNode.Q.value = 0.707;

    convolver = ctx.createConvolver();
    var irLen = ctx.sampleRate * 3;
    var irBuf = ctx.createBuffer(1, irLen, ctx.sampleRate);
    var d = irBuf.getChannelData(0);
    for (var i = 0; i < irLen; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / irLen, 3);
    convolver.buffer = irBuf;
    dryGain = ctx.createGain(); dryGain.gain.value = 0.8;
    reverbGain = ctx.createGain(); reverbGain.gain.value = 0.2;

    delayNode = ctx.createDelay(2);
    delayNode.delayTime.value = 0;
    delayFb = ctx.createGain();
    delayFb.gain.value = 0.4;
    delayNode.connect(delayFb);
    delayFb.connect(delayNode);

    filterNode.connect(dryGain);
    dryGain.connect(masterGain);
    filterNode.connect(convolver);
    convolver.connect(reverbGain);
    reverbGain.connect(masterGain);
    filterNode.connect(delayNode);
    delayNode.connect(masterGain);
    masterGain.connect(ctx.destination);

    // Register AudioWorklet
    try {
      var blob = new Blob([workletCode], { type: 'application/javascript' });
      var url = URL.createObjectURL(blob);
      return ctx.audioWorklet.addModule(url).then(function() {
        URL.revokeObjectURL(url);
        workletReady = true;
      }).catch(function() { workletReady = false; });
    } catch(e) { return Promise.resolve(); }
  }

  function createWaveshaper(amount) {
    if (amount < 0.01) return null;
    var ws = ctx.createWaveShaper();
    var k = 2 * amount / (1 - amount + 0.001);
    var n = 44100, curve = new Float32Array(n);
    for (var i = 0; i < n; i++) {
      var x = i * 2 / n - 1;
      curve[i] = (1 + k) * x / (1 + k * Math.abs(x));
    }
    ws.curve = curve; ws.oversample = '2x';
    return ws;
  }

  function playPad(catIdx, padIdx) {
    initAudio().then(function() {
      var pad = CATS[catIdx].pads[padIdx];
      var key = catIdx + '_' + padIdx;
      if (activePads[key]) { stopPad(key); return; }

      var nodes = [];
      var outGain = ctx.createGain();
      outGain.gain.value = 1;

      if (pad.t) {
        // Noise types via AudioWorklet
        if (workletReady) {
          var node = new AudioWorkletNode(ctx, 'lab-noise-processor');
          node.port.postMessage({ type: pad.t });
          node.connect(outGain);
          nodes.push(node);
        } else {
          // Fallback: buffer-based noise
          var dur = 4, len = ctx.sampleRate * dur;
          var buf = ctx.createBuffer(1, len, ctx.sampleRate);
          var dd = buf.getChannelData(0);
          var bLast = 0;
          for (var i = 0; i < len; i++) {
            if (pad.t === 'white') dd[i] = Math.random() * 2 - 1;
            else if (pad.t === 'brown') { bLast = (bLast + Math.random() * 0.2 - 0.1) * 0.998; dd[i] = bLast * 3.5; }
            else if (pad.t === 'rain') dd[i] = (Math.random() * 2 - 1) * (Math.random() < 0.03 ? 0.8 : 0.05);
            else if (pad.t === 'wind') { bLast = bLast * 0.995 + (Math.random() * 2 - 1) * 0.15; dd[i] = bLast; }
            else if (pad.t === 'static') dd[i] = Math.random() < 0.4 ? (Math.random() * 2 - 1) * 0.6 : 0;
            else { // pink fallback simple
              dd[i] = (Math.random() * 2 - 1) * 0.5;
            }
          }
          var src = ctx.createBufferSource();
          src.buffer = buf; src.loop = true;
          src.connect(outGain); src.start();
          nodes.push(src);
        }
      } else if (catIdx === 2) {
        // Binaural
        var merger = ctx.createChannelMerger(2);
        var oL = ctx.createOscillator(); oL.type = 'sine'; oL.frequency.value = 200;
        var oR = ctx.createOscillator(); oR.type = 'sine'; oR.frequency.value = 200 + pad.f;
        oL.connect(merger, 0, 0); oR.connect(merger, 0, 1);
        merger.connect(outGain);
        oL.start(); oR.start();
        nodes.push(oL, oR, merger);
      } else {
        // Tone oscillator
        var osc = ctx.createOscillator();
        osc.type = 'sine'; osc.frequency.value = pad.f;
        osc.connect(outGain);
        osc.start();
        nodes.push(osc);
      }

      var ws = createWaveshaper(fxDrive);
      if (ws) {
        outGain.connect(ws); ws.connect(filterNode);
        nodes.push(ws);
      } else {
        outGain.connect(filterNode);
      }
      nodes.push(outGain);
      activePads[key] = { nodes: nodes };

      document.getElementById('nowPlaying').textContent = pad.n;
      updatePadUI();
    });
  }

  function stopPad(key) {
    if (!activePads[key]) return;
    activePads[key].nodes.forEach(function(n) {
      try { if (n.stop) n.stop(); n.disconnect(); } catch(e) {}
    });
    delete activePads[key];
    var keys = Object.keys(activePads);
    document.getElementById('nowPlaying').textContent = keys.length > 0 ? '...' : '\u2014';
    updatePadUI();
  }

  function stopAll() {
    Object.keys(activePads).forEach(stopPad);
  }

  function renderCatTabs() {
    var el = document.getElementById('catTabs');
    el.innerHTML = '';
    CATS.forEach(function(cat, i) {
      var b = document.createElement('button');
      b.textContent = cat.name;
      b.setAttribute('role', 'tab');
      if (i === currentCat) b.classList.add('active');
      b.addEventListener('click', function() {
        stopAll();
        currentCat = i;
        renderCatTabs();
        renderPads();
      });
      el.appendChild(b);
    });
  }

  function renderPads() {
    var el = document.getElementById('padGrid');
    el.innerHTML = '';
    CATS[currentCat].pads.forEach(function(pad, i) {
      var d = document.createElement('div');
      d.className = 'pad';
      d.innerHTML = '<span class="pad-name">' + pad.n + '</span>' + (pad.f ? '<span class="pad-freq">' + pad.f + ' Hz</span>' : '');
      d.addEventListener('pointerdown', function(e) {
        e.preventDefault();
        playPad(currentCat, i);
      });
      el.appendChild(d);
    });
    updatePadUI();
  }

  function updatePadUI() {
    var pads = document.querySelectorAll('.pad');
    CATS[currentCat].pads.forEach(function(_, i) {
      var key = currentCat + '_' + i;
      if (pads[i]) pads[i].classList.toggle('playing', !!activePads[key]);
    });
  }

  document.querySelectorAll('[data-fx]').forEach(function(sl) {
    sl.addEventListener('input', function() {
      initAudio();
      var fx = this.dataset.fx;
      if (fx === 'drive') fxDrive = this.value / 100;
      else if (fx === 'filter') { fxFilter = parseInt(this.value); filterNode.frequency.setTargetAtTime(fxFilter, ctx.currentTime, 0.02); }
      else if (fx === 'reverb') { fxReverb = this.value / 100; dryGain.gain.value = 1 - fxReverb * 0.5; reverbGain.gain.value = fxReverb; }
      else if (fx === 'delay') { var v = this.value / 100; delayNode.delayTime.setTargetAtTime(v * 0.5, ctx.currentTime, 0.02); }
    });
  });

  document.getElementById('masterVol').addEventListener('input', function() {
    initAudio();
    masterGain.gain.setTargetAtTime(this.value / 100, ctx.currentTime, 0.02);
  });

  var seqGrid = document.getElementById('seqGrid');
  for (var s = 0; s < 16; s++) {
    var cell = document.createElement('div');
    cell.className = 'seq-step';
    cell.dataset.step = s;
    (function(idx) {
      cell.addEventListener('click', function() {
        if (seqSteps[idx] === -1) {
          seqSteps[idx] = currentCat * 100;
          this.classList.add('on');
        } else {
          var catI = Math.floor(seqSteps[idx] / 100);
          var padI = seqSteps[idx] % 100;
          padI++;
          if (catI === currentCat && padI < CATS[currentCat].pads.length) {
            seqSteps[idx] = currentCat * 100 + padI;
            this.textContent = CATS[currentCat].pads[padI].n.charAt(0);
          } else {
            seqSteps[idx] = -1;
            this.classList.remove('on');
            this.textContent = '';
          }
        }
      });
    })(s);
    seqGrid.appendChild(cell);
  }

  document.getElementById('seqPlay').addEventListener('click', function() {
    initAudio();
    seqPlaying = !seqPlaying;
    this.classList.toggle('active', seqPlaying);
    this.textContent = seqPlaying ? '\u25A0 SEQ' : '\u25B7 SEQ';
    if (seqPlaying) { seqPos = 0; seqTick(); }
    else { clearTimeout(seqTimer); stopAll(); highlightStep(-1); }
  });

  document.getElementById('seqClear').addEventListener('click', function() {
    seqSteps = new Array(16).fill(-1);
    seqGrid.querySelectorAll('.seq-step').forEach(function(c) { c.classList.remove('on'); c.textContent = ''; });
  });

  document.getElementById('bpmSlider').addEventListener('input', function() {
    bpm = parseInt(this.value);
    document.getElementById('bpmVal').textContent = bpm;
  });

  function seqTick() {
    if (!seqPlaying) return;
    highlightStep(seqPos);
    var val = seqSteps[seqPos];
    if (val !== -1) {
      var catI = Math.floor(val / 100);
      var padI = val % 100;
      if (CATS[catI] && CATS[catI].pads[padI]) {
        stopAll();
        playPad(catI, padI);
      }
    }
    seqPos = (seqPos + 1) % 16;
    var interval = 60000 / bpm / 4;
    seqTimer = setTimeout(seqTick, interval);
  }

  function highlightStep(pos) {
    seqGrid.querySelectorAll('.seq-step').forEach(function(c, i) {
      c.classList.toggle('current', i === pos);
    });
  }

  renderCatTabs();
  renderPads();
})();
</script>
</body>
</html>
