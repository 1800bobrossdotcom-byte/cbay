<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a10"/>
      <stop offset="100%" stop-color="#0e060a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FF2D55"/>
      <stop offset="100%" stop-color="#AA1a33"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- grid -->
  <g stroke="#2a0a14" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>
  <!-- shield shape -->
  <path d="M256,120 L360,170 L360,280 Q360,360 256,400 Q152,360 152,280 L152,170 Z"
        fill="none" stroke="url(#glow)" stroke-width="3" opacity="0.8"/>
  <path d="M256,150 L340,190 L340,275 Q340,340 256,370 Q172,340 172,275 L172,190 Z"
        fill="rgba(255,45,85,0.06)" stroke="#FF2D55" stroke-width="1" opacity="0.4"/>
  <!-- lock icon inside shield -->
  <rect x="232" y="240" width="48" height="40" rx="6" fill="none" stroke="#FF2D55" stroke-width="2" opacity="0.7"/>
  <path d="M244,240 L244,224 Q244,208 256,208 Q268,208 268,224 L268,240" fill="none" stroke="#FF2D55" stroke-width="2" opacity="0.6"/>
  <circle cx="256" cy="258" r="4" fill="#FF2D55" opacity="0.8"/>
  <line x1="256" y1="262" x2="256" y2="270" stroke="#FF2D55" stroke-width="2" opacity="0.7"/>
  <!-- signal waves -->
  <g stroke="#FF2D55" stroke-width="1" fill="none" opacity="0.3">
    <path d="M380,190 Q400,220 380,250"/>
    <path d="M395,180 Q420,220 395,260"/>
    <path d="M132,190 Q112,220 132,250"/>
    <path d="M117,180 Q92,220 117,260"/>
  </g>
  <!-- label -->
  <text x="256" y="450" font-family="system-ui,sans-serif" font-size="28" fill="#FF2D55" opacity="0.8" text-anchor="middle" letter-spacing="8">SHIELD</text>
</svg>
