<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#140a1a"/>
      <stop offset="100%" stop-color="#0a060e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#7033AA"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- grid -->
  <g stroke="#1a0a2a" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>
  <!-- oscilloscope wave -->
  <path d="M80,256 C120,180 160,180 200,256 C240,332 280,332 320,256 C360,180 400,180 432,256"
        fill="none" stroke="url(#glow)" stroke-width="2.5" opacity="0.8"/>
  <!-- knobs row -->
  <g opacity="0.6">
    <circle cx="160" cy="160" r="28" fill="none" stroke="#A855F7" stroke-width="2"/>
    <line x1="160" y1="140" x2="160" y2="132" stroke="#A855F7" stroke-width="2"/>
    <circle cx="256" cy="160" r="28" fill="none" stroke="#A855F7" stroke-width="2"/>
    <line x1="270" y1="140" x2="274" y2="132" stroke="#A855F7" stroke-width="2"/>
    <circle cx="352" cy="160" r="28" fill="none" stroke="#A855F7" stroke-width="2"/>
    <line x1="342" y1="140" x2="338" y2="132" stroke="#A855F7" stroke-width="2"/>
  </g>
  <!-- slider bars -->
  <g opacity="0.5">
    <rect x="140" y="340" width="8" height="80" rx="4" fill="#2a1a3a"/>
    <rect x="140" y="370" width="8" height="50" rx="4" fill="#A855F7"/>
    <rect x="180" y="340" width="8" height="80" rx="4" fill="#2a1a3a"/>
    <rect x="180" y="360" width="8" height="60" rx="4" fill="#A855F7"/>
    <rect x="220" y="340" width="8" height="80" rx="4" fill="#2a1a3a"/>
    <rect x="220" y="380" width="8" height="40" rx="4" fill="#A855F7"/>
    <rect x="260" y="340" width="8" height="80" rx="4" fill="#2a1a3a"/>
    <rect x="260" y="350" width="8" height="70" rx="4" fill="#A855F7"/>
    <rect x="300" y="340" width="8" height="80" rx="4" fill="#2a1a3a"/>
    <rect x="300" y="365" width="8" height="55" rx="4" fill="#A855F7"/>
    <rect x="340" y="340" width="8" height="80" rx="4" fill="#2a1a3a"/>
    <rect x="340" y="375" width="8" height="45" rx="4" fill="#A855F7"/>
    <rect x="380" y="340" width="8" height="80" rx="4" fill="#2a1a3a"/>
    <rect x="380" y="355" width="8" height="65" rx="4" fill="#A855F7"/>
  </g>
  <!-- label -->
  <text x="256" y="460" font-family="system-ui,sans-serif" font-size="24" fill="#A855F7" opacity="0.8" text-anchor="middle" letter-spacing="6">TONE LAB</text>
</svg>
