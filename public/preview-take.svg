<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" width="640" height="400">
  <defs>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e0a0a"/>
      <stop offset="100%" stop-color="#080606"/>
    </linearGradient>
  </defs>
  <!-- phone frame -->
  <rect x="200" y="20" width="240" height="360" rx="20" fill="#1a1616" stroke="#333" stroke-width="1"/>
  <rect x="210" y="40" width="220" height="310" rx="4" fill="url(#screen)"/>
  <!-- camera view -->
  <rect x="230" y="60" width="180" height="200" fill="#0a0808"/>
  <!-- scene - abstract shapes representing video content -->
  <ellipse cx="300" cy="140" rx="40" ry="55" fill="#2a1818" opacity="0.5"/>
  <rect x="330" y="120" width="60" height="80" fill="#1a1212" opacity="0.4" rx="4"/>
  <!-- recording indicator -->
  <circle cx="240" cy="75" r="5" fill="#cc3333"/>
  <text x="250" y="78" font-family="monospace" font-size="8" fill="#cc3333" opacity="0.8">00:04.2</text>
  <!-- film strip overlay -->
  <g opacity="0.15">
    <rect x="230" y="60" width="6" height="10" rx="1" fill="#cc4433"/>
    <rect x="230" y="80" width="6" height="10" rx="1" fill="#cc4433"/>
    <rect x="230" y="100" width="6" height="10" rx="1" fill="#cc4433"/>
    <rect x="230" y="120" width="6" height="10" rx="1" fill="#cc4433"/>
    <rect x="404" y="60" width="6" height="10" rx="1" fill="#cc4433"/>
    <rect x="404" y="80" width="6" height="10" rx="1" fill="#cc4433"/>
    <rect x="404" y="100" width="6" height="10" rx="1" fill="#cc4433"/>
    <rect x="404" y="120" width="6" height="10" rx="1" fill="#cc4433"/>
  </g>
  <!-- timeline with clips -->
  <rect x="230" y="275" width="180" height="30" fill="#0c0808"/>
  <rect x="232" y="278" width="50" height="24" rx="2" fill="#3a1818" stroke="#cc4433" stroke-width="0.5" opacity="0.6"/>
  <rect x="286" y="278" width="35" height="24" rx="2" fill="#3a1818" stroke="#cc4433" stroke-width="0.5" opacity="0.6"/>
  <rect x="325" y="278" width="45" height="24" rx="2" fill="#3a1818" stroke="#cc4433" stroke-width="0.5" opacity="0.6"/>
  <rect x="374" y="278" width="30" height="24" rx="2" fill="#3a1818" stroke="#cc4433" stroke-width="0.5" opacity="0.4"/>
  <!-- playhead -->
  <line x1="310" y1="273" x2="310" y2="307" stroke="#cc4433" stroke-width="1.5" opacity="0.8"/>
  <polygon points="307,273 313,273 310,270" fill="#cc4433" opacity="0.8"/>
  <!-- bottom controls -->
  <rect x="230" y="315" width="180" height="20" fill="#0a0808"/>
  <circle cx="320" cy="325" r="8" fill="none" stroke="#cc4433" stroke-width="1.5" opacity="0.6"/>
  <rect x="316" y="321" width="8" height="8" fill="#cc4433" opacity="0.5"/>
  <!-- effect icons -->
  <text x="250" y="328" font-family="monospace" font-size="8" fill="#884433" opacity="0.4">FX</text>
  <text x="370" y="328" font-family="monospace" font-size="8" fill="#884433" opacity="0.4">CUT</text>
  <!-- label -->
  <text x="380" y="78" font-family="monospace" font-size="7" fill="#884433" opacity="0.4">TAKE</text>
</svg>
