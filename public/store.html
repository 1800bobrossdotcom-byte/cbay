<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>store — cbay</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #060610;
      --surface: rgba(255,255,255,0.03);
      --border: rgba(255,255,255,0.06);
      --text: #e8e8f0;
      --text-dim: rgba(255,255,255,0.4);
      --text-muted: rgba(255,255,255,0.2);
      --cyan: #00E5FF;
      --magenta: #FF00E5;
      --amber: #FF8800;
      --mint: #00FF9F;
      --red: #FF2D55;
      --purple: #A855F7;
      --radius: 16px;
    }
    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .page {
      max-width: 640px;
      margin: 0 auto;
      padding: 32px 20px 60px;
      min-height: 100vh;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      margin-bottom: 24px;
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--border);
    }
    .topbar .logo {
      font-size: 14px;
      letter-spacing: 6px;
      font-weight: 700;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--cyan), var(--magenta));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .topbar-links { display: flex; gap: 6px; }
    .topbar-links a {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
      text-decoration: none;
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid transparent;
      transition: all 0.2s;
    }
    .topbar-links a:hover { color: #fff; border-color: var(--border); background: rgba(255,255,255,0.04); }
    .topbar-links a.active { color: #fff; border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.06); }

    /* ── Coin selector ── */
    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .controls-label {
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .coin-bar { display: flex; gap: 4px; }
    .coin-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-dim);
      padding: 6px 12px;
      font-family: inherit;
      font-size: 10px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .coin-btn.active {
      border-color: rgba(255,255,255,0.25);
      color: #fff;
      background: rgba(255,255,255,0.08);
    }
    .coin-btn:hover:not(.active) { border-color: rgba(255,255,255,0.12); color: rgba(255,255,255,0.6); }

    .tier-btns { display: flex; gap: 4px; margin-left: auto; }
    .tier-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-dim);
      padding: 6px 12px;
      font-family: inherit;
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tier-btn.active {
      border-color: rgba(255,255,255,0.25);
      color: #fff;
      background: rgba(255,255,255,0.08);
    }
    .tier-btn:hover:not(.active) { border-color: rgba(255,255,255,0.12); color: rgba(255,255,255,0.6); }

    /* ── Section headers ── */
    .section-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0 12px;
    }
    .section-head .line { flex: 1; height: 1px; background: var(--border); }
    .section-head .label {
      font-size: 9px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* ── Product cards ── */
    .products { display: grid; grid-template-columns: 1fr; gap: 10px; }

    .card {
      position: relative;
      border: 1px solid var(--card-border, var(--border));
      border-radius: var(--radius);
      padding: 20px;
      background: var(--card-bg, var(--surface));
      transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: var(--radius);
      background: radial-gradient(ellipse at 20% 50%, var(--card-glow, transparent) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .card:hover {
      border-color: var(--card-accent, rgba(255,255,255,0.15));
      transform: translateY(-2px);
      box-shadow: 0 6px 24px var(--card-glow, rgba(0,0,0,0.3));
    }
    .card:hover::before { opacity: 1; }

    .card--spectra { --card-accent: var(--cyan); --card-border: rgba(0,229,255,0.15); --card-bg: rgba(0,229,255,0.03); --card-glow: rgba(0,229,255,0.06); }
    .card--artifact { --card-accent: var(--magenta); --card-border: rgba(255,0,229,0.15); --card-bg: rgba(255,0,229,0.03); --card-glow: rgba(255,0,229,0.06); }
    .card--take { --card-accent: var(--amber); --card-border: rgba(255,136,0,0.15); --card-bg: rgba(255,136,0,0.03); --card-glow: rgba(255,136,0,0.06); }
    .card--tones { --card-accent: var(--mint); --card-border: rgba(0,255,159,0.15); --card-bg: rgba(0,255,159,0.03); --card-glow: rgba(0,255,159,0.06); }
    .card--shield { --card-accent: var(--red); --card-border: rgba(255,45,85,0.15); --card-bg: rgba(255,45,85,0.03); --card-glow: rgba(255,45,85,0.06); }
    .card--tone-lab { --card-accent: var(--purple); --card-border: rgba(168,85,247,0.15); --card-bg: rgba(168,85,247,0.03); --card-glow: rgba(168,85,247,0.06); }
    .card--cbay-suite, .card--audio-suite { --card-accent: #fff; --card-border: rgba(255,255,255,0.12); --card-bg: rgba(255,255,255,0.03); --card-glow: rgba(255,255,255,0.04); }

    .card-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      position: relative;
    }
    .card-info { flex: 1; min-width: 0; }
    .card-name {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 4px;
      color: var(--card-accent, #fff);
      margin-bottom: 2px;
    }
    .card-tagline {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .card-desc {
      font-size: 11px;
      color: var(--text-dim);
      line-height: 1.5;
      margin-bottom: 10px;
    }
    .card-tags {
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }
    .card-price-block {
      text-align: right;
      flex-shrink: 0;
      position: relative;
    }
    .card-price {
      font-size: 18px;
      color: #fff;
      letter-spacing: 1px;
      font-weight: 700;
    }
    .card-coin {
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 2px;
    }
    .card-usd {
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 1px;
    }
    .card-badges {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      position: relative;
    }
    .card-badge {
      font-size: 8px;
      letter-spacing: 2px;
      padding: 2px 8px;
      border-radius: 6px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .card-badge--type {
      color: var(--card-accent, var(--text-dim));
      border: 1px solid var(--card-border, var(--border));
      background: rgba(255,255,255,0.02);
    }
    .card-badge--native {
      color: var(--red);
      border: 1px solid rgba(255,45,85,0.2);
      background: rgba(255,45,85,0.06);
    }
    .card-badge--platforms {
      color: var(--text-dim);
      border: 1px solid var(--border);
    }
    .card-actions {
      display: flex;
      gap: 6px;
      margin-top: 12px;
      position: relative;
    }
    .btn {
      font-family: inherit;
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 8px 14px;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      border-radius: 8px;
    }
    .btn-buy {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      font-weight: 600;
    }
    .btn-buy:hover { background: rgba(255,255,255,0.14); }
    .btn-try {
      background: none;
      border: 1px solid var(--card-border, var(--border));
      color: var(--card-accent, var(--text-dim));
    }
    .btn-try:hover { background: var(--card-bg, var(--surface)); }

    /* ── Crypto info ── */
    .crypto-info {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 24px;
      background: var(--surface);
    }
    .crypto-info h3 {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--text-dim);
      font-weight: 600;
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    .crypto-info p {
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.6;
    }
    .crypto-info .coins {
      display: flex;
      gap: 14px;
      margin-top: 10px;
    }
    .crypto-info .coin { font-size: 11px; letter-spacing: 1px; }
    .crypto-info .coin .sym { color: #fff; font-weight: 600; }
    .crypto-info .coin .name { color: var(--text-muted); }

    /* ── Unlock prompt ── */
    .unlock-prompt {
      text-align: center;
      padding: 24px;
      margin-top: 36px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
    }
    .unlock-prompt p {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .card { animation: fadeUp 0.35s ease-out both; }

    @media (max-width: 600px) {
      .page { padding: 16px 12px 40px; }
      .card-row { flex-direction: column; }
      .card-price-block { text-align: left; }
      .controls { gap: 8px; }
      .tier-btns { margin-left: 0; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <a href="/" class="logo" style="text-decoration:none">cbay</a>
      <div class="topbar-links">
        <a href="/store" class="active">store</a>
        <a href="/unlock">unlock</a>
      </div>
    </div>

    <div class="crypto-info">
      <h3>crypto payments only</h3>
      <p>Purchase an instrument &rarr; receive an HMAC-signed access code &rarr; unlock on any device. Codes are cryptographically verified.</p>
      <div class="coins">
        <span class="coin"><span class="sym">XMR</span> <span class="name">Monero</span></span>
        <span class="coin"><span class="sym">LTC</span> <span class="name">Litecoin</span></span>
        <span class="coin"><span class="sym">BTC</span> <span class="name">Bitcoin</span></span>
        <span class="coin"><span class="sym">ETH</span> <span class="name">Ethereum</span></span>
      </div>
    </div>

    <div class="controls">
      <span class="controls-label">prices in</span>
      <div class="coin-bar">
        <button class="coin-btn active" data-coin="XMR">XMR</button>
        <button class="coin-btn" data-coin="LTC">LTC</button>
        <button class="coin-btn" data-coin="BTC">BTC</button>
        <button class="coin-btn" data-coin="ETH">ETH</button>
      </div>
      <div class="tier-btns">
        <button class="tier-btn active" data-tier="all">all</button>
        <button class="tier-btn" data-tier="visual">visual</button>
        <button class="tier-btn" data-tier="audio">audio</button>
      </div>
    </div>

    <div class="products" id="products"></div>

    <div class="unlock-prompt">
      <p>already have an access code?</p>
      <a href="/unlock" class="btn btn-buy">enter code</a>
    </div>

    <div style="text-align:center;margin-top:32px;padding:16px 0;">
      <a href="mailto:support@clasp.codes" style="color:#8888aa;text-decoration:none;font-size:9px;letter-spacing:2px;">support@clasp.codes</a>
      <span style="color:#333;font-size:9px;"> &middot; </span>
      <a href="https://github.com/1800bobrossdotcom-byte/cbay/issues" target="_blank" rel="noopener" style="color:#8888aa;text-decoration:none;font-size:9px;letter-spacing:2px;">report a bug</a>
    </div>
  </div>

  <script>
    (function() {
      var selectedCoin = 'XMR';
      var selectedTier = 'all';
      var products = [];

      // Read ?tier= from URL
      var params = new URLSearchParams(window.location.search);
      if (params.get('tier') === 'audio' || params.get('tier') === 'visual') {
        selectedTier = params.get('tier');
      }

      function fetchProducts() {
        fetch('/api/products')
          .then(function(r) { return r.json(); })
          .then(function(data) {
            products = data.products || [];
            renderProducts();
            updateTierButtons();
          })
          .catch(function() {
            document.getElementById('products').innerHTML =
              '<p style="color:var(--text-muted);font-size:11px;letter-spacing:1px;">failed to load catalog</p>';
          });
      }

      function renderProducts() {
        var container = document.getElementById('products');
        container.innerHTML = '';

        var filtered = products;
        if (selectedTier !== 'all') {
          filtered = products.filter(function(p) { return p.tier === selectedTier; });
        }

        for (var i = 0; i < filtered.length; i++) {
          var p = filtered[i];
          var price = p.prices[selectedCoin] || '\u2014';
          var isNative = p.type === 'native-app';
          var isBundle = p.type === 'bundle';
          var hasWeb = p.webPath !== null;

          var card = document.createElement('div');
          card.className = 'card card--' + p.id;
          card.style.animationDelay = (i * 0.08) + 's';

          var badges = '<span class="card-badge card-badge--type">' + p.type + '</span>';
          if (isNative) badges += '<span class="card-badge card-badge--native">native</span>';
          if (p.platforms) badges += '<span class="card-badge card-badge--platforms">' + p.platforms.join(' \u00B7 ') + '</span>';

          var actions = '';
          if (hasWeb) {
            actions += '<a href="' + p.webPath + '" class="btn btn-try">try free</a>';
          }
          actions += '<a href="/pay?product=' + p.id + '&coin=' + selectedCoin + '" class="btn btn-buy">buy ' + price + ' ' + selectedCoin + '</a>';

          card.innerHTML =
            '<div class="card-row">' +
              '<div class="card-info">' +
                '<h2 class="card-name">' + p.name + '</h2>' +
                '<p class="card-tagline">' + p.tagline + '</p>' +
                '<p class="card-desc">' + p.description + '</p>' +
                '<p class="card-tags">' + p.tags.join(' \u00B7 ') + '</p>' +
              '</div>' +
              '<div class="card-price-block">' +
                '<div class="card-price">' + price + '</div>' +
                '<div class="card-coin">' + selectedCoin + '</div>' +
                '<div class="card-usd">$' + p.priceUSD.toFixed(2) + '</div>' +
              '</div>' +
            '</div>' +
            '<div class="card-badges">' + badges + '</div>' +
            '<div class="card-actions">' + actions + '</div>';

          container.appendChild(card);
        }
      }

      function updateTierButtons() {
        document.querySelectorAll('.tier-btn').forEach(function(b) {
          b.classList.toggle('active', b.getAttribute('data-tier') === selectedTier);
        });
      }

      // Coin selector
      document.querySelectorAll('.coin-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          document.querySelectorAll('.coin-btn').forEach(function(b) { b.classList.remove('active'); });
          this.classList.add('active');
          selectedCoin = this.getAttribute('data-coin');
          renderProducts();
        });
      });

      // Tier selector
      document.querySelectorAll('.tier-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          selectedTier = this.getAttribute('data-tier');
          updateTierButtons();
          renderProducts();
        });
      });

      fetchProducts();
    })();
  </script>
</body>
</html>
