<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a18"/>
      <stop offset="100%" stop-color="#0e0e0c"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#7acd3a"/>
      <stop offset="100%" stop-color="#4a8a2a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- grid lines -->
  <g stroke="#2a3a1a" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>
  <!-- lens ring -->
  <circle cx="256" cy="240" r="120" fill="none" stroke="url(#glow)" stroke-width="3" opacity="0.8"/>
  <circle cx="256" cy="240" r="100" fill="none" stroke="#4a8a2a" stroke-width="1" opacity="0.4"/>
  <circle cx="256" cy="240" r="80" fill="none" stroke="#4a8a2a" stroke-width="1" opacity="0.3" stroke-dasharray="8 4"/>
  <!-- crosshair -->
  <line x1="256" y1="160" x2="256" y2="320" stroke="#7acd3a" stroke-width="1" opacity="0.5"/>
  <line x1="176" y1="240" x2="336" y2="240" stroke="#7acd3a" stroke-width="1" opacity="0.5"/>
  <!-- center dot -->
  <circle cx="256" cy="240" r="4" fill="#7acd3a" opacity="0.9"/>
  <!-- scan lines -->
  <g stroke="#7acd3a" stroke-width="1.5" opacity="0.6">
    <line x1="180" y1="200" x2="230" y2="200"/>
    <line x1="282" y1="200" x2="332" y2="200"/>
    <line x1="180" y1="280" x2="230" y2="280"/>
    <line x1="282" y1="280" x2="332" y2="280"/>
  </g>
  <!-- corner brackets -->
  <g stroke="#7acd3a" stroke-width="2.5" fill="none" opacity="0.7">
    <polyline points="160,180 160,160 180,160"/>
    <polyline points="332,160 352,160 352,180"/>
    <polyline points="352,300 352,320 332,320"/>
    <polyline points="180,320 160,320 160,300"/>
  </g>
  <!-- label -->
  <text x="256" y="410" text-anchor="middle" font-family="monospace" font-size="32" font-weight="bold" fill="#7acd3a" letter-spacing="8" opacity="0.9">SPECTRA</text>
  <text x="256" y="440" text-anchor="middle" font-family="monospace" font-size="12" fill="#4a8a2a" letter-spacing="3" opacity="0.6">COMPUTATIONAL VISION</text>
</svg>
