<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>unlock — cbay</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #060610;
      --surface: rgba(255,255,255,0.03);
      --border: rgba(255,255,255,0.06);
      --text: #e8e8f0;
      --text-dim: rgba(255,255,255,0.4);
      --text-muted: rgba(255,255,255,0.2);
      --cyan: #00E5FF;
      --magenta: #FF00E5;
      --amber: #FF8800;
      --mint: #00FF9F;
      --red: #FF2D55;
      --purple: #A855F7;
      --radius: 16px;
    }
    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .page {
      max-width: 560px;
      margin: 0 auto;
      padding: 32px 20px 60px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      margin-bottom: 24px;
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--border);
    }
    .topbar .logo {
      font-size: 14px;
      letter-spacing: 6px;
      font-weight: 700;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--cyan), var(--magenta));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
    }
    .topbar-links { display: flex; gap: 6px; }
    .topbar-links a {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
      text-decoration: none;
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid transparent;
      transition: all 0.2s;
    }
    .topbar-links a:hover { color: #fff; border-color: var(--border); background: rgba(255,255,255,0.04); }
    .topbar-links a.active { color: #fff; border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.06); }

    /* ── Main ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .heading {
      font-size: 14px;
      letter-spacing: 5px;
      color: #fff;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .sub {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 1px;
      line-height: 1.7;
      margin-bottom: 32px;
    }

    /* ── Code input ── */
    .code-input-group {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .code-prefix {
      font-size: 14px;
      color: var(--text-muted);
      letter-spacing: 2px;
      font-weight: 700;
    }
    .code-segment {
      width: 68px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-bottom: 2px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: var(--cyan);
      padding: 12px 6px;
      font-family: inherit;
      font-size: 15px;
      letter-spacing: 3px;
      text-align: center;
      text-transform: uppercase;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    .code-segment:focus {
      border-color: var(--cyan);
      border-bottom-color: var(--cyan);
    }
    .code-sep {
      color: var(--text-muted);
      font-size: 14px;
    }

    .hint {
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 1px;
      margin-bottom: 24px;
    }

    .btn {
      font-family: inherit;
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }
    .btn-primary {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      font-weight: 600;
    }
    .btn-primary:hover { background: rgba(255,255,255,0.14); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-secondary {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
    }
    .btn-secondary:hover { border-color: rgba(255,255,255,0.15); color: #fff; }

    /* ── Result ── */
    .result {
      display: none;
      margin-top: 24px;
      padding: 20px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
    }
    .result.valid { border-color: rgba(0,229,255,0.3); }
    .result.invalid { border-color: rgba(255,45,85,0.3); }
    .result.redeemed { border-color: rgba(255,136,0,0.3); }
    .result.activated { border-color: rgba(0,255,159,0.3); }

    .result-status {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 12px;
      font-weight: 700;
    }
    .result.valid .result-status { color: var(--cyan); }
    .result.invalid .result-status { color: var(--red); }
    .result.redeemed .result-status { color: var(--amber); }
    .result.activated .result-status { color: var(--mint); }

    .result-detail {
      font-size: 11px;
      color: var(--text-dim);
      line-height: 1.7;
      margin-bottom: 4px;
    }
    .result-detail .label {
      color: var(--text-muted);
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .unlock-list {
      list-style: none;
      padding: 0;
      margin: 12px 0;
    }
    .unlock-list li {
      font-size: 11px;
      color: var(--text);
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .unlock-list li::before {
      content: '\25C6';
      color: var(--cyan);
      font-size: 6px;
    }

    .redeem-section {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .redeem-section label {
      display: block;
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .redeem-section input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 10px;
      font-family: inherit;
      font-size: 12px;
      outline: none;
      margin-bottom: 8px;
    }
    .redeem-section input:focus { border-color: rgba(255,255,255,0.25); }
    .redeem-section input::placeholder { color: rgba(255,255,255,0.12); }

    .error-msg {
      color: var(--red);
      font-size: 10px;
      letter-spacing: 1px;
      margin-top: 8px;
    }

    .buy-prompt {
      margin-top: 32px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .buy-prompt p {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    @media (max-width: 480px) {
      .page { padding: 16px 12px 40px; }
      .code-segment { width: 56px; font-size: 13px; padding: 10px 4px; letter-spacing: 2px; }
      .code-input-group { gap: 3px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <a href="/" class="logo">cbay</a>
      <div class="topbar-links">
        <a href="/store">store</a>
        <a href="/unlock" class="active">unlock</a>
      </div>
    </div>

    <div class="main">
      <h1 class="heading">enter access code</h1>
      <p class="sub">
        Purchased from the cbay store? Enter your HMAC-signed access code to verify and activate your instruments.
      </p>

      <div class="code-input-group">
        <span class="code-prefix">CBAY</span>
        <span class="code-sep">&mdash;</span>
        <input class="code-segment" id="seg1" maxlength="4" placeholder="&middot;&middot;&middot;&middot;" autocomplete="off" spellcheck="false">
        <span class="code-sep">&mdash;</span>
        <input class="code-segment" id="seg2" maxlength="4" placeholder="&middot;&middot;&middot;&middot;" autocomplete="off" spellcheck="false">
        <span class="code-sep">&mdash;</span>
        <input class="code-segment" id="seg3" maxlength="4" placeholder="&middot;&middot;&middot;&middot;" autocomplete="off" spellcheck="false">
        <span class="code-sep">&mdash;</span>
        <input class="code-segment" id="seg4" maxlength="4" placeholder="&middot;&middot;&middot;&middot;" autocomplete="off" spellcheck="false">
      </div>
      <p class="hint">format: CBAY-XXXX-XXXX-XXXX-XXXX</p>

      <div style="display:flex;gap:8px;">
        <button class="btn btn-primary" id="btn-verify">verify code</button>
      </div>

      <div id="error" class="error-msg" style="display:none;"></div>

      <!-- Result panel -->
      <div class="result" id="result">
        <div class="result-status" id="result-status">&mdash;</div>

        <div id="result-details"></div>

        <div class="redeem-section" id="redeem-section" style="display:none;">
          <label>device identifier</label>
          <input type="text" id="device-id" placeholder="e.g. your-device-name or app install ID">
          <div style="display:flex;gap:8px;">
            <button class="btn btn-primary" id="btn-redeem">redeem &amp; activate</button>
          </div>
          <div id="redeem-error" class="error-msg" style="display:none;"></div>
        </div>
      </div>

      <div class="buy-prompt">
        <p>don't have a code?</p>
        <a href="/store" class="btn btn-secondary">browse the store</a>
      </div>
    </div>
  </div>

  <script>
    (function() {
      var segments = [
        document.getElementById('seg1'),
        document.getElementById('seg2'),
        document.getElementById('seg3'),
        document.getElementById('seg4')
      ];

      // Auto-advance and format
      segments.forEach(function(seg, i) {
        seg.addEventListener('input', function() {
          this.value = this.value.toUpperCase().replace(/[^A-F0-9]/g, '');
          if (this.value.length === 4 && i < segments.length - 1) {
            segments[i + 1].focus();
          }
        });
        seg.addEventListener('keydown', function(e) {
          if (e.key === 'Backspace' && this.value.length === 0 && i > 0) {
            segments[i - 1].focus();
          }
        });
      });

      // Handle paste of full code
      segments[0].addEventListener('paste', function(e) {
        e.preventDefault();
        var text = (e.clipboardData || window.clipboardData).getData('text').trim().toUpperCase();
        // strip CBAY- prefix if present
        text = text.replace(/^CBAY[-\u2013\u2014]/, '');
        var parts = text.split(/[-\u2013\u2014]/);
        if (parts.length >= 4) {
          for (var i = 0; i < 4; i++) {
            segments[i].value = (parts[i] || '').substring(0, 4);
          }
        } else if (parts.length === 1 && text.length >= 16) {
          // Pasted as continuous hex
          for (var j = 0; j < 4; j++) {
            segments[j].value = text.substring(j * 4, j * 4 + 4);
          }
        }
      });

      function getCode() {
        return 'CBAY-' + segments[0].value + '-' + segments[1].value + '-' + segments[2].value + '-' + segments[3].value;
      }

      function showError(id, msg) {
        var el = document.getElementById(id);
        el.textContent = msg;
        el.style.display = msg ? 'block' : 'none';
      }

      // Verify
      document.getElementById('btn-verify').addEventListener('click', function() {
        var code = getCode();
        if (code.length !== 24) {
          showError('error', 'enter all four code segments');
          return;
        }

        showError('error', '');
        this.disabled = true;
        this.textContent = 'verifying...';

        fetch('/api/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code: code })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          document.getElementById('btn-verify').disabled = false;
          document.getElementById('btn-verify').textContent = 'verify code';

          var resultEl = document.getElementById('result');
          var statusEl = document.getElementById('result-status');
          var detailsEl = document.getElementById('result-details');
          var redeemEl = document.getElementById('redeem-section');

          resultEl.style.display = 'block';
          redeemEl.style.display = 'none';
          resultEl.className = 'result';

          if (data.error || data.valid === false) {
            resultEl.classList.add('invalid');
            statusEl.textContent = 'invalid code';
            detailsEl.innerHTML = '<p class="result-detail">' + (data.error || 'code not recognized') + '</p>';
            return;
          }

          if (data.redeemed) {
            resultEl.classList.add('redeemed');
            statusEl.textContent = 'already redeemed';
            detailsEl.innerHTML =
              '<p class="result-detail"><span class="label">product:</span> ' + data.product + '</p>' +
              '<p class="result-detail"><span class="label">redeemed:</span> ' + new Date(data.redeemedAt).toLocaleDateString() + '</p>';
            return;
          }

          resultEl.classList.add('valid');
          statusEl.textContent = 'valid \u2014 ready to activate';
          var html =
            '<p class="result-detail"><span class="label">product:</span> ' + data.product + '</p>' +
            '<p class="result-detail"><span class="label">unlocks:</span></p>' +
            '<ul class="unlock-list">';
          for (var i = 0; i < data.unlocks.length; i++) {
            html += '<li>' + data.unlocks[i] + '</li>';
          }
          html += '</ul>';
          detailsEl.innerHTML = html;
          redeemEl.style.display = 'block';
        })
        .catch(function() {
          document.getElementById('btn-verify').disabled = false;
          document.getElementById('btn-verify').textContent = 'verify code';
          showError('error', 'network error \u2014 try again');
        });
      });

      // Redeem
      document.getElementById('btn-redeem').addEventListener('click', function() {
        var deviceId = document.getElementById('device-id').value.trim();
        if (!deviceId) {
          showError('redeem-error', 'enter a device identifier');
          return;
        }

        showError('redeem-error', '');
        this.disabled = true;
        this.textContent = 'redeeming...';

        fetch('/api/redeem', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code: getCode(), deviceId: deviceId })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          document.getElementById('btn-redeem').disabled = false;
          document.getElementById('btn-redeem').textContent = 'redeem & activate';

          if (data.error) {
            showError('redeem-error', data.error);
            return;
          }

          var resultEl = document.getElementById('result');
          resultEl.className = 'result activated';
          resultEl.style.display = 'block';
          document.getElementById('result-status').textContent = 'activated \u2713';
          document.getElementById('result-details').innerHTML =
            '<p class="result-detail" style="color:var(--mint);">Code redeemed and bound to your device. Full access granted.</p>' +
            '<ul class="unlock-list">' +
            data.unlocks.map(function(u) { return '<li>' + u + '</li>'; }).join('') +
            '</ul>';
          document.getElementById('redeem-section').style.display = 'none';
        })
        .catch(function() {
          document.getElementById('btn-redeem').disabled = false;
          document.getElementById('btn-redeem').textContent = 'redeem & activate';
          showError('redeem-error', 'network error \u2014 try again');
        });
      });
    })();
  </script>
</body>
</html>
