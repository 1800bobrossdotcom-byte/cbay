<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" width="640" height="400">
  <defs>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e0c0a"/>
      <stop offset="100%" stop-color="#080604"/>
    </linearGradient>
  </defs>
  <!-- phone frame -->
  <rect x="200" y="20" width="240" height="360" rx="20" fill="#1a1818" stroke="#333" stroke-width="1"/>
  <rect x="210" y="40" width="220" height="310" rx="4" fill="url(#screen)"/>
  <!-- camera view with glitch effect -->
  <rect x="230" y="60" width="180" height="180" fill="#0c0a08"/>
  <!-- pixel sort streaks -->
  <g opacity="0.7">
    <rect x="240" y="60" width="2" height="80" fill="#cc6633"/>
    <rect x="260" y="80" width="3" height="100" fill="#dd7744"/>
    <rect x="285" y="60" width="2" height="120" fill="#cc6633"/>
    <rect x="310" y="70" width="3" height="90" fill="#dd7744"/>
    <rect x="335" y="60" width="2" height="110" fill="#cc6633"/>
    <rect x="355" y="85" width="3" height="60" fill="#dd7744"/>
    <rect x="375" y="60" width="2" height="100" fill="#cc6633"/>
    <rect x="395" y="75" width="2" height="80" fill="#dd7744"/>
  </g>
  <!-- VHS tracking distortion -->
  <rect x="230" y="150" width="180" height="8" fill="#cc6633" opacity="0.15"/>
  <rect x="220" y="190" width="200" height="3" fill="#ff0080" opacity="0.1"/>
  <!-- chromatic aberration blocks -->
  <rect x="260" y="170" width="60" height="40" fill="none" stroke="#00ffff" stroke-width="1" opacity="0.2" transform="translate(-2,1)"/>
  <rect x="260" y="170" width="60" height="40" fill="none" stroke="#ff0080" stroke-width="1" opacity="0.2" transform="translate(2,-1)"/>
  <rect x="260" y="170" width="60" height="40" fill="none" stroke="#cc6633" stroke-width="1" opacity="0.4"/>
  <!-- VHS date -->
  <text x="240" y="232" font-family="monospace" font-size="7" fill="#cc8833" opacity="0.5">APR 07 2026  3:14PM</text>
  <!-- rune border decoration -->
  <text x="230" y="55" font-family="serif" font-size="5" fill="#886644" opacity="0.3" letter-spacing="2">ᚠ ᚢ ᚦ ᚨ ᚱ ᚲ ᚷ ᚹ ᚺ ᚾ ᛁ ᛃ ᛈ ᛇ ᛊ ᛏ ᛒ ᛖ ᛗ</text>
  <!-- mode buttons -->
  <g font-family="monospace" font-size="6" fill="#cc6633" opacity="0.5">
    <rect x="230" y="255" width="24" height="14" rx="2" fill="#cc6633" fill-opacity="0.15" stroke="#cc6633" stroke-width="0.5" opacity="0.5"/>
    <text x="234" y="265">SRT</text>
    <rect x="258" y="255" width="24" height="14" rx="2" fill="none" stroke="#cc6633" stroke-width="0.5" opacity="0.3"/>
    <text x="262" y="265">VHS</text>
    <rect x="286" y="255" width="24" height="14" rx="2" fill="none" stroke="#cc6633" stroke-width="0.5" opacity="0.3"/>
    <text x="290" y="265">BND</text>
    <rect x="314" y="255" width="24" height="14" rx="2" fill="none" stroke="#cc6633" stroke-width="0.5" opacity="0.3"/>
    <text x="318" y="265">MOD</text>
    <rect x="342" y="255" width="24" height="14" rx="2" fill="none" stroke="#cc6633" stroke-width="0.5" opacity="0.3"/>
    <text x="346" y="265">MLT</text>
  </g>
  <!-- slider -->
  <rect x="230" y="285" width="180" height="2" rx="1" fill="#1a1410"/>
  <rect x="230" y="285" width="130" height="2" rx="1" fill="#884422" opacity="0.6"/>
  <circle cx="360" cy="286" r="4" fill="#cc6633" opacity="0.7"/>
  <!-- HUD -->
  <text x="240" y="78" font-family="monospace" font-size="8" fill="#cc6633" opacity="0.6">SORT</text>
  <text x="380" y="78" font-family="monospace" font-size="7" fill="#886644" opacity="0.4">30fps</text>
</svg>
