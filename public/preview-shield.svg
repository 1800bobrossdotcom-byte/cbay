<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" width="640" height="400">
  <defs>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e0608"/>
      <stop offset="100%" stop-color="#080406"/>
    </linearGradient>
  </defs>
  <!-- phone frame -->
  <rect x="200" y="20" width="240" height="360" rx="20" fill="#1a0a10" stroke="#3a1a2a" stroke-width="1"/>
  <rect x="210" y="40" width="220" height="310" rx="4" fill="url(#screen)"/>
  <!-- shield status area -->
  <rect x="225" y="55" width="190" height="70" rx="6" fill="#1a0a10" stroke="#FF2D55" stroke-width="0.5" opacity="0.3"/>
  <!-- shield icon -->
  <path d="M310,65 L310,65 Q310,62 320,60 Q330,62 330,65 L330,85 Q330,95 320,100 Q310,95 310,85 Z" fill="#FF2D55" fill-opacity="0.2" stroke="#FF2D55" stroke-width="1" opacity="0.7"/>
  <!-- check mark inside shield -->
  <path d="M315,82 L319,87 L326,76" fill="none" stroke="#FF2D55" stroke-width="1.5" opacity="0.8"/>
  <!-- status text -->
  <text x="345" y="78" font-family="monospace" font-size="9" fill="#FF2D55" opacity="0.8" font-weight="bold">ACTIVE</text>
  <text x="345" y="92" font-family="monospace" font-size="6" fill="#FF2D55" opacity="0.4">All threats blocked</text>
  <!-- detection log area -->
  <text x="235" y="145" font-family="monospace" font-size="7" fill="#FF2D55" opacity="0.5">DETECTION LOG</text>
  <g font-family="monospace" font-size="6" fill="#FF2D55" opacity="0.35">
    <rect x="230" y="152" width="180" height="18" rx="2" fill="#1a0a10"/>
    <text x="238" y="164">12:04  Ultrasonic 19.2kHz  BLOCKED</text>
    <rect x="230" y="174" width="180" height="18" rx="2" fill="#1a0a10"/>
    <text x="238" y="186">12:01  Infrasonic 14Hz     BLOCKED</text>
    <rect x="230" y="196" width="180" height="18" rx="2" fill="#1a0a10"/>
    <text x="238" y="208">11:58  RF anomaly 2.4GHz   FLAGGED</text>
    <rect x="230" y="218" width="180" height="18" rx="2" fill="#0e0608"/>
    <text x="238" y="230">11:55  Background clear     OK</text>
  </g>
  <!-- spectrum monitor -->
  <rect x="230" y="248" width="180" height="50" rx="4" fill="#0e0608" stroke="#FF2D55" stroke-width="0.3" opacity="0.3"/>
  <text x="238" y="260" font-family="monospace" font-size="6" fill="#FF2D55" opacity="0.4">LIVE SPECTRUM</text>
  <!-- frequency bars -->
  <g fill="#FF2D55" opacity="0.4">
    <rect x="238" y="288" width="4" height="-12" rx="1"/>
    <rect x="246" y="288" width="4" height="-20" rx="1"/>
    <rect x="254" y="288" width="4" height="-8" rx="1"/>
    <rect x="262" y="288" width="4" height="-25" rx="1"/>
    <rect x="270" y="288" width="4" height="-15" rx="1"/>
    <rect x="278" y="288" width="4" height="-10" rx="1"/>
    <rect x="286" y="288" width="4" height="-18" rx="1"/>
    <rect x="294" y="288" width="4" height="-22" rx="1"/>
    <rect x="302" y="288" width="4" height="-6" rx="1"/>
    <rect x="310" y="288" width="4" height="-14" rx="1"/>
    <rect x="318" y="288" width="4" height="-28" rx="1"/>
    <rect x="326" y="288" width="4" height="-16" rx="1"/>
    <rect x="334" y="288" width="4" height="-10" rx="1"/>
    <rect x="342" y="288" width="4" height="-20" rx="1"/>
    <rect x="350" y="288" width="4" height="-8" rx="1"/>
    <rect x="358" y="288" width="4" height="-14" rx="1"/>
    <rect x="366" y="288" width="4" height="-18" rx="1"/>
    <rect x="374" y="288" width="4" height="-6" rx="1"/>
    <rect x="382" y="288" width="4" height="-12" rx="1"/>
    <rect x="390" y="288" width="4" height="-22" rx="1"/>
    <rect x="398" y="288" width="4" height="-10" rx="1"/>
  </g>
  <!-- bottom bar -->
  <rect x="230" y="310" width="180" height="20" fill="#0e0608"/>
  <text x="240" y="324" font-family="monospace" font-size="7" fill="#FF2D55" opacity="0.5">● MONITORING</text>
  <text x="370" y="324" font-family="monospace" font-size="6" fill="#FF2D55" opacity="0.4">24/7</text>
</svg>
