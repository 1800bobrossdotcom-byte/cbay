<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1414"/>
      <stop offset="100%" stop-color="#0e0c0c"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- film strip perforations -->
  <g fill="#2a1a1a" opacity="0.4">
    <rect x="40" y="100" width="20" height="14" rx="2"/>
    <rect x="40" y="140" width="20" height="14" rx="2"/>
    <rect x="40" y="180" width="20" height="14" rx="2"/>
    <rect x="40" y="220" width="20" height="14" rx="2"/>
    <rect x="40" y="260" width="20" height="14" rx="2"/>
    <rect x="40" y="300" width="20" height="14" rx="2"/>
    <rect x="40" y="340" width="20" height="14" rx="2"/>
    <rect x="452" y="100" width="20" height="14" rx="2"/>
    <rect x="452" y="140" width="20" height="14" rx="2"/>
    <rect x="452" y="180" width="20" height="14" rx="2"/>
    <rect x="452" y="220" width="20" height="14" rx="2"/>
    <rect x="452" y="260" width="20" height="14" rx="2"/>
    <rect x="452" y="300" width="20" height="14" rx="2"/>
    <rect x="452" y="340" width="20" height="14" rx="2"/>
  </g>
  <!-- film strip borders -->
  <line x1="70" y1="80" x2="70" y2="370" stroke="#3a2020" stroke-width="1"/>
  <line x1="442" y1="80" x2="442" y2="370" stroke="#3a2020" stroke-width="1"/>
  <!-- frame -->
  <rect x="100" y="120" width="312" height="200" rx="4" fill="#0a0808" stroke="#cc4433" stroke-width="2" opacity="0.6"/>
  <!-- play triangle -->
  <polygon points="230,190 230,270 300,230" fill="none" stroke="#cc4433" stroke-width="3" opacity="0.7"/>
  <polygon points="230,190 230,270 300,230" fill="#cc4433" opacity="0.15"/>
  <!-- timeline bar -->
  <rect x="100" y="340" width="312" height="4" rx="2" fill="#2a1a1a"/>
  <rect x="100" y="340" width="180" height="4" rx="2" fill="#cc4433" opacity="0.6"/>
  <circle cx="280" cy="342" r="6" fill="#cc4433" opacity="0.8"/>
  <!-- REC dot -->
  <circle cx="380" cy="150" r="6" fill="#cc3333"/>
  <!-- label -->
  <text x="256" y="410" text-anchor="middle" font-family="monospace" font-size="32" font-weight="bold" fill="#cc4433" letter-spacing="8" opacity="0.9">TAKE</text>
  <text x="256" y="440" text-anchor="middle" font-family="monospace" font-size="12" fill="#884433" letter-spacing="3" opacity="0.6">SHORT-FORM VIDEO</text>
</svg>
