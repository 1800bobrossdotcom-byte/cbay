<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TONES — cbay</title>
  <link rel="manifest" href="data:application/json,%7B%22name%22%3A%22TONES%22%2C%22short_name%22%3A%22TONES%22%2C%22start_url%22%3A%22%2Ftones%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%230a0a14%22%2C%22theme_color%22%3A%22%23A855F7%22%7D">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a14">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #1a1814;
      --surface: rgba(200,180,140,0.12);
      --surface-hover: rgba(200,180,140,0.18);
      --border: rgba(200,180,140,0.20);
      --border-hover: rgba(200,180,140,0.28);
      --text: #e8e0d0;
      --text-dim: rgba(220,210,190,0.80);
      --text-muted: rgba(220,210,190,0.55);
      --accent: #A855F7;
      --accent-dim: rgba(168,85,247,0.26);
      --accent-border: rgba(168,85,247,0.50);
      --accent-glow: rgba(168,85,247,0.24);
      --radius: 6px;
      --knob: linear-gradient(135deg, #b8a87c 0%, #6a5e48 50%, #b8a87c 100%);
    }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -webkit-user-select: none; user-select: none;
      touch-action: manipulation;
    }
    #app { display: flex; flex-direction: column; width: 100%; height: 100dvh; }

    /* ── Topbar ── */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      height: 48px; padding: 0 16px;
      background: rgba(6,6,16,0.85);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0; z-index: 10; position: relative;
    }
    .topbar a {
      color: var(--accent); text-decoration: none;
      font-size: 14px; letter-spacing: 2px; font-weight: 500;
      opacity: 0.8; transition: opacity 0.2s;
    }
    .topbar a:hover { opacity: 1; }
    .topbar .title {
      font-size: 13px; letter-spacing: 5px; text-transform: uppercase;
      color: var(--text-dim); font-weight: 700;
      position: absolute; left: 50%; transform: translateX(-50%);
    }
    .topbar .mode-label {
      font-size: 12px; letter-spacing: 2px; color: var(--accent); font-weight: 600;
    }
    .topbar .controls { display: flex; gap: 8px; align-items: center; }
    .topbar .controls button {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); width: 42px; height: 42px;
      font-size: 18px; cursor: pointer; display: flex; align-items: center;
      justify-content: center; font-family: inherit; transition: border-color 0.2s, background 0.2s;
    }
    .topbar .controls button:hover { border-color: var(--border-hover); }
    .topbar .controls button:active { background: var(--accent-dim); border-color: var(--accent-border); }

    /* ── Main ── */
    .main { flex: 1; display: flex; flex-direction: column; padding: 16px; overflow-y: auto; gap: 14px; }

    /* ── Visualizer ── */
    .viz {
      width: 100%; height: 120px; border-radius: var(--radius);
      background: var(--surface); border: 1px solid var(--border); flex-shrink: 0;
    }

    /* ── Mode buttons ── */
    .modes { display: flex; gap: 6px; flex-wrap: wrap; }
    .modes button {
      font-family: inherit; font-size: 13px; letter-spacing: 1.5px; text-transform: uppercase;
      padding: 12px 18px; border-radius: var(--radius);
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text-dim); cursor: pointer; transition: all 0.2s;
      min-height: 44px;
    }
    .modes button:hover { border-color: var(--border-hover); color: var(--text); background: var(--surface-hover); }
    .modes button.active {
      background: var(--accent-dim); border-color: var(--accent-border); color: var(--accent);
      box-shadow: 0 0 20px var(--accent-glow);
    }

    /* ── Preset selector ── */
    .presets { display: flex; flex-direction: column; gap: 6px; }
    .presets-label { font-size: 12px; letter-spacing: 2px; color: var(--text-muted); text-transform: uppercase; }
    .preset-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 6px; }
    .preset-grid button {
      font-family: inherit; font-size: 12px; padding: 14px 12px;
      border-radius: var(--radius); border: 1px solid var(--border);
      background: var(--surface); color: var(--text);
      cursor: pointer; transition: all 0.2s; text-align: left;
      min-height: 44px;
    }
    .preset-grid button:hover { border-color: var(--border-hover); background: var(--surface-hover); }
    .preset-grid button.active {
      background: var(--accent-dim); border-color: var(--accent-border); color: var(--accent);
    }
    .preset-grid button .hz { font-size: 11px; color: var(--text-muted); display: block; margin-top: 3px; }

    /* ── Slider ── */
    .slider-row { display: flex; align-items: center; gap: 12px; padding: 4px 0; }
    .slider-label { font-size: 12px; letter-spacing: 1.5px; color: var(--text-muted); text-transform: uppercase; width: 60px; flex-shrink: 0; }
    .slider-row input[type=range] {
      flex: 1; -webkit-appearance: none; height: 4px; border-radius: 2px;
      background: rgba(255,255,255,0.08); outline: none;
    }
    .slider-row input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 30px; height: 30px; border-radius: 50%;
      background: var(--accent); cursor: pointer; box-shadow: 0 0 12px var(--accent-glow);
    }
    .slider-val { font-size: 13px; color: var(--text-dim); width: 36px; text-align: right; }

    /* ── Info bar ── */
    .info-bar {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 12px; letter-spacing: 1px; color: var(--text-muted);
      padding: 10px 0; border-top: 1px solid var(--border); margin-top: auto;
    }

    .share-toast {
      position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
      background: var(--accent); color: var(--bg); padding: 10px 20px;
      border-radius: 10px; font-size: 13px; letter-spacing: 1.5px;
      text-transform: uppercase; font-weight: 700; z-index: 200;
      opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    .share-toast.show { opacity: 1; }

    @media (max-width: 380px) {
      .main { padding: 10px; gap: 10px; }
      .modes button { padding: 10px 12px; font-size: 10px; }
      .preset-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
    }

    /* ══ Vintage Tube Radio Chassis ══ */
    body {
      background: #0c0a07;
      background-image:
        repeating-linear-gradient(87deg, transparent 0, transparent 40px, rgba(120,80,40,0.04) 40px, rgba(120,80,40,0.04) 41px),
        repeating-linear-gradient(0deg, transparent 0, transparent 2px, rgba(120,80,40,0.025) 2px, rgba(120,80,40,0.025) 3px),
        repeating-linear-gradient(93deg, transparent 0, transparent 80px, rgba(90,60,30,0.03) 80px, rgba(90,60,30,0.03) 81px);
    }
    #app {
      max-width: 600px; margin: 0 auto;
      border-left: 3px solid rgba(180,140,80,0.08);
      border-right: 3px solid rgba(180,140,80,0.08);
      box-shadow: 4px 0 20px rgba(0,0,0,0.4), -4px 0 20px rgba(0,0,0,0.4);
    }
    .topbar {
      background: linear-gradient(180deg, #1a1610 0%, #12100b 100%);
      border-bottom: 3px solid rgba(180,140,80,0.12);
      box-shadow: 0 3px 10px rgba(0,0,0,0.6), inset 0 -1px 0 rgba(200,160,80,0.05);
    }
    .topbar .title {
      font-family: 'Courier New', Courier, monospace;
      color: rgba(200,170,110,0.5);
      text-shadow: 0 0 15px rgba(200,170,110,0.15);
      letter-spacing: 8px;
    }
    .topbar .mode-label {
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px; font-weight: 700;
      text-shadow: 0 0 14px var(--accent), 0 0 30px var(--accent-glow);
    }
    .topbar .controls button {
      background: linear-gradient(180deg, #1e1a14 0%, #0e0c08 100%);
      border: 2px solid rgba(180,140,80,0.12);
      border-radius: 6px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .topbar .controls button:active { box-shadow: inset 0 3px 6px rgba(0,0,0,0.6); transform: translateY(1px); }

    .main {
      background: linear-gradient(180deg, rgba(30,25,18,0.7) 0%, rgba(16,12,8,0.9) 100%);
      box-shadow: inset 0 0 80px rgba(0,0,0,0.3);
    }

    /* CRT Visualizer */
    .viz {
      background: #050504;
      border: 3px solid rgba(180,140,80,0.10);
      border-radius: 10px;
      box-shadow:
        inset 0 0 60px rgba(0,0,0,0.9),
        inset 0 0 20px rgba(168,85,247,0.04),
        0 2px 0 rgba(180,140,80,0.06),
        0 -1px 0 rgba(0,0,0,0.4),
        0 4px 12px rgba(0,0,0,0.4);
      position: relative;
      overflow: hidden;
    }
    .viz::after {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(0deg, transparent 0, transparent 2px, rgba(0,0,0,0.2) 2px, rgba(0,0,0,0.2) 4px);
      pointer-events: none;
      border-radius: 10px;
    }

    /* Chunky toggle-switch buttons */
    .modes button {
      background: linear-gradient(180deg, #201c14 0%, #100e08 100%);
      border: 2px solid rgba(180,140,80,0.12);
      border-radius: 8px;
      box-shadow:
        0 4px 8px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.05),
        inset 0 -1px 0 rgba(0,0,0,0.3);
      font-family: 'Courier New', Courier, monospace;
      font-weight: 700;
      text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    }
    .modes button:hover {
      border-color: rgba(180,140,80,0.20);
      background: linear-gradient(180deg, #241e16 0%, #141008 100%);
    }
    .modes button:active {
      box-shadow: inset 0 4px 10px rgba(0,0,0,0.7);
      transform: translateY(2px);
    }
    .modes button.active {
      background: linear-gradient(180deg, #1c1620 0%, #0e0a18 100%);
      border-color: rgba(168,85,247,0.35);
      color: var(--accent);
      box-shadow:
        inset 0 3px 10px rgba(0,0,0,0.5),
        0 0 24px var(--accent-glow),
        0 0 50px rgba(168,85,247,0.06);
      text-shadow: 0 0 12px rgba(168,85,247,0.6);
    }

    /* Engraved brass preset plates */
    .presets-label {
      font-family: 'Courier New', Courier, monospace;
      letter-spacing: 3px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }
    .preset-grid button {
      background: linear-gradient(180deg, #1a1610 0%, #0e0c06 100%);
      border: 2px solid rgba(180,140,80,0.10);
      border-radius: 6px;
      box-shadow: 0 3px 6px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.03);
      font-family: 'Courier New', Courier, monospace;
      text-transform: uppercase; font-size: 11px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    }
    .preset-grid button .hz {
      font-family: 'Courier New', Courier, monospace;
      color: rgba(168,85,247,0.35);
    }
    .preset-grid button:hover { border-color: rgba(180,140,80,0.18); }
    .preset-grid button.active {
      border-color: rgba(168,85,247,0.30);
      box-shadow: inset 0 3px 8px rgba(0,0,0,0.5), 0 0 18px rgba(168,85,247,0.1);
      color: var(--accent);
    }
    .preset-grid button.active .hz { color: rgba(168,85,247,0.6); }

    /* Heavy-duty fader channel */
    .slider-label {
      font-family: 'Courier New', Courier, monospace;
      font-weight: 700;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }
    .slider-row input[type=range] {
      height: 10px;
      background: #060504;
      border: 2px solid rgba(180,140,80,0.08);
      border-radius: 5px;
      box-shadow: inset 0 3px 8px rgba(0,0,0,0.8), inset 0 0 2px rgba(0,0,0,0.5);
    }
    .slider-row input[type=range]::-webkit-slider-thumb {
      background: linear-gradient(135deg, #d0b880 0%, #8a7450 25%, #e0cc98 50%, #8a7450 75%, #d0b880 100%);
      border: 2px solid rgba(80,60,30,0.7);
      box-shadow: 0 3px 10px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.25), 0 1px 0 rgba(200,170,100,0.1);
      width: 34px; height: 34px;
    }
    .slider-val {
      font-family: 'Courier New', Courier, monospace;
      color: rgba(168,85,247,0.8);
      text-shadow: 0 0 10px rgba(168,85,247,0.4);
      font-weight: 700;
    }

    /* Nixie-tube info readout */
    .info-bar {
      font-family: 'Courier New', Courier, monospace;
      border-top: 3px solid rgba(180,140,80,0.08);
    }
    #freqInfo {
      color: rgba(168,85,247,0.85);
      text-shadow: 0 0 12px rgba(168,85,247,0.4), 0 0 25px rgba(168,85,247,0.15);
      font-size: 14px; font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="share-toast" id="shareToast">link copied</div>
  <div id="app">
    <div class="topbar">
      <a href="/apps" aria-label="Back to apps">&larr; apps</a>
      <span class="title">TONES</span>
      <div class="controls">
        <span class="mode-label" id="modeLabel">OFF</span>
        <button id="shareBtn" title="share">&#x2197;</button>
      </div>
    </div>

    <div class="main">
      <canvas class="viz" id="viz" aria-label="Waveform visualizer"></canvas>

      <div class="modes" id="modes" role="group" aria-label="Sound modes">
        <button data-mode="healing">Healing</button>
        <button data-mode="binaural">Binaural</button>
        <button data-mode="pink">Pink</button>
        <button data-mode="brown">Brown</button>
        <button data-mode="ocean">Ocean</button>
        <button data-mode="off" class="active">Off</button>
      </div>

      <div class="presets" id="presetSection">
        <span class="presets-label" id="presetLabel">solfeggio frequency</span>
        <div class="preset-grid" id="presetGrid" role="group" aria-label="Frequency presets"></div>
      </div>

      <div class="slider-row">
        <span class="slider-label">Volume</span>
        <input type="range" id="volume" min="0" max="100" value="50" aria-label="Volume">
        <span class="slider-val" id="volVal">50</span>
      </div>

      <div class="info-bar">
        <span id="freqInfo">528 Hz</span>
        <span>cbay.ing/tones</span>
      </div>
    </div>
  </div>

<script>
(function(){
  /* ── Share ── */
  var shareBtn = document.getElementById('shareBtn');
  var shareToast = document.getElementById('shareToast');
  shareBtn.addEventListener('pointerdown', function(e) {
    e.preventDefault();
    if (navigator.share) {
      navigator.share({ title: 'TONES — cbay.ing', url: window.location.href }).catch(function(){});
    } else {
      navigator.clipboard.writeText(window.location.href).then(function() {
        shareToast.classList.add('show');
        setTimeout(function() { shareToast.classList.remove('show'); }, 1800);
      }).catch(function(){});
    }
  });

  var ctx = null, masterGain = null, analyser = null;
  var activeNodes = [];
  var currentMode = 'off';
  var volume = 0.5;
  var workletReady = false;

  var SOLFEGGIO = [
    { hz: 174, name: 'Foundation' },
    { hz: 285, name: 'Quantum Field' },
    { hz: 396, name: 'Liberation' },
    { hz: 417, name: 'Transmutation' },
    { hz: 432, name: 'Universal' },
    { hz: 528, name: 'DNA Repair' },
    { hz: 639, name: 'Connection' },
    { hz: 741, name: 'Awakening' },
    { hz: 852, name: 'Third Eye' },
    { hz: 963, name: 'Crown' }
  ];
  var selectedSolf = 5;

  var BINAURAL = [
    { name: 'Schumann 7.83 Hz', beat: 7.83, carrier: 200 },
    { name: 'Alpha 10 Hz', beat: 10, carrier: 200 },
    { name: 'Beta 14 Hz', beat: 14, carrier: 200 },
    { name: 'Gamma 40 Hz', beat: 40, carrier: 200 },
    { name: 'Deep Delta 2 Hz', beat: 2, carrier: 150 },
    { name: 'Theta 6 Hz', beat: 6, carrier: 180 }
  ];
  var selectedBin = 0;

  /* ── AudioWorklet noise processor (inline) ── */
  var workletCode = `
class NoiseProcessor extends AudioWorkletProcessor {
  constructor() {
    super();
    this.type = 'pink';
    this.pinkRows = new Float32Array(7);
    this.pinkSum = 0;
    this.pinkCounter = 0;
    this.brownLast = 0;
    this.oceanLast = 0;
    this.oceanPhase = 0;
    this.port.onmessage = (e) => { this.type = e.data.type; };
  }
  process(inputs, outputs) {
    const out = outputs[0][0];
    if (!out) return true;
    const len = out.length;
    if (this.type === 'pink') {
      for (let i = 0; i < len; i++) {
        this.pinkCounter++;
        for (let r = 0; r < 7; r++) {
          if ((this.pinkCounter & (1 << r)) === 0) {
            this.pinkSum -= this.pinkRows[r];
            this.pinkRows[r] = Math.random() * 2 - 1;
            this.pinkSum += this.pinkRows[r];
          }
        }
        out[i] = (this.pinkSum + Math.random() * 2 - 1) * 0.08;
      }
    } else if (this.type === 'brown') {
      for (let i = 0; i < len; i++) {
        this.brownLast = (this.brownLast + 0.02 * (Math.random() * 2 - 1)) / 1.02;
        out[i] = this.brownLast * 3.5;
      }
    } else if (this.type === 'ocean') {
      for (let i = 0; i < len; i++) {
        this.oceanLast = (this.oceanLast + 0.02 * (Math.random() * 2 - 1)) / 1.02;
        this.oceanPhase += 0.08 / sampleRate;
        if (this.oceanPhase > 1) this.oceanPhase -= 1;
        out[i] = this.oceanLast * 3.5 * (0.5 + 0.5 * Math.sin(this.oceanPhase * Math.PI * 2));
      }
    }
    return true;
  }
}
registerProcessor('noise-processor', NoiseProcessor);
`;

  async function ensureCtx() {
    if (ctx) return;
    ctx = new AudioContext({ sampleRate: 44100 });
    masterGain = ctx.createGain();
    masterGain.gain.value = volume;
    analyser = ctx.createAnalyser();
    analyser.fftSize = 2048;
    masterGain.connect(analyser);
    analyser.connect(ctx.destination);
    // Register AudioWorklet
    try {
      var blob = new Blob([workletCode], { type: 'application/javascript' });
      var url = URL.createObjectURL(blob);
      await ctx.audioWorklet.addModule(url);
      URL.revokeObjectURL(url);
      workletReady = true;
    } catch(e) { workletReady = false; }
    drawViz();
  }

  function stopAll() {
    activeNodes.forEach(function(n) {
      try { if (n.stop) n.stop(); n.disconnect(); } catch(e) {}
    });
    activeNodes = [];
  }

  function setMode(mode) {
    ensureCtx().then(function() {
      stopAll();
      currentMode = mode;
      document.getElementById('modeLabel').textContent = mode.toUpperCase();
      document.querySelectorAll('.modes button').forEach(function(b) {
        b.classList.toggle('active', b.dataset.mode === mode);
      });
      updatePresets();
      if (mode === 'off') return;
      if (mode === 'healing') startHealing();
      else if (mode === 'binaural') startBinaural();
      else if (mode === 'pink') startNoise('pink');
      else if (mode === 'brown') startNoise('brown');
      else if (mode === 'ocean') startNoise('ocean');
    });
  }

  function startHealing() {
    var hz = SOLFEGGIO[selectedSolf].hz;
    document.getElementById('freqInfo').textContent = hz + ' Hz \u2014 ' + SOLFEGGIO[selectedSolf].name;
    var osc = ctx.createOscillator();
    osc.type = 'sine'; osc.frequency.value = hz;
    var g1 = ctx.createGain(); g1.gain.value = 0.85;
    osc.connect(g1); g1.connect(masterGain); osc.start();

    var sub = ctx.createOscillator();
    sub.type = 'sine'; sub.frequency.value = hz / 2;
    var g2 = ctx.createGain(); g2.gain.value = 0.15;
    sub.connect(g2); g2.connect(masterGain); sub.start();
    activeNodes.push(osc, sub, g1, g2);
  }

  function startBinaural() {
    var p = BINAURAL[selectedBin];
    document.getElementById('freqInfo').textContent = p.name;
    var merger = ctx.createChannelMerger(2);
    var oscL = ctx.createOscillator();
    oscL.type = 'sine'; oscL.frequency.value = p.carrier - p.beat / 2;
    var gL = ctx.createGain(); gL.gain.value = 1;
    oscL.connect(gL); gL.connect(merger, 0, 0); oscL.start();

    var oscR = ctx.createOscillator();
    oscR.type = 'sine'; oscR.frequency.value = p.carrier + p.beat / 2;
    var gR = ctx.createGain(); gR.gain.value = 1;
    oscR.connect(gR); gR.connect(merger, 0, 1); oscR.start();
    merger.connect(masterGain);
    activeNodes.push(oscL, oscR, gL, gR, merger);
  }

  function startNoise(type) {
    var labels = { pink: 'Pink Noise', brown: 'Brown Noise', ocean: 'Ocean Ambience' };
    document.getElementById('freqInfo').textContent = labels[type];

    if (workletReady) {
      var node = new AudioWorkletNode(ctx, 'noise-processor');
      node.port.postMessage({ type: type });
      if (type === 'pink') {
        var lp = ctx.createBiquadFilter();
        lp.type = 'lowpass'; lp.frequency.value = 2000; lp.Q.value = 0.7;
        node.connect(lp); lp.connect(masterGain);
        activeNodes.push(node, lp);
      } else if (type === 'ocean') {
        var hp = ctx.createBiquadFilter();
        hp.type = 'highpass'; hp.frequency.value = 40; hp.Q.value = 0.7;
        node.connect(hp); hp.connect(masterGain);
        activeNodes.push(node, hp);
      } else {
        node.connect(masterGain);
        activeNodes.push(node);
      }
    } else {
      // Fallback: buffer-based noise
      var dur = 4, len = ctx.sampleRate * dur;
      var buf = ctx.createBuffer(1, len, ctx.sampleRate);
      var d = buf.getChannelData(0);
      if (type === 'brown') {
        var last = 0;
        for (var i = 0; i < len; i++) { last = (last + 0.02 * (Math.random()*2-1))/1.02; d[i] = last*3.5; }
      } else {
        var rows = new Float32Array(7), sum = 0, cnt = 0;
        for (var i = 0; i < len; i++) {
          cnt++;
          for (var r = 0; r < 7; r++) {
            if ((cnt & (1 << r)) === 0) { sum -= rows[r]; rows[r] = Math.random()*2-1; sum += rows[r]; }
          }
          d[i] = (sum + Math.random()*2-1) * 0.08;
        }
      }
      var src = ctx.createBufferSource();
      src.buffer = buf; src.loop = true;
      src.connect(masterGain); src.start();
      activeNodes.push(src);
    }
  }

  function updatePresets() {
    var grid = document.getElementById('presetGrid');
    var label = document.getElementById('presetLabel');
    var section = document.getElementById('presetSection');
    grid.innerHTML = '';

    if (currentMode === 'healing') {
      section.style.display = '';
      label.textContent = 'solfeggio frequency';
      SOLFEGGIO.forEach(function(s, i) {
        var btn = document.createElement('button');
        btn.innerHTML = s.name + ' <span class="hz">' + s.hz + ' Hz</span>';
        if (i === selectedSolf) btn.classList.add('active');
        btn.addEventListener('click', function() { selectedSolf = i; setMode('healing'); });
        grid.appendChild(btn);
      });
    } else if (currentMode === 'binaural') {
      section.style.display = '';
      label.textContent = 'binaural preset';
      BINAURAL.forEach(function(b, i) {
        var btn = document.createElement('button');
        btn.innerHTML = b.name + ' <span class="hz">' + b.carrier + ' Hz carrier</span>';
        if (i === selectedBin) btn.classList.add('active');
        btn.addEventListener('click', function() { selectedBin = i; setMode('binaural'); });
        grid.appendChild(btn);
      });
    } else {
      section.style.display = 'none';
    }
  }

  document.getElementById('volume').addEventListener('input', function() {
    volume = this.value / 100;
    document.getElementById('volVal').textContent = this.value;
    if (masterGain) masterGain.gain.setTargetAtTime(volume, ctx.currentTime, 0.02);
  });

  document.querySelectorAll('.modes button').forEach(function(btn) {
    btn.addEventListener('click', function() { setMode(this.dataset.mode); });
  });

  function drawViz() {
    var canvas = document.getElementById('viz');
    var c = canvas.getContext('2d');
    function resize() {
      var r = canvas.getBoundingClientRect();
      canvas.width = r.width * devicePixelRatio;
      canvas.height = r.height * devicePixelRatio;
    }
    resize(); window.addEventListener('resize', resize);

    var dataArr = new Uint8Array(analyser.frequencyBinCount);
    function draw() {
      requestAnimationFrame(draw);
      analyser.getByteTimeDomainData(dataArr);
      var w = canvas.width / devicePixelRatio;
      var h = canvas.height / devicePixelRatio;
      c.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
      c.clearRect(0, 0, w, h);
      c.strokeStyle = 'rgba(168,85,247,0.6)';
      c.lineWidth = 1.5;
      c.beginPath();
      var sliceW = w / dataArr.length;
      for (var i = 0; i < dataArr.length; i++) {
        var v = dataArr[i] / 128.0;
        var y = v * h / 2;
        if (i === 0) c.moveTo(0, y); else c.lineTo(i * sliceW, y);
      }
      c.stroke();
      // Glow pass
      c.strokeStyle = 'rgba(168,85,247,0.15)';
      c.lineWidth = 6;
      c.stroke();
    }
    draw();
  }

  updatePresets();
})();
</script>
</body>
