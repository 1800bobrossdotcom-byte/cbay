<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>BREAKS — cbay.ing</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#141e16;--surface:rgba(255,255,255,0.10);--border:rgba(255,255,255,0.18);
  --text:#e8f0e8;--text-dim:rgba(255,255,255,0.78);--text-muted:rgba(255,255,255,0.52);
  --accent:#39FF14;--accent-dim:rgba(57,255,20,0.22);--accent-border:rgba(57,255,20,0.48);
  --accent-glow:rgba(57,255,20,0.22);--pad-bg:rgba(255,255,255,0.09);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  color:var(--text);-webkit-user-select:none;user-select:none;touch-action:manipulation}
#app{display:flex;flex-direction:column;width:100%;height:100%;height:100dvh}

.topbar{display:flex;align-items:center;justify-content:space-between;height:48px;padding:0 12px;
  background:rgba(6,10,8,0.9);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);flex-shrink:0;z-index:10;position:relative}
.topbar a{color:var(--accent);text-decoration:none;font-size:13px;letter-spacing:2px;font-weight:500;opacity:0.7}
.topbar a:hover{opacity:1}
.topbar .title{font-size:12px;letter-spacing:5px;text-transform:uppercase;color:var(--text-dim);
  position:absolute;left:50%;transform:translateX(-50%);font-weight:700;pointer-events:none}
.topbar button{background:var(--surface);border:1px solid var(--border);border-radius:10px;
  color:var(--text);width:38px;height:38px;font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-family:inherit}
.topbar button:active{background:var(--accent-dim);border-color:var(--accent-border)}

.ctrl-bar{display:flex;align-items:center;gap:5px;padding:5px 10px;
  background:rgba(0,0,0,0.3);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.ctrl-bar .lbl{font-size:9px;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase}
.ctrl-bar .val{font-size:12px;color:var(--accent);min-width:24px;text-align:center;
  font-variant-numeric:tabular-nums;letter-spacing:1px}
.ctrl-bar input[type=range]{flex:1;height:4px;-webkit-appearance:none;appearance:none;
  background:var(--border);border-radius:2px;outline:none}
.ctrl-bar input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;
  border-radius:50%;background:var(--accent);border:none;cursor:pointer}
.scale-bar{display:flex;align-items:center;gap:4px;padding:4px 10px;
  background:rgba(0,0,0,0.2);border-bottom:1px solid var(--border);flex-shrink:0}
.scale-btn{padding:5px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface);
  color:var(--accent);font-size:10px;letter-spacing:1.5px;cursor:pointer;font-family:inherit;
  text-transform:uppercase;transition:all 0.15s;-webkit-tap-highlight-color:transparent}
.scale-btn:active{background:var(--accent-dim);border-color:var(--accent)}
.scale-btn .lbl{font-size:7px;letter-spacing:2px;color:var(--text-muted);display:block;margin-bottom:1px}
.oct-btn{padding:4px 8px;border:1px solid var(--border);border-radius:6px;background:var(--surface);
  color:var(--text-muted);font-size:11px;cursor:pointer;font-family:inherit;min-width:28px;text-align:center}
.oct-btn:active{color:var(--accent);border-color:var(--accent)}

/* ── Engine macro bar ── */
.engine-bar{display:flex;gap:1px;padding:4px 6px;overflow-x:auto;flex-shrink:0;
  background:rgba(0,0,0,0.3);border-bottom:1px solid var(--border);
  scrollbar-width:none;-ms-overflow-style:none}
.engine-bar::-webkit-scrollbar{display:none}
.knob{display:flex;flex-direction:column;align-items:center;gap:0;min-width:44px;
  padding:2px 3px;flex:1;flex-shrink:0}
.knob .lbl{font-size:8px;letter-spacing:1.5px;color:var(--text-muted);text-transform:uppercase;line-height:1;font-weight:600}
.knob input[type=range]{width:100%;min-width:32px;height:5px;-webkit-appearance:none;appearance:none;
  background:var(--border);border-radius:3px;outline:none;margin:3px 0 2px}
.knob input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;
  border-radius:50%;background:var(--accent);border:2px solid rgba(255,255,255,0.2);cursor:pointer;
  box-shadow:0 0 6px var(--accent-glow)}
.knob .val{font-size:8px;color:var(--accent);font-variant-numeric:tabular-nums;
  letter-spacing:0.5px;line-height:1;opacity:0.85}

.pad-grid{flex:1;display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding:6px;
  min-height:0;align-content:center;max-width:480px;margin:0 auto;width:100%}
.pad{border-radius:10px;background:var(--pad-bg);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1px;
  cursor:pointer;transition:transform 0.06s,background 0.06s,border-color 0.15s,box-shadow 0.18s;
  -webkit-tap-highlight-color:transparent;aspect-ratio:1;position:relative;min-height:0;touch-action:none}
.pad:active,.pad.flash{transform:scale(0.92);background:var(--accent-dim);border-color:var(--accent)}
.pad.sel{border-color:var(--accent);box-shadow:0 0 12px var(--accent-glow)}
.pad .nm{font-size:11px;letter-spacing:1px;color:var(--text-dim);text-transform:uppercase;
  text-align:center;line-height:1.2;pointer-events:none;font-weight:600}
.pad .sub{font-size:7px;color:var(--text-muted);pointer-events:none;letter-spacing:1px}
.pad .idx{position:absolute;top:4px;left:6px;font-size:7px;color:var(--text-muted);pointer-events:none}

.pattern-bar{display:flex;align-items:center;justify-content:center;gap:3px;
  padding:5px 8px;background:rgba(0,0,0,0.3);border-top:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.seg{display:flex;gap:3px}
.seg .sep{width:1px;background:var(--border);margin:0 3px}
.pbtn{padding:4px 8px;border:1px solid var(--border);border-radius:6px;background:var(--surface);
  color:var(--text-muted);font-size:9px;letter-spacing:1px;cursor:pointer;
  font-family:inherit;text-transform:uppercase;transition:all 0.15s}
.pbtn.on{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.pbtn.has-data{color:var(--text-dim)}

.step-wrap{display:flex;gap:2px;padding:5px 8px;overflow-x:auto;flex-shrink:0;
  background:rgba(0,0,0,0.25);border-top:1px solid var(--border);
  scrollbar-width:none;-ms-overflow-style:none}
.step-wrap::-webkit-scrollbar{display:none}
.step{flex:0 0 auto;width:22px;height:28px;border-radius:4px;border:1px solid var(--border);
  background:var(--surface);cursor:pointer;transition:background 0.08s;position:relative}
.step.on::after{content:'';position:absolute;inset:4px;border-radius:2px;background:var(--accent);opacity:0.8}
.step.on{background:var(--accent-dim);border-color:rgba(57,255,20,0.2)}
.step.cur{box-shadow:inset 0 0 0 2px var(--accent)}
.step.beat{border-top:2px solid rgba(255,255,255,0.06)}
.step.multi::after{opacity:1;box-shadow:0 0 4px var(--accent)}

.transport{display:flex;gap:5px;padding:7px 10px;border-top:1px solid var(--border);
  background:rgba(0,0,0,0.35);flex-shrink:0}
.transport button{flex:1;padding:11px 4px;border:1px solid var(--border);border-radius:10px;
  background:var(--surface);color:var(--text-dim);font-size:10px;letter-spacing:1.5px;
  text-transform:uppercase;cursor:pointer;font-family:inherit;transition:all 0.15s}
.transport button:active{background:var(--accent-dim);border-color:var(--accent-border)}
.transport .playing{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}

/* Sound overlay */
.lib-ov{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:none;z-index:100;
  align-items:center;justify-content:center;padding:16px}
.lib-ov.open{display:flex}
.lib-modal{width:100%;max-width:400px;max-height:80vh;background:var(--bg);
  border:1px solid var(--border);border-radius:16px;overflow:hidden;display:flex;flex-direction:column}
.lib-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;
  border-bottom:1px solid var(--border)}
.lib-hdr span{font-size:11px;letter-spacing:3px;color:var(--text-dim);text-transform:uppercase}
.lib-hdr button{background:none;border:none;color:var(--text-dim);font-size:18px;cursor:pointer;
  width:32px;height:32px;display:flex;align-items:center;justify-content:center}
.lib-cats{display:flex;gap:3px;padding:8px;overflow-x:auto;flex-shrink:0;
  scrollbar-width:none;-ms-overflow-style:none}
.lib-cats::-webkit-scrollbar{display:none}
.lib-cat{padding:5px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface);
  color:var(--text-muted);font-size:9px;letter-spacing:1px;cursor:pointer;white-space:nowrap;
  font-family:inherit;text-transform:uppercase}
.lib-cat.on{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.lib-list{flex:1;overflow-y:auto;padding:6px 8px;-webkit-overflow-scrolling:touch}
.lib-item{padding:10px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:4px;
  cursor:pointer;font-size:11px;letter-spacing:2px;color:var(--text-dim);
  display:flex;align-items:center;gap:8px;transition:all 0.12s;text-transform:uppercase}
.lib-item:active,.lib-item.loaded{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.lib-item .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);opacity:0;flex-shrink:0}
.lib-item.loaded .dot{opacity:1}

.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);padding:8px 18px;
  border-radius:8px;background:var(--accent);color:var(--bg);font-size:11px;letter-spacing:2px;
  opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:200;text-transform:uppercase}
.toast.show{opacity:1}

@media(max-width:380px){.pad .nm{font-size:9px}.transport button{font-size:9px;padding:9px 2px}
  .step{width:18px;height:24px}.knob{min-width:38px}}
@media(min-width:600px){.pad-grid{max-width:380px}}
@media(min-height:700px){.pad-grid{gap:8px;padding:10px}}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <a href="/apps">&#8592; apps</a>
    <span class="title">BREAKS</span>
    <button id="shareBtn" aria-label="share">&#8599;</button>
  </div>
  <div class="ctrl-bar">
    <span class="lbl">BPM</span><span class="val" id="bpmV">120</span>
    <input type="range" id="bpmR" min="60" max="200" value="120">
    <span class="lbl">SWG</span><span class="val" id="swgV">0%</span>
    <input type="range" id="swgR" min="0" max="80" value="0" style="max-width:60px">
  </div>
  <div class="scale-bar">
    <div class="scale-btn" id="rootBtn"><span class="lbl">ROOT</span><span id="rootV">C</span></div>
    <div class="scale-btn" id="scaleBtn"><span class="lbl">SCALE</span><span id="scaleV">MINOR</span></div>
    <div style="flex:1"></div>
    <div class="oct-btn" id="octDn">&#8722;</div>
    <span class="val" id="octV" style="font-size:10px;min-width:32px;color:var(--accent)">OCT 3</span>
    <div class="oct-btn" id="octUp">+</div>
  </div>
  <div class="engine-bar">
    <div class="knob"><span class="lbl">CUT</span><input type="range" id="cutR" min="0" max="100" value="100"><span class="val" id="cutV">20k</span></div>
    <div class="knob"><span class="lbl">RES</span><input type="range" id="resR" min="0" max="100" value="0"><span class="val" id="resV">0</span></div>
    <div class="knob"><span class="lbl">ATK</span><input type="range" id="atkR" min="0" max="100" value="27"><span class="val" id="atkV">8ms</span></div>
    <div class="knob"><span class="lbl">DEC</span><input type="range" id="decR" min="0" max="100" value="38"><span class="val" id="decV">100ms</span></div>
    <div class="knob"><span class="lbl">SUS</span><input type="range" id="susR" min="0" max="100" value="100"><span class="val" id="susV">100%</span></div>
    <div class="knob"><span class="lbl">REL</span><input type="range" id="relR" min="0" max="100" value="46"><span class="val" id="relV">180ms</span></div>
    <div class="knob"><span class="lbl">VRB</span><input type="range" id="vrbR" min="0" max="100" value="44"><span class="val" id="vrbV">44</span></div>
    <div class="knob"><span class="lbl">DLY</span><input type="range" id="dlyR" min="0" max="100" value="0"><span class="val" id="dlyV">0</span></div>
  </div>
  <div class="pad-grid" id="pGrid"></div>
  <div class="pattern-bar">
    <div class="seg" id="lenG"></div>
    <div class="seg"><div class="sep"></div></div>
    <div class="seg" id="dirG"></div>
    <div class="seg"><div class="sep"></div></div>
    <div class="seg" id="bankG"></div>
  </div>
  <div class="step-wrap" id="stepW"></div>
  <div class="transport">
    <button id="playB">&#9654; play</button>
    <button id="clrB">&#10005; clr</button>
    <button id="soundB">&#9834; sound</button>
    <button id="wavB">&#11015; wav</button>
  </div>
  <div class="lib-ov" id="libOv">
    <div class="lib-modal">
      <div class="lib-hdr"><span id="libTitle">SOUND LIBRARY</span><button id="libX">&#10005;</button></div>
      <div class="lib-cats" id="libCats"></div>
      <div class="lib-list" id="libList"></div>
    </div>
  </div>
  <div class="toast" id="toast">link copied</div>
</div>

<script>
(function(){
'use strict';
var AudioCtx=window.AudioContext||window.webkitAudioContext;
if(!AudioCtx)return;
var ctx=new AudioCtx();

/* ═══ SCALES ═══ */
var SCALES={
  'MAJOR':[0,2,4,5,7,9,11],'MINOR':[0,2,3,5,7,8,10],
  'PENTA MIN':[0,3,5,7,10],'PENTA MAJ':[0,2,4,7,9],
  'DORIAN':[0,2,3,5,7,9,10],'BLUES':[0,3,5,6,7,10],
  'HARMONIC':[0,2,3,5,7,8,11],'PHRYGIAN':[0,1,3,5,7,8,10],
  'MIXO':[0,2,4,5,7,9,10],'JAPANESE':[0,1,5,7,8],
  'ARABIC':[0,1,4,5,7,8,11]
};
var SCALE_NAMES=Object.keys(SCALES);
var NOTE_NAMES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

/* ═══ STATE ═══ */
var NUM=16,selPad=0,bpm=120,swing=0,stepLen=16,direction='fwd',
    playing=false,curStep=0,pingFwd=true,schedTimer=null,nextTime=0,
    libCat=0,curBank=0,
    rootNote=0,scaleIdx=1,baseOctave=3;
var pattern=[];
for(var p=0;p<NUM;p++)pattern.push(new Uint8Array(32));
var padNotes=new Array(NUM);
var globalSoundKey=null,globalSoundBuffer=null,globalSoundName='---';

// Engine macro state (slider positions 0-100)
var engCut=100,engRes=0,engAtk=27,engDec=38,engSus=100,engRel=46,engVrb=44,engDly=0;
// Derived ADSR values (computed by applyEngine)
var adsrA=0.008,adsrD=0.1,adsrS=1.0,adsrR=0.18;

function getScaleName(){return SCALE_NAMES[scaleIdx];}
function getScaleIntervals(){return SCALES[getScaleName()];}
function computePadNotes(){
  var intervals=getScaleIntervals();
  var base=rootNote+baseOctave*12;
  for(var i=0;i<NUM;i++){
    var deg=i%intervals.length;
    var oct=Math.floor(i/intervals.length);
    padNotes[i]=base+intervals[deg]+oct*12;
  }
}
function midiToName(midi){
  var note=midi%12,oct=Math.floor(midi/12)-1;
  return NOTE_NAMES[note]+oct;
}

/* ═══ ENGINE MAPPING ═══ */
function mapCut(v){return 200*Math.pow(100,v/100);}
function mapRes(v){return v*0.2;}
function mapAtk(v){return 0.001*Math.pow(2000,v/100);}
function mapDec(v){return 0.01*Math.pow(300,v/100);}
function mapSus(v){return v/100;}
function mapRel(v){return 0.01*Math.pow(500,v/100);}
function mapVrb(v){return v/100*0.5;}
function mapDly(v){return v/100*0.5;}

function fmtMs(s){return s<1?Math.round(s*1000)+'ms':s.toFixed(1)+'s';}
function fmtHz(hz){return hz>=1000?(hz/1000).toFixed(1)+'k':Math.round(hz)+'';}

/* ═══ AUDIO GRAPH ═══ */
var master=ctx.createGain();master.gain.value=0.8;

// Filter on master bus
var lpFilter=ctx.createBiquadFilter();
lpFilter.type='lowpass';lpFilter.frequency.value=20000;lpFilter.Q.value=0;

var comp=ctx.createDynamicsCompressor();
comp.threshold.value=-8;comp.ratio.value=4;comp.attack.value=0.003;comp.release.value=0.12;
var limiter=ctx.createDynamicsCompressor();
limiter.threshold.value=-1;limiter.ratio.value=20;limiter.attack.value=0.001;limiter.release.value=0.05;

// Reverb
var reverbNode=ctx.createConvolver(),reverbGain=ctx.createGain();
reverbGain.gain.value=0.22;
function makeReverbIR(len,decay){
  var sr=ctx.sampleRate,n=Math.floor(sr*len),buf=ctx.createBuffer(2,n,sr);
  for(var c=0;c<2;c++){var d=buf.getChannelData(c);for(var i=0;i<n;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(sr*decay));}
  return buf;
}
reverbNode.buffer=makeReverbIR(2.2,0.5);
reverbNode.connect(reverbGain);reverbGain.connect(master);

// Delay (tempo-synced, dotted eighth)
var delayNode=ctx.createDelay(2.0);
delayNode.delayTime.value=0.375;
var delayFB=ctx.createGain();delayFB.gain.value=0.35;
var delayWet=ctx.createGain();delayWet.gain.value=0;
delayNode.connect(delayFB);delayFB.connect(delayNode);
delayNode.connect(delayWet);

// Routing: master → filter → comp → limiter → dest
//          master → delay → delayWet → filter
master.connect(lpFilter);
master.connect(delayNode);
delayWet.connect(lpFilter);
lpFilter.connect(comp);comp.connect(limiter);limiter.connect(ctx.destination);

function syncDelay(){delayNode.delayTime.value=Math.min(60/bpm*0.75,2.0);}

function applyEngine(){
  lpFilter.frequency.setTargetAtTime(mapCut(engCut),ctx.currentTime,0.02);
  lpFilter.Q.setTargetAtTime(mapRes(engRes),ctx.currentTime,0.02);
  adsrA=mapAtk(engAtk);adsrD=mapDec(engDec);adsrS=mapSus(engSus);adsrR=mapRel(engRel);
  reverbGain.gain.setTargetAtTime(mapVrb(engVrb),ctx.currentTime,0.02);
  delayWet.gain.setTargetAtTime(mapDly(engDly),ctx.currentTime,0.02);
}

/* ═══ DSP ═══ */
function makeBuffer(fn,dur){
  var sr=ctx.sampleRate,n=Math.floor(sr*dur),buf=ctx.createBuffer(1,n,sr);
  fn(buf.getChannelData(0),sr,n);return buf;
}
function lpf(d,fc,sr){var dt=1/sr,rc=1/(6.2832*fc),a=dt/(rc+dt),y=0;for(var i=0;i<d.length;i++){y+=a*(d[i]-y);d[i]=y;}}
function hpf(d,fc,sr){var dt=1/sr,rc=1/(6.2832*fc),a=rc/(rc+dt),y=0,px=0;for(var i=0;i<d.length;i++){y=a*(y+d[i]-px);px=d[i];d[i]=y;}}

/* ═══ TONAL SYNTHESIS ═══ */
function synthOcarina(d,sr){
  for(var i=0;i<d.length;i++){var t=i/sr;
    var env=Math.min(t/0.03,1)*(0.3+0.7*Math.exp(-t*0.5));
    var vib=1+Math.sin(5.5*6.2832*t)*0.004;
    d[i]=(Math.sin(261.63*vib*6.2832*t)*0.5+(Math.random()*2-1)*0.06*Math.exp(-t*2))*env;
  }
  lpf(d,2500,sr);
}
function synthFlute(d,sr){
  for(var i=0;i<d.length;i++){var t=i/sr;
    var env=Math.min(t/0.02,1)*(0.25+0.75*Math.exp(-t*0.6));
    var vib=1+Math.sin(5*6.2832*t)*0.003;
    d[i]=(Math.sin(261.63*vib*6.2832*t)*0.45+Math.sin(261.63*2*vib*6.2832*t)*0.08+(Math.random()*2-1)*0.04*Math.exp(-t*3))*env;
  }
}
function synthShakuhachi(d,sr){
  var ph=0;
  for(var i=0;i<d.length;i++){var t=i/sr;
    var env=Math.min(t/0.06,1)*(0.25+0.75*Math.exp(-t*0.5));
    var vib=1+Math.sin(4*6.2832*t)*0.006*Math.min(t/0.3,1);
    ph+=261.63*vib*6.2832/sr;
    d[i]=((Math.sin(ph)*0.35+Math.sin(ph*2.01)*0.1+Math.sin(ph*3.03)*0.04)+(Math.random()*2-1)*0.12*Math.min(t/0.05,1)*Math.exp(-t*1.5))*env;
  }
}
function synthPanPipe(d,sr){
  for(var i=0;i<d.length;i++){var t=i/sr;
    var env=Math.min(t/0.01,1)*(0.2+0.8*Math.exp(-t*0.8));

var activeVoices={};
function noteOn(padIdx,pointerId){
  if(!globalSoundBuffer)return;
  noteOff(pointerId);
  var midi=padNotes[padIdx],semi=midi-60;
  var src=ctx.createBufferSource();src.buffer=globalSoundBuffer;
  src.playbackRate.value=Math.pow(2,semi/12);
  src.loop=true;
  var dur=globalSoundBuffer.duration;
  src.loopStart=Math.min(0.08,dur*0.1);src.loopEnd=Math.max(dur-0.01,dur*0.9);
  var g=ctx.createGain();
  var now=ctx.currentTime,peak=0.7;
  g.gain.setValueAtTime(0,now);
  g.gain.linearRampToValueAtTime(peak,now+adsrA);
  g.gain.linearRampToValueAtTime(peak*adsrS,now+adsrA+adsrD);
  src.connect(g);g.connect(master);g.connect(reverbNode);
  src.start();
  activeVoices[pointerId]={src:src,gain:g,pad:padIdx};
}
function noteOff(pointerId){
  var v=activeVoices[pointerId];if(!v)return;
  var now=ctx.currentTime;
  v.gain.gain.cancelScheduledValues(now);
  v.gain.gain.setValueAtTime(v.gain.gain.value,now);
  v.gain.gain.linearRampToValueAtTime(0,now+adsrR);
  var s=v.src;setTimeout(function(){try{s.stop();}catch(e){}},Math.max(250,(adsrR+0.05)*1000));
  delete activeVoices[pointerId];
}

function triggerNote(padIdx,time){

/* ═══ SEQUENCER ═══ */
function stepDur(stepNum){
  var base=60/bpm/4;if(swing===0)return base;
  return base*(stepNum%2===1?1+swing/100*0.6:1-swing/100*0.6);
}
function advanceStep(){
  switch(direction){
    case'fwd':curStep=(curStep+1)%stepLen;break;
    case'rev':curStep=(curStep-1+stepLen)%stepLen;break;
    case'ping':if(stepLen<=1){curStep=0;break;}
      if(pingFwd){curStep++;if(curStep>=stepLen-1){curStep=stepLen-1;pingFwd=false;}}
      else{curStep--;if(curStep<=0){curStep=0;pingFwd=true;}}break;
    case'rnd':curStep=Math.floor(Math.random()*stepLen);break;
  }
}
function scheduler(){
  while(nextTime<ctx.currentTime+0.1){
    for(var p=0;p<NUM;p++){
      if(pattern[p][curStep]) triggerNote(p,nextTime);
    }
    var step=curStep;
    setTimeout((function(s){return function(){highlightStep(s);flashPadsAtStep(s);};})(step),
      Math.max(0,(nextTime-ctx.currentTime)*1000));
    nextTime+=stepDur(curStep);advanceStep();
  }
}
function startSeq(){
  if(ctx.state==='suspended')ctx.resume();
  playing=true;curStep=direction==='rev'?stepLen-1:0;pingFwd=true;
  nextTime=ctx.currentTime+0.05;schedTimer=setInterval(scheduler,25);renderTransport();
}
function stopSeq(){
  playing=false;if(schedTimer){clearInterval(schedTimer);schedTimer=null;}
  curStep=0;highlightStep(-1);renderTransport();
}

/* ═══ WAV EXPORT ═══ */
function exportWAV(){
  if(!globalSoundBuffer){showToast('no sound selected');return;}
  var dur=0;for(var s=0;s<stepLen;s++)dur+=stepDur(s);
  dur+=Math.max(2.5,adsrR+1.5);
  var sr=ctx.sampleRate,len=Math.ceil(sr*dur);
  var offline=new OfflineAudioContext(2,len,sr);
  var oMaster=offline.createGain();oMaster.gain.value=0.8;
  var oFilter=offline.createBiquadFilter();
  oFilter.type='lowpass';oFilter.frequency.value=mapCut(engCut);oFilter.Q.value=mapRes(engRes);
  var oComp=offline.createDynamicsCompressor();
  oComp.threshold.value=-8;oComp.ratio.value=4;oComp.attack.value=0.003;oComp.release.value=0.12;
  var oLim=offline.createDynamicsCompressor();
  oLim.threshold.value=-1;oLim.ratio.value=20;oLim.attack.value=0.001;oLim.release.value=0.05;
  var oRev=offline.createConvolver(),oRevG=offline.createGain();
  oRevG.gain.value=mapVrb(engVrb);
  var rIR=offline.createBuffer(2,Math.floor(sr*2.2),sr);
  for(var c=0;c<2;c++){var rd=rIR.getChannelData(c);for(var i=0;i<rd.length;i++)rd[i]=(Math.random()*2-1)*Math.exp(-i/(sr*0.5));}
  oRev.buffer=rIR;oRev.connect(oRevG);oRevG.connect(oMaster);
  var oDly=offline.createDelay(2.0);
  oDly.delayTime.value=Math.min(60/bpm*0.75,2.0);
  var oDlyFB=offline.createGain();oDlyFB.gain.value=0.35;
  var oDlyWet=offline.createGain();oDlyWet.gain.value=mapDly(engDly);
  oDly.connect(oDlyFB);oDlyFB.connect(oDly);oDly.connect(oDlyWet);
  oMaster.connect(oFilter);oMaster.connect(oDly);oDlyWet.connect(oFilter);
  oFilter.connect(oComp);oComp.connect(oLim);oLim.connect(offline.destination);
  var time=0,localStep=direction==='rev'?stepLen-1:0,localPing=true;
  for(var s=0;s<stepLen;s++){
    for(var p=0;p<NUM;p++){
      if(pattern[p][localStep]){
        var midi=padNotes[p],semi=midi-60;
        var src=offline.createBufferSource();src.buffer=globalSoundBuffer;
        src.playbackRate.value=Math.pow(2,semi/12);
        var g=offline.createGain();
        var peak=0.7;
        g.gain.setValueAtTime(0,time);
        g.gain.linearRampToValueAtTime(peak,time+adsrA);
        g.gain.linearRampToValueAtTime(peak*adsrS,time+adsrA+adsrD);
        src.connect(g);g.connect(oMaster);g.connect(oRev);src.start(time);
      }
    }
    time+=stepDur(localStep);
    switch(direction){
      case'fwd':localStep=(localStep+1)%stepLen;break;
      case'rev':localStep=(localStep-1+stepLen)%stepLen;break;
      case'ping':if(stepLen<=1){localStep=0;break;}
        if(localPing){localStep++;if(localStep>=stepLen-1){localStep=stepLen-1;localPing=false;}}
        else{localStep--;if(localStep<=0){localStep=0;localPing=true;}}break;
      case'rnd':localStep=Math.floor(Math.random()*stepLen);break;
    }
  }
  offline.startRendering().then(function(buffer){
    var blob=new Blob([encodeWAV(buffer)],{type:'audio/wav'});
    var a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download='breaks-loop.wav';a.click();URL.revokeObjectURL(a.href);
    showToast('wav exported');
  });
}
function encodeWAV(buf){
  var nc=buf.numberOfChannels,sr=buf.sampleRate,ns=buf.length,
      bps=16,ba=nc*(bps/8),br=sr*ba,ds=ns*nc*(bps/8),sz=44+ds;
  var ab=new ArrayBuffer(sz),dv=new DataView(ab);
  function ws(o,s){for(var i=0;i<s.length;i++)dv.setUint8(o+i,s.charCodeAt(i));}
  ws(0,'RIFF');dv.setUint32(4,sz-8,true);ws(8,'WAVE');ws(12,'fmt ');
  dv.setUint32(16,16,true);dv.setUint16(20,1,true);dv.setUint16(22,nc,true);
  dv.setUint32(24,sr,true);dv.setUint32(28,br,true);dv.setUint16(32,ba,true);
  dv.setUint16(34,bps,true);ws(36,'data');dv.setUint32(40,ds,true);
  var ch=[];for(var c=0;c<nc;c++)ch.push(buf.getChannelData(c));
  var off=44;
  for(var i=0;i<ns;i++)for(var c=0;c<nc;c++){
    var s=Math.max(-1,Math.min(1,ch[c][i]));
    dv.setInt16(off,s<0?s*0x8000:s*0x7FFF,true);off+=2;
  }
  return ab;
}

        if(ctx.state==='suspended')ctx.resume();
        selPad=idx;noteOn(idx,e.pointerId);
        setGlow(padEl,e.pressure||0.5);
        renderPadSel();renderSteps();
      });
      padEl.addEventListener('pointermove',function(e){
        if(activeVoices[e.pointerId]&&activeVoices[e.pointerId].pad===idx)
          setGlow(padEl,e.pressure||0.5);
      });
      padEl.addEventListener('pointerup',function(e){noteOff(e.pointerId);clearGlow(padEl);});
      padEl.addEventListener('pointerleave',function(e){noteOff(e.pointerId);clearGlow(padEl);});
      padEl.addEventListener('pointercancel',function(e){noteOff(e.pointerId);clearGlow(padEl);});
    })(i,el);
    pGridEl.appendChild(el);padEls.push(el);
  }
}
function renderPadSel(){for(var i=0;i<padEls.length;i++)padEls[i].classList.toggle('sel',i===selPad);}

function renderSteps(){
  stepWEl.innerHTML='';stepEls=[];
  for(var s=0;s<stepLen;s++){
    var el=document.createElement('div');
    var on=pattern[selPad][s]>0;
    var multi=false;
    if(on)for(var p=0;p<NUM;p++){if(p!==selPad&&pattern[p][s]>0){multi=true;break;}}
    el.className='step'+(on?' on':'')+(s%4===0?' beat':'')+(multi?' multi':'');
    (function(idx){
      el.addEventListener('pointerdown',function(e){
        e.preventDefault();
        pattern[selPad][idx]=pattern[selPad][idx]?0:1;
        var isOn=pattern[selPad][idx]>0;
        var isMulti=false;
        if(isOn)for(var p=0;p<NUM;p++){if(p!==selPad&&pattern[p][idx]>0){isMulti=true;break;}}
        el.className='step'+(isOn?' on':'')+(idx%4===0?' beat':'')+(isMulti?' multi':'');
      });
    })(s);
    stepWEl.appendChild(el);stepEls.push(el);
  }
}

function highlightStep(s){
  for(var i=0;i<stepEls.length;i++)stepEls[i].classList.remove('cur');
  if(s>=0&&s<stepEls.length){
    stepEls[s].classList.add('cur');
    var el=stepEls[s],w=stepWEl;
    if(el.offsetLeft<w.scrollLeft||el.offsetLeft+el.offsetWidth>w.scrollLeft+w.clientWidth)
      w.scrollLeft=el.offsetLeft-w.clientWidth/2+el.offsetWidth/2;
  }
}
function flashPadEl(idx){
  if(!padEls[idx])return;
  padEls[idx].classList.add('flash');
  setTimeout(function(){padEls[idx].classList.remove('flash');},80);
}
function flashPadsAtStep(step){
  for(var p=0;p<NUM;p++)if(pattern[p][step])flashPadEl(p);
}

function renderLenBtns(){
  lenGEl.innerHTML='';
  [8,16,32].forEach(function(n){
    var b=document.createElement('button');b.className='pbtn'+(n===stepLen?' on':'');b.textContent=n;
    b.addEventListener('pointerdown',function(e){e.preventDefault();if(playing)stopSeq();stepLen=n;renderLenBtns();renderSteps();});
    lenGEl.appendChild(b);
  });
}
function renderDirBtns(){
  dirGEl.innerHTML='';
  [['fwd','FWD'],['rev','REV'],['ping','PNG'],['rnd','RND']].forEach(function(d){
    var b=document.createElement('button');b.className='pbtn'+(d[0]===direction?' on':'');b.textContent=d[1];
    b.addEventListener('pointerdown',function(e){e.preventDefault();direction=d[0];renderDirBtns();});
    dirGEl.appendChild(b);
  });
}
function renderBankBtns(){
  bankGEl.innerHTML='';
  for(var i=0;i<4;i++){
    var b=document.createElement('button');
    b.className='pbtn'+(i===curBank?' on':'')+(bankHasData(i)?' has-data':'');
    b.textContent='P'+(i+1);
    (function(slot){
      var lastTap=0;
      b.addEventListener('pointerdown',function(e){
        e.preventDefault();
        var now=Date.now();
        if(now-lastTap<400){saveBank(slot);}
        else{curBank=slot;loadBank(slot);renderBankBtns();}
        lastTap=now;
      });
    })(i);
    bankGEl.appendChild(b);
  }
}
function renderScaleUI(){
  rootVEl.textContent=NOTE_NAMES[rootNote];
  scaleVEl.textContent=getScaleName();
  octVEl.textContent='OCT '+baseOctave;
}
function renderEngine(){
  cutREl.value=engCut;cutVEl.textContent=fmtHz(mapCut(engCut));
  resREl.value=engRes;resVEl.textContent=engRes;
  atkREl.value=engAtk;atkVEl.textContent=fmtMs(mapAtk(engAtk));
  decREl.value=engDec;decVEl.textContent=fmtMs(mapDec(engDec));
  susREl.value=engSus;susVEl.textContent=engSus+'%';
  relREl.value=engRel;relVEl.textContent=fmtMs(mapRel(engRel));
  vrbREl.value=engVrb;vrbVEl.textContent=engVrb;
  dlyREl.value=engDly;dlyVEl.textContent=engDly;
}
function renderTransport(){
  playBEl.textContent=playing?'\u25A0 stop':'\u25B6 play';
  playBEl.classList.toggle('playing',playing);
}
function renderAll(){renderPads();renderSteps();renderLenBtns();renderDirBtns();renderBankBtns();renderScaleUI();renderEngine();renderTransport();}

/* ═══ SOUND MODAL ═══ */
function openLib(){
  libOvEl.classList.add('open');
  libTitleEl.textContent='SOUND: '+globalSoundName;
  renderLibCats();renderLibList();
}
function closeLib(){libOvEl.classList.remove('open');}
function renderLibCats(){
  libCatsEl.innerHTML='';
  for(var c=0;c<LIB.length;c++){
    var b=document.createElement('button');b.className='lib-cat'+(c===libCat?' on':'');b.textContent=LIB[c].cat;
    (function(idx){b.addEventListener('pointerdown',function(e){e.preventDefault();libCat=idx;renderLibCats();renderLibList();});})(c);
    libCatsEl.appendChild(b);
  }
}
function renderLibList(){
  libListEl.innerHTML='';var cat=LIB[libCat];
  for(var s=0;s<cat.sounds.length;s++){
    var snd=cat.sounds[s],el=document.createElement('div');
    el.className='lib-item'+(globalSoundKey===snd.key?' loaded':'');
    el.innerHTML='<span class="dot"></span>'+snd.name;
    (function(sound){el.addEventListener('pointerdown',function(e){
      e.preventDefault();if(ctx.state==='suspended')ctx.resume();
      setGlobalSound(sound.key,sound.name,sound.buffer);
      triggerNote(Math.min(7,NUM-1));
      libTitleEl.textContent='SOUND: '+globalSoundName;
      renderLibList();renderPads();
    });})(snd);
    libListEl.appendChild(el);
  }
}

/* ═══ EVENTS ═══ */
bpmREl.addEventListener('input',function(){bpm=+bpmREl.value;bpmVEl.textContent=bpm;syncDelay();});
swgREl.addEventListener('input',function(){swing=+swgREl.value;swgVEl.textContent=swing+'%';});
rootBtnEl.addEventListener('pointerdown',function(e){
  e.preventDefault();rootNote=(rootNote+1)%12;computePadNotes();renderScaleUI();renderPads();
});
scaleBtnEl.addEventListener('pointerdown',function(e){
  e.preventDefault();scaleIdx=(scaleIdx+1)%SCALE_NAMES.length;computePadNotes();renderScaleUI();renderPads();
});
octDnEl.addEventListener('pointerdown',function(e){
  e.preventDefault();if(baseOctave>1){baseOctave--;computePadNotes();renderScaleUI();renderPads();}
});
octUpEl.addEventListener('pointerdown',function(e){
  e.preventDefault();if(baseOctave<6){baseOctave++;computePadNotes();renderScaleUI();renderPads();}
});
cutREl.addEventListener('input',function(){engCut=+cutREl.value;applyEngine();cutVEl.textContent=fmtHz(mapCut(engCut));});
resREl.addEventListener('input',function(){engRes=+resREl.value;applyEngine();resVEl.textContent=engRes;});
atkREl.addEventListener('input',function(){engAtk=+atkREl.value;applyEngine();atkVEl.textContent=fmtMs(adsrA);});
decREl.addEventListener('input',function(){engDec=+decREl.value;applyEngine();decVEl.textContent=fmtMs(adsrD);});
susREl.addEventListener('input',function(){engSus=+susREl.value;applyEngine();susVEl.textContent=engSus+'%';});
relREl.addEventListener('input',function(){engRel=+relREl.value;applyEngine();relVEl.textContent=fmtMs(adsrR);});
vrbREl.addEventListener('input',function(){engVrb=+vrbREl.value;applyEngine();vrbVEl.textContent=engVrb;});
dlyREl.addEventListener('input',function(){engDly=+dlyREl.value;applyEngine();dlyVEl.textContent=engDly;});

playBEl.addEventListener('pointerdown',function(e){e.preventDefault();if(playing)stopSeq();else startSeq();});
clrBEl.addEventListener('pointerdown',function(e){e.preventDefault();for(var s=0;s<32;s++)pattern[selPad][s]=0;renderSteps();});
soundBEl.addEventListener('pointerdown',function(e){e.preventDefault();openLib();});
wavBEl.addEventListener('pointerdown',function(e){e.preventDefault();exportWAV();});
libXEl.addEventListener('pointerdown',function(e){e.preventDefault();closeLib();});
libOvEl.addEventListener('pointerdown',function(e){if(e.target===libOvEl)closeLib();});
shareBtnEl.addEventListener('pointerdown',function(e){
  e.preventDefault();
  if(navigator.share)navigator.share({title:'BREAKS \u2014 cbay.ing',url:location.href}).catch(function(){});
  else navigator.clipboard.writeText(location.href).then(function(){showToast('link copied');}).catch(function(){});
});

var KEY_MAP={'1':0,'2':1,'3':2,'4':3,'q':4,'w':5,'e':6,'r':7,'a':8,'s':9,'d':10,'f':11,'z':12,'x':13,'c':14,'v':15};
var keysDown={};
document.addEventListener('keydown',function(e){
  if(e.repeat||e.target.tagName==='INPUT')return;var k=e.key.toLowerCase();
  if(k===' '){e.preventDefault();if(playing)stopSeq();else startSeq();return;}
  if(KEY_MAP[k]!==undefined&&!keysDown[k]){
    keysDown[k]=true;if(ctx.state==='suspended')ctx.resume();
    var idx=KEY_MAP[k];selPad=idx;noteOn(idx,'kb_'+k);
    if(padEls[idx])setGlow(padEls[idx],0.7);
    renderPadSel();renderSteps();
  }
});
document.addEventListener('keyup',function(e){
  var k=e.key.toLowerCase();keysDown[k]=false;
  if(KEY_MAP[k]!==undefined){noteOff('kb_'+k);if(padEls[KEY_MAP[k]])clearGlow(padEls[KEY_MAP[k]]);}
});

/* ═══ INIT ═══ */
initLibrary();computePadNotes();
var dflt=LIB[0].sounds[0];
setGlobalSound(dflt.key,dflt.name,dflt.buffer);
applyEngine();syncDelay();
renderAll();

})();
</script>
</body>
</html>
