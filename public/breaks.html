<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>BREAKS — cbay.ing</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#060a08;--surface:rgba(255,255,255,0.03);--border:rgba(255,255,255,0.06);
  --text:#e8f0e8;--text-dim:rgba(255,255,255,0.4);--text-muted:rgba(255,255,255,0.2);
  --accent:#39FF14;--accent-dim:rgba(57,255,20,0.10);--accent-border:rgba(57,255,20,0.30);
  --accent-glow:rgba(57,255,20,0.06);--pad-bg:rgba(255,255,255,0.025);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  color:var(--text);-webkit-user-select:none;user-select:none;touch-action:manipulation}
#app{display:flex;flex-direction:column;width:100%;height:100%;height:100dvh}

.topbar{display:flex;align-items:center;justify-content:space-between;height:48px;padding:0 12px;
  background:rgba(6,10,8,0.9);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);flex-shrink:0;z-index:10;position:relative}
.topbar a{color:var(--accent);text-decoration:none;font-size:13px;letter-spacing:2px;font-weight:500;opacity:0.7}
.topbar a:hover{opacity:1}
.topbar .title{font-size:12px;letter-spacing:5px;text-transform:uppercase;color:var(--text-dim);
  position:absolute;left:50%;transform:translateX(-50%);font-weight:700;pointer-events:none}
.topbar button{background:var(--surface);border:1px solid var(--border);border-radius:10px;
  color:var(--text);width:38px;height:38px;font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-family:inherit}
.topbar button:active{background:var(--accent-dim);border-color:var(--accent-border)}

.ctrl-bar{display:flex;align-items:center;gap:6px;padding:5px 10px;
  background:rgba(0,0,0,0.3);border-bottom:1px solid var(--border);flex-shrink:0}
.ctrl-bar .lbl{font-size:9px;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase}
.ctrl-bar .val{font-size:12px;color:var(--accent);min-width:28px;text-align:center;
  font-variant-numeric:tabular-nums;letter-spacing:1px}
.ctrl-bar input[type=range]{flex:1;height:4px;-webkit-appearance:none;appearance:none;
  background:var(--border);border-radius:2px;outline:none}
.ctrl-bar input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;
  border-radius:50%;background:var(--accent);border:none;cursor:pointer}

.pad-grid{flex:1;display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding:6px;
  min-height:0;align-content:center;max-width:480px;margin:0 auto;width:100%}
.pad{border-radius:10px;background:var(--pad-bg);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1px;
  cursor:pointer;transition:transform 0.06s,background 0.06s,border-color 0.15s;
  -webkit-tap-highlight-color:transparent;aspect-ratio:1;position:relative;min-height:0}
.pad:active,.pad.flash{transform:scale(0.92);background:var(--accent-dim);border-color:var(--accent)}
.pad.sel{border-color:var(--accent);box-shadow:0 0 12px var(--accent-glow)}
.pad.repeating{animation:pulse 0.15s ease infinite alternate}
@keyframes pulse{from{opacity:0.7}to{opacity:1}}
.pad .nm{font-size:9px;letter-spacing:1px;color:var(--text-dim);text-transform:uppercase;
  text-align:center;line-height:1.2;pointer-events:none}
.pad .sub{font-size:7px;color:var(--text-muted);pointer-events:none;letter-spacing:1px}
.pad .idx{position:absolute;top:4px;left:6px;font-size:7px;color:var(--text-muted);pointer-events:none}
.pad.recording{border-color:#ff3333;box-shadow:0 0 16px rgba(255,50,50,0.3);animation:recPulse 0.5s ease infinite}
@keyframes recPulse{0%,100%{opacity:1}50%{opacity:0.6}}

.pattern-bar{display:flex;align-items:center;justify-content:center;gap:3px;
  padding:5px 8px;background:rgba(0,0,0,0.3);border-top:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.seg{display:flex;gap:3px}
.seg .sep{width:1px;background:var(--border);margin:0 3px}
.pbtn{padding:4px 8px;border:1px solid var(--border);border-radius:6px;background:var(--surface);
  color:var(--text-muted);font-size:9px;letter-spacing:1px;cursor:pointer;
  font-family:inherit;text-transform:uppercase;transition:all 0.15s}
.pbtn.on{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.pbtn.has-data{color:var(--text-dim)}

.step-wrap{display:flex;gap:2px;padding:5px 8px;overflow-x:auto;flex-shrink:0;
  background:rgba(0,0,0,0.25);border-top:1px solid var(--border);
  scrollbar-width:none;-ms-overflow-style:none}
.step-wrap::-webkit-scrollbar{display:none}
.step{flex:0 0 auto;width:22px;height:28px;border-radius:4px;border:1px solid var(--border);
  background:var(--surface);cursor:pointer;transition:background 0.08s;position:relative}
.step.v1::after{content:'';position:absolute;inset:8px 6px;border-radius:2px;background:var(--accent);opacity:0.25}
.step.v2::after{content:'';position:absolute;inset:5px 4px;border-radius:2px;background:var(--accent);opacity:0.55}
.step.v3::after{content:'';position:absolute;inset:3px;border-radius:2px;background:var(--accent);opacity:1}
.step.v2{background:var(--accent-dim);border-color:rgba(57,255,20,0.15)}
.step.v3{background:var(--accent-dim);border-color:var(--accent-border)}
.step.cur{box-shadow:inset 0 0 0 2px var(--accent)}
.step.beat{border-top:2px solid rgba(255,255,255,0.06)}

.transport{display:flex;gap:5px;padding:7px 10px;border-top:1px solid var(--border);
  background:rgba(0,0,0,0.35);flex-shrink:0}
.transport button{flex:1;padding:11px 4px;border:1px solid var(--border);border-radius:10px;
  background:var(--surface);color:var(--text-dim);font-size:10px;letter-spacing:1.5px;
  text-transform:uppercase;cursor:pointer;font-family:inherit;transition:all 0.15s}
.transport button:active{background:var(--accent-dim);border-color:var(--accent-border)}
.transport .playing{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}

/* Library overlay */
.lib-ov{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:none;z-index:100;
  align-items:center;justify-content:center;padding:16px}
.lib-ov.open{display:flex}
.lib-modal{width:100%;max-width:400px;max-height:80vh;background:var(--bg);
  border:1px solid var(--border);border-radius:16px;overflow:hidden;display:flex;flex-direction:column}
.lib-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;
  border-bottom:1px solid var(--border)}
.lib-hdr span{font-size:11px;letter-spacing:3px;color:var(--text-dim);text-transform:uppercase}
.lib-hdr button{background:none;border:none;color:var(--text-dim);font-size:18px;cursor:pointer;
  width:32px;height:32px;display:flex;align-items:center;justify-content:center}
.lib-ctrls{display:flex;gap:6px;padding:8px 14px;border-bottom:1px solid var(--border);align-items:center}
.lib-ctrls .lbl{font-size:9px;letter-spacing:2px;color:var(--text-muted);white-space:nowrap}
.lib-ctrls .val{font-size:11px;color:var(--accent);min-width:28px;text-align:center}
.lib-ctrls input[type=range]{flex:1;height:4px;-webkit-appearance:none;appearance:none;
  background:var(--border);border-radius:2px;outline:none}
.lib-ctrls input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;
  border-radius:50%;background:var(--accent);border:none;cursor:pointer}
.lib-cats{display:flex;gap:3px;padding:8px;overflow-x:auto;flex-shrink:0;
  scrollbar-width:none;-ms-overflow-style:none}
.lib-cats::-webkit-scrollbar{display:none}
.lib-cat{padding:5px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface);
  color:var(--text-muted);font-size:9px;letter-spacing:1px;cursor:pointer;white-space:nowrap;
  font-family:inherit;text-transform:uppercase}
.lib-cat.on{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.lib-list{flex:1;overflow-y:auto;padding:6px 8px;-webkit-overflow-scrolling:touch}
.lib-item{padding:10px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:4px;
  cursor:pointer;font-size:11px;letter-spacing:2px;color:var(--text-dim);
  display:flex;align-items:center;gap:8px;transition:all 0.12s;text-transform:uppercase}
.lib-item:active,.lib-item.loaded{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.lib-item .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);opacity:0;flex-shrink:0}
.lib-item.loaded .dot{opacity:1}
.lib-btns{display:flex;gap:4px;padding:6px 8px 8px;flex-shrink:0}
.lib-btn{flex:1;padding:10px;border:1px dashed var(--border);border-radius:8px;
  background:transparent;color:var(--text-muted);font-size:10px;letter-spacing:1px;
  cursor:pointer;font-family:inherit;text-align:center}
.lib-btn:active{border-color:var(--accent);color:var(--accent)}
.lib-btn.rec-active{border-color:#ff3333;color:#ff3333;border-style:solid;animation:recPulse 0.5s ease infinite}

.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);padding:8px 18px;
  border-radius:8px;background:var(--accent);color:var(--bg);font-size:11px;letter-spacing:2px;
  opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:200;text-transform:uppercase}
.toast.show{opacity:1}

@media(max-width:380px){.pad .nm{font-size:8px}.transport button{font-size:9px;padding:9px 2px}.step{width:18px;height:24px}}
@media(min-width:600px){.pad-grid{max-width:380px}}
@media(min-height:700px){.pad-grid{gap:8px;padding:10px}}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <a href="/apps">← apps</a>
    <span class="title">BREAKS</span>
    <button id="shareBtn" aria-label="share">↗</button>
  </div>
  <div class="ctrl-bar">
    <span class="lbl">BPM</span><span class="val" id="bpmV">120</span>
    <input type="range" id="bpmR" min="60" max="200" value="120">
    <span class="lbl">SWG</span><span class="val" id="swgV">0%</span>
    <input type="range" id="swgR" min="0" max="80" value="0" style="max-width:60px">
  </div>
  <div class="pad-grid" id="pGrid"></div>
  <div class="pattern-bar">
    <div class="seg" id="lenG"></div>
    <div class="seg"><div class="sep"></div></div>
    <div class="seg" id="dirG"></div>
    <div class="seg"><div class="sep"></div></div>
    <div class="seg" id="bankG"></div>
  </div>
  <div class="step-wrap" id="stepW"></div>
  <div class="transport">
    <button id="playB">▶ play</button>
    <button id="clrB">✕ clr</button>
    <button id="browseB">⊞ lib</button>
    <button id="wavB">⬇ wav</button>
  </div>
  <div class="lib-ov" id="libOv">
    <div class="lib-modal">
      <div class="lib-hdr"><span id="libTitle">SAMPLE LIBRARY</span><button id="libX">✕</button></div>
      <div class="lib-ctrls">
        <span class="lbl">PITCH</span><span class="val" id="pitchV">0</span>
        <input type="range" id="pitchR" min="-24" max="24" value="0" style="flex:1">
        <span class="lbl" style="margin-left:6px">PROB</span><span class="val" id="probV">100%</span>
        <input type="range" id="probR" min="0" max="100" value="100" style="flex:0.6">
      </div>
      <div class="lib-cats" id="libCats"></div>
      <div class="lib-list" id="libList"></div>
      <div class="lib-btns">
        <button class="lib-btn" id="libFile">📁 file</button>
        <button class="lib-btn" id="libMic">🎙 rec mic</button>
      </div>
    </div>
  </div>
  <div class="toast" id="toast">link copied</div>
</div>

<script>
(function(){
'use strict';
var AudioCtx=window.AudioContext||window.webkitAudioContext;
if(!AudioCtx)return;
var ctx=new AudioCtx();

/* ═══ STATE ═══ */
var NUM=16,selPad=0,bpm=120,swing=0,stepLen=16,direction='fwd',
    playing=false,curStep=0,pingFwd=true,schedTimer=null,nextTime=0,libCat=0,curBank=0;

var pads=[];
// pattern stores velocity: 0=off, 1=soft(ghost), 2=normal, 3=accent
var pattern=[];
for(var p=0;p<NUM;p++){
  pads.push({name:'---',buffer:null,pitch:0,vol:1,prob:100,libKey:null});
  pattern.push(new Uint8Array(32));
}

/* ═══ AUDIO GRAPH ═══ */
var master=ctx.createGain();master.gain.value=0.8;
var comp=ctx.createDynamicsCompressor();
comp.threshold.value=-8;comp.ratio.value=4;comp.attack.value=0.003;comp.release.value=0.12;
var limiter=ctx.createDynamicsCompressor();
limiter.threshold.value=-1;limiter.ratio.value=20;limiter.attack.value=0.001;limiter.release.value=0.05;
master.connect(comp);comp.connect(limiter);limiter.connect(ctx.destination);
var reverbNode=ctx.createConvolver(),reverbGain=ctx.createGain();
reverbGain.gain.value=0.12;
function makeReverbIR(len,decay){
  var sr=ctx.sampleRate,n=Math.floor(sr*len),buf=ctx.createBuffer(2,n,sr);
  for(var c=0;c<2;c++){var d=buf.getChannelData(c);for(var i=0;i<n;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(sr*decay));}
  return buf;
}
reverbNode.buffer=makeReverbIR(1.8,0.35);
reverbNode.connect(reverbGain);reverbGain.connect(master);

/* ═══ DSP ═══ */
function makeBuffer(fn,dur){
  var sr=ctx.sampleRate,n=Math.floor(sr*dur),buf=ctx.createBuffer(1,n,sr);
  fn(buf.getChannelData(0),sr,n);return buf;
}
function lpf(d,fc,sr){var dt=1/sr,rc=1/(6.2832*fc),a=dt/(rc+dt),y=0;for(var i=0;i<d.length;i++){y+=a*(d[i]-y);d[i]=y;}}
function hpf(d,fc,sr){var dt=1/sr,rc=1/(6.2832*fc),a=rc/(rc+dt),y=0,px=0;for(var i=0;i<d.length;i++){y=a*(y+d[i]-px);px=d[i];d[i]=y;}}

/* ═══ DRUM SYNTHESIS ═══ */
function synthKick808(d,sr){var ph=0;for(var i=0;i<d.length;i++){var t=i/sr;ph+=(150*Math.exp(-t*5)+42)*6.2832/sr;d[i]=Math.sin(ph)*Math.exp(-t*3.5)*0.9;if(t<0.004)d[i]+=(1-t/0.004)*0.35;}}
function synthKickPunch(d,sr){var ph=0;for(var i=0;i<d.length;i++){var t=i/sr;ph+=(220*Math.exp(-t*18)+55)*6.2832/sr;d[i]=Math.sin(ph)*Math.exp(-t*7)*0.85;if(t<0.002)d[i]+=(1-t/0.002)*0.5;}}
function synthKickDeep(d,sr){var ph=0;for(var i=0;i<d.length;i++){var t=i/sr;ph+=(80*Math.exp(-t*2.5)+32)*6.2832/sr;d[i]=Math.sin(ph)*Math.exp(-t*2)*0.95;}}
function synthSnareTight(d,sr,n){var ns=new Float32Array(n),ph=0;for(var i=0;i<n;i++){var t=i/sr;ph+=185*6.2832/sr;d[i]=(Math.sin(ph)+Math.sin(ph*1.6)*0.3)*Math.exp(-t*20)*0.45;ns[i]=(Math.random()*2-1)*Math.exp(-t*14);if(t<0.001)d[i]+=0.3;}hpf(ns,900,sr);lpf(ns,7000,sr);for(var i=0;i<n;i++)d[i]+=ns[i]*0.5;}
function synthSnareFat(d,sr,n){var ns=new Float32Array(n),ph=0;for(var i=0;i<n;i++){var t=i/sr;ph+=150*6.2832/sr;d[i]=(Math.sin(ph)+Math.sin(ph*1.5)*0.25)*Math.exp(-t*12)*0.4;ns[i]=(Math.random()*2-1)*Math.exp(-t*8);if(t<0.001)d[i]+=0.25;}hpf(ns,600,sr);lpf(ns,5500,sr);for(var i=0;i<n;i++)d[i]+=ns[i]*0.55;}
function synthRimshot(d,sr){var ph1=0,ph2=0;for(var i=0;i<d.length;i++){var t=i/sr;ph1+=830*6.2832/sr;ph2+=1650*6.2832/sr;d[i]=(Math.sin(ph1)*0.5+Math.sin(ph2)*0.3)*Math.exp(-t*35);if(t<0.001)d[i]+=0.4;}}
function synthClap(d,sr){for(var i=0;i<d.length;i++){var t=i/sr,env=0;for(var b=0;b<4;b++){var bt=t-b*0.012;if(bt>=0&&bt<0.015)env+=(1-bt/0.015)*0.6;}if(t>0.04)env+=Math.exp(-(t-0.04)*12)*0.7;d[i]=(Math.random()*2-1)*env;}hpf(d,800,sr);lpf(d,3500,sr);}
function synthHatClosed(d,sr){var phs=[0,0,0,0,0,0],freqs=[800,1480,2700,3350,4480,5920];for(var i=0;i<d.length;i++){var t=i/sr,env=Math.exp(-t*60),s=0;for(var h=0;h<6;h++){phs[h]+=freqs[h]*6.2832/sr;s+=(Math.sin(phs[h])>0?0.12:-0.12);}d[i]=s*env+(Math.random()*2-1)*env*0.3;}hpf(d,5000,sr);}
function synthHatOpen(d,sr){var phs=[0,0,0,0,0,0],freqs=[800,1480,2700,3350,4480,5920];for(var i=0;i<d.length;i++){var t=i/sr,env=Math.exp(-t*5),s=0;for(var h=0;h<6;h++){phs[h]+=freqs[h]*6.2832/sr;s+=(Math.sin(phs[h])>0?0.1:-0.1);}d[i]=s*env+(Math.random()*2-1)*env*0.25;}hpf(d,4500,sr);}
function synthTomHi(d,sr){var ph=0;for(var i=0;i<d.length;i++){var t=i/sr;ph+=(300*Math.exp(-t*6)+180)*6.2832/sr;d[i]=Math.sin(ph)*Math.exp(-t*8)*0.7;if(t<0.002)d[i]+=(1-t/0.002)*0.2;}}
function synthTomMid(d,sr){var ph=0;for(var i=0;i<d.length;i++){var t=i/sr;ph+=(220*Math.exp(-t*5)+120)*6.2832/sr;d[i]=Math.sin(ph)*Math.exp(-t*6)*0.75;if(t<0.002)d[i]+=(1-t/0.002)*0.2;}}
function synthTomLo(d,sr){var ph=0;for(var i=0;i<d.length;i++){var t=i/sr;ph+=(160*Math.exp(-t*4)+70)*6.2832/sr;d[i]=Math.sin(ph)*Math.exp(-t*4)*0.8;if(t<0.002)d[i]+=(1-t/0.002)*0.2;}}
function synthClave(d,sr){var ph=0;for(var i=0;i<d.length;i++){var t=i/sr;ph+=2500*6.2832/sr;d[i]=Math.sin(ph)*Math.exp(-t*50)*0.6;}}
function synthCowbell(d,sr){var ph1=0,ph2=0;for(var i=0;i<d.length;i++){var t=i/sr,env=Math.exp(-t*8);ph1+=545*6.2832/sr;ph2+=815*6.2832/sr;d[i]=((Math.sin(ph1)>0?0.3:-0.3)+(Math.sin(ph2)>0?0.25:-0.25))*env;}hpf(d,400,sr);lpf(d,5000,sr);}
function synthConga(d,sr){var ph=0;for(var i=0;i<d.length;i++){var t=i/sr;ph+=(280*Math.exp(-t*5)+120)*6.2832/sr;d[i]=Math.sin(ph)*Math.exp(-t*6)*0.7;}}
function synthShaker(d,sr){for(var i=0;i<d.length;i++){var t=i/sr;d[i]=(Math.random()*2-1)*Math.exp(-t*15)*0.5;}hpf(d,6000,sr);}
function synthCrash(d,sr){var phs=[0,0,0,0],freqs=[1200,2800,4200,6800];for(var i=0;i<d.length;i++){var t=i/sr,env=Math.exp(-t*2.5),s=0;for(var h=0;h<4;h++){phs[h]+=freqs[h]*6.2832/sr;s+=(Math.sin(phs[h])>0?0.08:-0.08);}d[i]=s*env+(Math.random()*2-1)*env*0.35;}hpf(d,3000,sr);}
function synthRide(d,sr){var phs=[0,0,0,0,0],freqs=[1000,2400,3600,5200,7000];for(var i=0;i<d.length;i++){var t=i/sr,env=Math.exp(-t*4),s=0;for(var h=0;h<5;h++){phs[h]+=freqs[h]*6.2832/sr;s+=(Math.sin(phs[h])>0?0.06:-0.06);}d[i]=s*env+(Math.random()*2-1)*env*0.15;}hpf(d,4000,sr);}
function synthPerc(d,sr){var ph=0;for(var i=0;i<d.length;i++){var t=i/sr;ph+=(1200*Math.exp(-t*15)+400)*6.2832/sr;d[i]=Math.sin(ph)*Math.exp(-t*20)*0.5;if(t<0.001)d[i]+=(Math.random()*2-1)*(1-t/0.001)*0.4;}}

/* ═══ LIBRARY ═══ */
var LIB=[
  {cat:'KICKS',sounds:[{name:'808',fn:synthKick808,dur:0.8},{name:'PUNCH',fn:synthKickPunch,dur:0.35},{name:'DEEP',fn:synthKickDeep,dur:1.0}]},
  {cat:'SNARES',sounds:[{name:'TIGHT',fn:synthSnareTight,dur:0.25},{name:'FAT',fn:synthSnareFat,dur:0.4},{name:'RIM',fn:synthRimshot,dur:0.12}]},

/* ═══ MUTE GROUPS ═══ */
// Closed hat (pad 2) kills open hat (pad 3)
var MUTE_GROUPS=[[2,3]]; // pairs: first kills second
var activeSources={};

/* ═══ TRIGGER ═══ */
var VEL_MAP=[0,0.35,0.7,1.0]; // velocity levels: off, soft, normal, accent
function triggerPad(idx,time,vel){
  var pad=pads[idx];if(!pad.buffer)return;
  // Mute group: stop conflicting sounds
  for(var m=0;m<MUTE_GROUPS.length;m++){
    var mg=MUTE_GROUPS[m];
    if(idx===mg[0]&&activeSources[mg[1]]){try{activeSources[mg[1]].stop();}catch(e){}}
    if(idx===mg[1]&&activeSources[mg[0]]){try{activeSources[mg[0]].stop();}catch(e){}}
  }
  var src=ctx.createBufferSource();src.buffer=pad.buffer;
  src.playbackRate.value=Math.pow(2,pad.pitch/12);
  var g=ctx.createGain();
  g.gain.value=pad.vol*(vel!==undefined?VEL_MAP[vel]:0.7);
  src.connect(g);g.connect(master);g.connect(reverbNode);
  if(time)src.start(time);else src.start();
  activeSources[idx]=src;
  src.onended=function(){if(activeSources[idx]===src)delete activeSources[idx];};
}

/* ═══ NOTE REPEAT ═══ */
var repeatTimer=null,repeatPad=-1,repeatStart=0;
function startRepeat(idx){
  repeatPad=idx;repeatStart=Date.now();
  function tick(){
    if(repeatPad!==idx)return;
    var elapsed=Date.now()-repeatStart;
    var rate=elapsed>1000?2:elapsed>500?1:0; // 0=1/8,1=1/16,2=1/32
    var ms=60000/bpm/(2<<rate); // 1/8=beat/2, 1/16=beat/4, 1/32=beat/8
    triggerPad(idx,undefined,2);
    flashPadEl(idx);
    repeatTimer=setTimeout(tick,ms);
  }
  var firstMs=60000/bpm/2;
  repeatTimer=setTimeout(tick,firstMs);
}
function stopRepeat(){
  repeatPad=-1;
  if(repeatTimer){clearTimeout(repeatTimer);repeatTimer=null;}
}

/* ═══ MIC RECORDING ═══ */
var micRecorder=null,micStream=null;
function startMicRecord(){
  if(micRecorder)return;
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
    micStream=stream;
    var rec=new MediaRecorder(stream);var chunks=[];
    micRecorder=rec;
    rec.ondataavailable=function(e){chunks.push(e.data);};
    rec.onstop=function(){
      micStream.getTracks().forEach(function(t){t.stop();});
      micStream=null;micRecorder=null;
      var blob=new Blob(chunks,{type:rec.mimeType});
      blob.arrayBuffer().then(function(ab){
        ctx.decodeAudioData(ab).then(function(buffer){
          pads[selPad].buffer=buffer;pads[selPad].name='REC';pads[selPad].libKey=null;
          triggerPad(selPad);renderPads();renderLibList();
          libTitleEl.textContent='PAD '+(selPad+1)+': REC';
          libMicEl.classList.remove('rec-active');libMicEl.textContent='🎙 rec mic';
        });
      });
    };
    rec.start();
    libMicEl.classList.add('rec-active');libMicEl.textContent='⏹ stop';
    setTimeout(function(){if(rec.state==='recording')rec.stop();},4000);
  }).catch(function(){});
}
function stopMicRecord(){
  if(micRecorder&&micRecorder.state==='recording'){micRecorder.stop();}
}

/* ═══ SEQUENCER ═══ */
function stepDur(stepNum){
  var base=60/bpm/4;if(swing===0)return base;
  return base*(stepNum%2===1?1+swing/100*0.6:1-swing/100*0.6);
}
function advanceStep(){
  switch(direction){
    case'fwd':curStep=(curStep+1)%stepLen;break;
    case'rev':curStep=(curStep-1+stepLen)%stepLen;break;
    case'ping':if(stepLen<=1){curStep=0;break;}
      if(pingFwd){curStep++;if(curStep>=stepLen-1){curStep=stepLen-1;pingFwd=false;}}
      else{curStep--;if(curStep<=0){curStep=0;pingFwd=true;}}break;
    case'rnd':curStep=Math.floor(Math.random()*stepLen);break;
  }
}
function scheduler(){
  while(nextTime<ctx.currentTime+0.1){
    for(var p=0;p<NUM;p++){
      var vel=pattern[p][curStep];
      if(vel>0){
        // probability check
        if(pads[p].prob>=100||Math.random()*100<pads[p].prob)
          triggerPad(p,nextTime,vel);
      }
    }
    var step=curStep;
    setTimeout((function(s){return function(){highlightStep(s);flashPadsAtStep(s);};})(step),
      Math.max(0,(nextTime-ctx.currentTime)*1000));
    nextTime+=stepDur(curStep);advanceStep();
  }
}
function startSeq(){
  if(ctx.state==='suspended')ctx.resume();
  playing=true;curStep=direction==='rev'?stepLen-1:0;pingFwd=true;
  nextTime=ctx.currentTime+0.05;schedTimer=setInterval(scheduler,25);renderTransport();
}
function stopSeq(){
  playing=false;if(schedTimer){clearInterval(schedTimer);schedTimer=null;}
  curStep=0;highlightStep(-1);renderTransport();
}

/* ═══ WAV EXPORT ═══ */
function exportWAV(){
  var dur=0;for(var s=0;s<stepLen;s++)dur+=stepDur(s);
  dur+=1.5; // reverb tail
  var sr=ctx.sampleRate,len=Math.ceil(sr*dur);
  var offline=new OfflineAudioContext(2,len,sr);
  // rebuild graph
  var oMaster=offline.createGain();oMaster.gain.value=0.8;
  var oComp=offline.createDynamicsCompressor();
  oComp.threshold.value=-8;oComp.ratio.value=4;oComp.attack.value=0.003;oComp.release.value=0.12;
  var oLim=offline.createDynamicsCompressor();
  oLim.threshold.value=-1;oLim.ratio.value=20;oLim.attack.value=0.001;oLim.release.value=0.05;
  oMaster.connect(oComp);oComp.connect(oLim);oLim.connect(offline.destination);
  var oRev=offline.createConvolver(),oRevG=offline.createGain();oRevG.gain.value=0.12;
  var rIR=offline.createBuffer(2,Math.floor(sr*1.8),sr);
  for(var c=0;c<2;c++){var rd=rIR.getChannelData(c);for(var i=0;i<rd.length;i++)rd[i]=(Math.random()*2-1)*Math.exp(-i/(sr*0.35));}
  oRev.buffer=rIR;oRev.connect(oRevG);oRevG.connect(oMaster);
  // schedule pattern
  var time=0,localStep=direction==='rev'?stepLen-1:0,localPing=true;
  for(var s=0;s<stepLen;s++){
    for(var p=0;p<NUM;p++){
      var vel=pattern[p][localStep];
      if(vel>0&&pads[p].buffer){
        if(pads[p].prob>=100||Math.random()*100<pads[p].prob){
          var src=offline.createBufferSource();src.buffer=pads[p].buffer;
          src.playbackRate.value=Math.pow(2,pads[p].pitch/12);
          var g=offline.createGain();g.gain.value=VEL_MAP[vel];
          src.connect(g);g.connect(oMaster);g.connect(oRev);src.start(time);
        }
      }
    }
    time+=stepDur(localStep);
    // advance
    switch(direction){
      case'fwd':localStep=(localStep+1)%stepLen;break;
      case'rev':localStep=(localStep-1+stepLen)%stepLen;break;
      case'ping':if(stepLen<=1){localStep=0;break;}
        if(localPing){localStep++;if(localStep>=stepLen-1){localStep=stepLen-1;localPing=false;}}
        else{localStep--;if(localStep<=0){localStep=0;localPing=true;}}break;
      case'rnd':localStep=Math.floor(Math.random()*stepLen);break;
    }
  }
  offline.startRendering().then(function(buffer){
    var blob=new Blob([encodeWAV(buffer)],{type:'audio/wav'});
    var a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download='breaks-loop.wav';a.click();URL.revokeObjectURL(a.href);
    showToast('wav exported');
  });
}
function encodeWAV(buf){
  var nc=buf.numberOfChannels,sr=buf.sampleRate,ns=buf.length,
      bps=16,ba=nc*(bps/8),br=sr*ba,ds=ns*nc*(bps/8),sz=44+ds;
  var ab=new ArrayBuffer(sz),dv=new DataView(ab);
  function ws(o,s){for(var i=0;i<s.length;i++)dv.setUint8(o+i,s.charCodeAt(i));}
  ws(0,'RIFF');dv.setUint32(4,sz-8,true);ws(8,'WAVE');ws(12,'fmt ');
  dv.setUint32(16,16,true);dv.setUint16(20,1,true);dv.setUint16(22,nc,true);
  dv.setUint32(24,sr,true);dv.setUint32(28,br,true);dv.setUint16(32,ba,true);
  dv.setUint16(34,bps,true);ws(36,'data');dv.setUint32(40,ds,true);
  var ch=[];for(var c=0;c<nc;c++)ch.push(buf.getChannelData(c));
  var off=44;
  for(var i=0;i<ns;i++)for(var c=0;c<nc;c++){
    var s=Math.max(-1,Math.min(1,ch[c][i]));
    dv.setInt16(off,s<0?s*0x8000:s*0x7FFF,true);off+=2;
  }
  return ab;
}

/* ═══ PATTERN BANKS ═══ */
var BKEY='breaks_bank_';
function saveBank(slot){
  var data={bpm:bpm,swing:swing,stepLen:stepLen,direction:direction,
    pads:pads.map(function(p){return{name:p.name,libKey:p.libKey,pitch:p.pitch,prob:p.prob};}),
    pattern:pattern.map(function(p){return Array.from(p);})
  };
  try{localStorage.setItem(BKEY+slot,JSON.stringify(data));}catch(e){}
  renderBankBtns();showToast('P'+(slot+1)+' saved');
}
function loadBank(slot){
  try{
    var raw=localStorage.getItem(BKEY+slot);if(!raw)return false;
    var data=JSON.parse(raw);
    if(playing)stopSeq();
    bpm=data.bpm||120;swing=data.swing||0;stepLen=data.stepLen||16;direction=data.direction||'fwd';
    for(var i=0;i<NUM;i++){
      if(data.pads&&data.pads[i]){
        pads[i].name=data.pads[i].name;pads[i].pitch=data.pads[i].pitch||0;
        pads[i].prob=data.pads[i].prob!==undefined?data.pads[i].prob:100;
        pads[i].libKey=data.pads[i].libKey;
        pads[i].buffer=data.pads[i].libKey?libBuffers[data.pads[i].libKey]||null:null;
      }
      if(data.pattern&&data.pattern[i])for(var s=0;s<32;s++)pattern[i][s]=data.pattern[i][s]||0;
    }
    bpmREl.value=bpm;bpmVEl.textContent=bpm;
    swgREl.value=swing;swgVEl.textContent=swing+'%';
    curBank=slot;
    renderAll();return true;
  }catch(e){return false;}
}
function bankHasData(slot){try{return!!localStorage.getItem(BKEY+slot);}catch(e){return false;}}

function renderPads(){

    var el=document.createElement('div');

    el.innerHTML='<span class="idx">'+(i+1)+'</span><span class="nm">'+pads[i].name+'</span>'
      +(probStr?'<span class="sub">'+probStr+'</span>':'');
    (function(idx){

      el.addEventListener('pointerdown',function(e){
        e.preventDefault();if(ctx.state==='suspended')ctx.resume();
        downTime=Date.now();selPad=idx;triggerPad(idx,undefined,2);
        renderPadSel();renderSteps();

        el.classList.add('repeating');
      });

function renderPadSel(){for(var i=0;i<padEls.length;i++)padEls[i].classList.toggle('sel',i===selPad);}

function renderSteps(){
  stepWEl.innerHTML='';stepEls=[];
  for(var s=0;s<stepLen;s++){
    var el=document.createElement('div');
    var v=pattern[selPad][s];
    el.className='step'+(v>0?' v'+v:'')+(s%4===0?' beat':'');
    (function(idx){
      el.addEventListener('pointerdown',function(e){
        e.preventDefault();
        // Cycle: 0→2→3→1→0
        var cur=pattern[selPad][idx];
        var next=cur===0?2:cur===2?3:cur===3?1:0;
        pattern[selPad][idx]=next;
        el.className='step'+(next>0?' v'+next:'')+(idx%4===0?' beat':'');
      });
    })(s);
    stepWEl.appendChild(el);stepEls.push(el);
  }
}

function highlightStep(s){
  for(var i=0;i<stepEls.length;i++)stepEls[i].classList.remove('cur');
  if(s>=0&&s<stepEls.length){
    stepEls[s].classList.add('cur');
    var el=stepEls[s],w=stepWEl;
    if(el.offsetLeft<w.scrollLeft||el.offsetLeft+el.offsetWidth>w.scrollLeft+w.clientWidth)
      w.scrollLeft=el.offsetLeft-w.clientWidth/2+el.offsetWidth/2;
  }
}

var keysDown={};
document.addEventListener('keydown',function(e){
  if(e.repeat||e.target.tagName==='INPUT')return;var k=e.key.toLowerCase();
  if(k===' '){e.preventDefault();if(playing)stopSeq();else startSeq();return;}
  if(KEY_MAP[k]!==undefined&&!keysDown[k]){
    keysDown[k]=true;if(ctx.state==='suspended')ctx.resume();
    var idx=KEY_MAP[k];selPad=idx;triggerPad(idx,undefined,2);renderPadSel();renderSteps();flashPadEl(idx);
  }
});
document.addEventListener('keyup',function(e){keysDown[e.key.toLowerCase()]=false;});

/* ═══ INIT ═══ */
initLibrary();loadDefaultKit();loadDefaultPattern();renderAll();

})();
</script>
</body>
