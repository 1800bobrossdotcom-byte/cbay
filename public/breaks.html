<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>BREAKS — cbay.ing</title>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#060a08;--surface:rgba(255,255,255,0.03);--border:rgba(255,255,255,0.06);
      --text:#e8f0e8;--text-dim:rgba(255,255,255,0.4);--text-muted:rgba(255,255,255,0.2);
      --accent:#39FF14;--accent-dim:rgba(57,255,20,0.10);--accent-border:rgba(57,255,20,0.30);
      --accent-glow:rgba(57,255,20,0.06);--pad-bg:rgba(255,255,255,0.025);
    }
    html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
      color:var(--text);-webkit-user-select:none;user-select:none;touch-action:manipulation}
    #app{display:flex;flex-direction:column;width:100%;height:100%;height:100dvh}

    /* ── Topbar ── */
    .topbar{display:flex;align-items:center;justify-content:space-between;height:48px;padding:0 12px;
      background:rgba(6,10,8,0.9);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border);flex-shrink:0;z-index:10;position:relative}
    .topbar a{color:var(--accent);text-decoration:none;font-size:13px;letter-spacing:2px;font-weight:500;opacity:0.7}
    .topbar a:hover{opacity:1}
    .topbar .title{font-size:12px;letter-spacing:5px;text-transform:uppercase;color:var(--text-dim);
      position:absolute;left:50%;transform:translateX(-50%);font-weight:700;pointer-events:none}
    .topbar button{background:var(--surface);border:1px solid var(--border);border-radius:10px;
      color:var(--text);width:38px;height:38px;font-size:14px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;font-family:inherit}
    .topbar button:active{background:var(--accent-dim);border-color:var(--accent-border)}

    /* ── Control bar ── */
    .ctrl-bar{display:flex;align-items:center;gap:6px;padding:6px 10px;
      background:rgba(0,0,0,0.3);border-bottom:1px solid var(--border);flex-shrink:0}
    .ctrl-bar .lbl{font-size:9px;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase}
    .ctrl-bar .val{font-size:12px;color:var(--accent);min-width:28px;text-align:center;
      font-variant-numeric:tabular-nums;letter-spacing:1px}
    .ctrl-bar input[type=range]{flex:1;height:4px;-webkit-appearance:none;appearance:none;
      background:var(--border);border-radius:2px;outline:none}
    .ctrl-bar input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;
      border-radius:50%;background:var(--accent);border:none;cursor:pointer}

    /* ── Pad grid ── */
    .pad-grid{flex:1;display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:8px;
      min-height:0;align-content:center;max-width:480px;margin:0 auto;width:100%}
    .pad{border-radius:10px;background:var(--pad-bg);border:1px solid var(--border);
      display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;
      cursor:pointer;transition:transform 0.06s,background 0.06s,border-color 0.15s;
      -webkit-tap-highlight-color:transparent;aspect-ratio:1;position:relative;min-height:0}
    .pad:active,.pad.flash{transform:scale(0.92);background:var(--accent-dim);border-color:var(--accent)}
    .pad.sel{border-color:var(--accent);box-shadow:0 0 12px var(--accent-glow)}
    .pad .nm{font-size:9px;letter-spacing:1px;color:var(--text-dim);text-transform:uppercase;
      text-align:center;line-height:1.2;pointer-events:none}
    .pad .idx{position:absolute;top:4px;left:6px;font-size:7px;color:var(--text-muted);pointer-events:none}

    /* ── Pattern bar ── */
    .pattern-bar{display:flex;align-items:center;justify-content:center;gap:4px;
      padding:6px 8px;background:rgba(0,0,0,0.3);border-top:1px solid var(--border);flex-shrink:0}
    .seg{display:flex;gap:3px}
    .seg .sep{width:1px;background:var(--border);margin:0 4px}
    .pbtn{padding:5px 9px;border:1px solid var(--border);border-radius:6px;background:var(--surface);
      color:var(--text-muted);font-size:10px;letter-spacing:1px;cursor:pointer;
      font-family:inherit;text-transform:uppercase;transition:all 0.15s}
    .pbtn.on{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}

    /* ── Step row ── */
    .step-wrap{display:flex;gap:2px;padding:6px 8px;overflow-x:auto;flex-shrink:0;
      background:rgba(0,0,0,0.25);border-top:1px solid var(--border);
      scrollbar-width:none;-ms-overflow-style:none}
    .step-wrap::-webkit-scrollbar{display:none}
    .step{flex:0 0 auto;width:24px;height:26px;border-radius:4px;border:1px solid var(--border);
      background:var(--surface);cursor:pointer;transition:background 0.08s;position:relative}
    .step.on{background:var(--accent-dim);border-color:var(--accent-border)}
    .step.on::after{content:'';position:absolute;inset:4px;border-radius:2px;background:var(--accent);opacity:0.5}
    .step.cur{box-shadow:inset 0 0 0 2px var(--accent)}
    .step.beat{border-top:2px solid rgba(255,255,255,0.06)}

    /* ── Transport ── */
    .transport{display:flex;gap:6px;padding:8px 10px;border-top:1px solid var(--border);
      background:rgba(0,0,0,0.35);flex-shrink:0}
    .transport button{flex:1;padding:12px 6px;border:1px solid var(--border);border-radius:10px;
      background:var(--surface);color:var(--text-dim);font-size:11px;letter-spacing:2px;
      text-transform:uppercase;cursor:pointer;font-family:inherit;transition:all 0.15s}
    .transport button:active{background:var(--accent-dim);border-color:var(--accent-border)}
    .transport .playing{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}

    /* ── Library overlay ── */
    .lib-ov{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:none;z-index:100;
      align-items:center;justify-content:center;padding:16px}
    .lib-ov.open{display:flex}
    .lib-modal{width:100%;max-width:400px;max-height:80vh;background:var(--bg);
      border:1px solid var(--border);border-radius:16px;overflow:hidden;display:flex;flex-direction:column}
    .lib-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;
      border-bottom:1px solid var(--border)}
    .lib-hdr span{font-size:11px;letter-spacing:3px;color:var(--text-dim);text-transform:uppercase}
    .lib-hdr button{background:none;border:none;color:var(--text-dim);font-size:18px;cursor:pointer;
      width:32px;height:32px;display:flex;align-items:center;justify-content:center}
    .lib-pitch{display:flex;align-items:center;gap:6px;padding:8px 14px;border-bottom:1px solid var(--border)}
    .lib-pitch .lbl{font-size:9px;letter-spacing:2px;color:var(--text-muted)}
    .lib-pitch .val{font-size:12px;color:var(--accent);min-width:32px;text-align:center}
    .lib-pitch input[type=range]{flex:1;height:4px;-webkit-appearance:none;appearance:none;
      background:var(--border);border-radius:2px;outline:none}
    .lib-pitch input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;
      border-radius:50%;background:var(--accent);border:none;cursor:pointer}
    .lib-cats{display:flex;gap:3px;padding:8px;overflow-x:auto;flex-shrink:0;
      scrollbar-width:none;-ms-overflow-style:none}
    .lib-cats::-webkit-scrollbar{display:none}
    .lib-cat{padding:5px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface);
      color:var(--text-muted);font-size:9px;letter-spacing:1px;cursor:pointer;white-space:nowrap;
      font-family:inherit;text-transform:uppercase}
    .lib-cat.on{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
    .lib-list{flex:1;overflow-y:auto;padding:6px 8px;-webkit-overflow-scrolling:touch}
    .lib-item{padding:10px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:4px;
      cursor:pointer;font-size:11px;letter-spacing:2px;color:var(--text-dim);
      display:flex;align-items:center;gap:8px;transition:all 0.12s;text-transform:uppercase}
    .lib-item:active,.lib-item.loaded{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
    .lib-item .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);opacity:0;flex-shrink:0}
    .lib-item.loaded .dot{opacity:1}
    .lib-file{margin:6px 8px 8px;padding:12px;border:1px dashed var(--border);border-radius:8px;
      background:transparent;color:var(--text-muted);font-size:10px;letter-spacing:1px;
      cursor:pointer;font-family:inherit;text-align:center;width:calc(100% - 16px)}
    .lib-file:active{border-color:var(--accent);color:var(--accent)}

    /* ── Share toast ── */
    .toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);padding:8px 18px;
      border-radius:8px;background:var(--accent);color:var(--bg);font-size:11px;letter-spacing:2px;
      opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:200;text-transform:uppercase}
    .toast.show{opacity:1}

    /* ── Responsive ── */
    @media(max-width:380px){
      .pad .nm{font-size:8px}.transport button{font-size:10px;padding:10px}
      .step{width:20px;height:22px}
    }
    @media(min-width:600px){.pad-grid{max-width:380px}}
    @media(min-height:700px){.pad-grid{gap:8px;padding:12px}}
  </style>
</head>
<body>
  <div id="app">
    <div class="topbar">
      <a href="/apps">← apps</a>
      <span class="title">BREAKS</span>
      <button id="shareBtn" aria-label="share">↗</button>
    </div>
    <div class="ctrl-bar">
      <span class="lbl">BPM</span>
      <span class="val" id="bpmV">120</span>
      <input type="range" id="bpmR" min="60" max="200" value="120">
      <span class="lbl">SWG</span>
      <span class="val" id="swgV">0%</span>
      <input type="range" id="swgR" min="0" max="80" value="0">
    </div>
    <div class="pad-grid" id="pGrid"></div>
    <div class="pattern-bar">
      <div class="seg" id="lenG"></div>
      <div class="seg"><div class="sep"></div></div>
      <div class="seg" id="dirG"></div>
    </div>
    <div class="step-wrap" id="stepW"></div>
    <div class="transport">
      <button id="playB">▶ play</button>
      <button id="clrB">✕ clr</button>
      <button id="browseB">⊞ browse</button>
    </div>
    <div class="lib-ov" id="libOv">
      <div class="lib-modal">
        <div class="lib-hdr"><span id="libTitle">SAMPLE LIBRARY</span><button id="libX">✕</button></div>
        <div class="lib-pitch">
          <span class="lbl">PITCH</span>
          <span class="val" id="pitchV">0</span>
          <input type="range" id="pitchR" min="-24" max="24" value="0">
        </div>
        <div class="lib-cats" id="libCats"></div>
        <div class="lib-list" id="libList"></div>
        <button class="lib-file" id="libFile">📁 load .wav / .mp3 file</button>
      </div>
    </div>
    <div class="toast" id="toast">link copied</div>
  </div>

  <script>
  (function(){
    'use strict';

    /* ═══════════════════ STATE ═══════════════════ */

    var AudioCtx = window.AudioContext || window.webkitAudioContext;
    if (!AudioCtx) return;
    var ctx = new AudioCtx();

    var NUM_PADS = 16;
    var selPad = 0;
    var bpm = 120;
    var swing = 0;
    var stepLen = 16;
    var direction = 'fwd';
    var playing = false;
    var curStep = 0;
    var pingFwd = true;
    var schedTimer = null;
    var nextTime = 0;
    var libCat = 0;

    // Pads: each has name, buffer, pitch, volume
    var pads = [];
    // Pattern: 2D array [padIdx][step] = 0 or 1, max 32 steps
    var pattern = [];
    for (var p = 0; p < NUM_PADS; p++) {
      pads.push({ name: '---', buffer: null, pitch: 0, vol: 1 });
      pattern.push(new Uint8Array(32));
    }

    /* ═══════════════════ AUDIO GRAPH ═══════════════════ */

    var master = ctx.createGain();
    master.gain.value = 0.8;
    var comp = ctx.createDynamicsCompressor();
    comp.threshold.value = -8; comp.ratio.value = 4;
    comp.attack.value = 0.003; comp.release.value = 0.12;
    var limiter = ctx.createDynamicsCompressor();
    limiter.threshold.value = -1; limiter.ratio.value = 20;
    limiter.attack.value = 0.001; limiter.release.value = 0.05;
    master.connect(comp); comp.connect(limiter); limiter.connect(ctx.destination);

    // Reverb
    var reverbNode = ctx.createConvolver();
    var reverbGain = ctx.createGain();
    reverbGain.gain.value = 0.12;
    function makeReverbIR(len, decay) {
      var sr = ctx.sampleRate, n = Math.floor(sr * len);
      var buf = ctx.createBuffer(2, n, sr);
      for (var c = 0; c < 2; c++) { var d = buf.getChannelData(c);
        for (var i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (sr * decay));
      } return buf;
    }
    reverbNode.buffer = makeReverbIR(1.8, 0.35);
    reverbNode.connect(reverbGain); reverbGain.connect(master);

    /* ═══════════════════ DSP HELPERS ═══════════════════ */

    function makeBuffer(fn, dur) {
      var sr = ctx.sampleRate, n = Math.floor(sr * dur);
      var buf = ctx.createBuffer(1, n, sr);
      fn(buf.getChannelData(0), sr, n);
      return buf;
    }
    function lpf(d, fc, sr) {
      var dt = 1 / sr, rc = 1 / (6.2832 * fc), a = dt / (rc + dt), y = 0;
      for (var i = 0; i < d.length; i++) { y += a * (d[i] - y); d[i] = y; }
    }
    function hpf(d, fc, sr) {
      var dt = 1 / sr, rc = 1 / (6.2832 * fc), a = rc / (rc + dt), y = 0, px = 0;
      for (var i = 0; i < d.length; i++) { y = a * (y + d[i] - px); px = d[i]; d[i] = y; }
    }

    /* ═══════════════════ DRUM SYNTHESIS ═══════════════════ */

    function synthKick808(d, sr) {
      var ph = 0;
      for (var i = 0; i < d.length; i++) {
        var t = i / sr, env = Math.exp(-t * 3.5);
        ph += (150 * Math.exp(-t * 5) + 42) * 6.2832 / sr;
        d[i] = Math.sin(ph) * env * 0.9;
        if (t < 0.004) d[i] += (1 - t / 0.004) * 0.35;
      }
    }
    function synthKickPunch(d, sr) {
      var ph = 0;
      for (var i = 0; i < d.length; i++) {
        var t = i / sr, env = Math.exp(-t * 7);
        ph += (220 * Math.exp(-t * 18) + 55) * 6.2832 / sr;
        d[i] = Math.sin(ph) * env * 0.85;
        if (t < 0.002) d[i] += (1 - t / 0.002) * 0.5;
      }
    }
    function synthKickDeep(d, sr) {
      var ph = 0;
      for (var i = 0; i < d.length; i++) {
        var t = i / sr, env = Math.exp(-t * 2);
        ph += (80 * Math.exp(-t * 2.5) + 32) * 6.2832 / sr;
        d[i] = Math.sin(ph) * env * 0.95;
      }
    }
    function synthSnareTight(d, sr, n) {
      var ns = new Float32Array(n), ph = 0;
      for (var i = 0; i < n; i++) {
        var t = i / sr;
        ph += 185 * 6.2832 / sr;
        d[i] = (Math.sin(ph) + Math.sin(ph * 1.6) * 0.3) * Math.exp(-t * 20) * 0.45;
        ns[i] = (Math.random() * 2 - 1) * Math.exp(-t * 14);
        if (t < 0.001) d[i] += 0.3;
      }
      hpf(ns, 900, sr); lpf(ns, 7000, sr);
      for (var i = 0; i < n; i++) d[i] += ns[i] * 0.5;
    }
    function synthSnareFat(d, sr, n) {
      var ns = new Float32Array(n), ph = 0;
      for (var i = 0; i < n; i++) {
        var t = i / sr;
        ph += 150 * 6.2832 / sr;
        d[i] = (Math.sin(ph) + Math.sin(ph * 1.5) * 0.25) * Math.exp(-t * 12) * 0.4;
        ns[i] = (Math.random() * 2 - 1) * Math.exp(-t * 8);
        if (t < 0.001) d[i] += 0.25;
      }
      hpf(ns, 600, sr); lpf(ns, 5500, sr);
      for (var i = 0; i < n; i++) d[i] += ns[i] * 0.55;
    }
    function synthRimshot(d, sr) {
      var ph1 = 0, ph2 = 0;
      for (var i = 0; i < d.length; i++) {
        var t = i / sr;
        ph1 += 830 * 6.2832 / sr; ph2 += 1650 * 6.2832 / sr;
        d[i] = (Math.sin(ph1) * 0.5 + Math.sin(ph2) * 0.3) * Math.exp(-t * 35);
        if (t < 0.001) d[i] += 0.4;
      }
    }
    function synthClap(d, sr) {
      for (var i = 0; i < d.length; i++) {
        var t = i / sr, env = 0;
        // 4 layered bursts
        for (var b = 0; b < 4; b++) {
          var bt = t - b * 0.012;
          if (bt >= 0 && bt < 0.015) env += (1 - bt / 0.015) * 0.6;
        }
        // Tail
        if (t > 0.04) env += Math.exp(-(t - 0.04) * 12) * 0.7;
        d[i] = (Math.random() * 2 - 1) * env;
      }
      hpf(d, 800, sr); lpf(d, 3500, sr);
    }
    function synthHatClosed(d, sr) {
      var phs = [0, 0, 0, 0, 0, 0];
      var freqs = [800, 1480, 2700, 3350, 4480, 5920];
      for (var i = 0; i < d.length; i++) {
        var t = i / sr, env = Math.exp(-t * 60), s = 0;
        for (var h = 0; h < 6; h++) {
          phs[h] += freqs[h] * 6.2832 / sr;
          s += (Math.sin(phs[h]) > 0 ? 0.12 : -0.12); // square-ish partials
        }
        d[i] = s * env + (Math.random() * 2 - 1) * env * 0.3;
      }
      hpf(d, 5000, sr);
    }
    function synthHatOpen(d, sr) {
      var phs = [0, 0, 0, 0, 0, 0];
      var freqs = [800, 1480, 2700, 3350, 4480, 5920];
      for (var i = 0; i < d.length; i++) {
        var t = i / sr, env = Math.exp(-t * 5), s = 0;
        for (var h = 0; h < 6; h++) {
          phs[h] += freqs[h] * 6.2832 / sr;
          s += (Math.sin(phs[h]) > 0 ? 0.1 : -0.1);
        }
        d[i] = s * env + (Math.random() * 2 - 1) * env * 0.25;
      }
      hpf(d, 4500, sr);
    }
    function synthTomHi(d, sr) {
      var ph = 0;
      for (var i = 0; i < d.length; i++) {
        var t = i / sr, env = Math.exp(-t * 8);
        ph += (300 * Math.exp(-t * 6) + 180) * 6.2832 / sr;
        d[i] = Math.sin(ph) * env * 0.7;
        if (t < 0.002) d[i] += (1 - t / 0.002) * 0.2;
      }
    }
    function synthTomMid(d, sr) {
      var ph = 0;
      for (var i = 0; i < d.length; i++) {
        var t = i / sr, env = Math.exp(-t * 6);
        ph += (220 * Math.exp(-t * 5) + 120) * 6.2832 / sr;
        d[i] = Math.sin(ph) * env * 0.75;
        if (t < 0.002) d[i] += (1 - t / 0.002) * 0.2;
      }
    }
    function synthTomLo(d, sr) {
      var ph = 0;
      for (var i = 0; i < d.length; i++) {
        var t = i / sr, env = Math.exp(-t * 4);
        ph += (160 * Math.exp(-t * 4) + 70) * 6.2832 / sr;
        d[i] = Math.sin(ph) * env * 0.8;
        if (t < 0.002) d[i] += (1 - t / 0.002) * 0.2;
      }
    }
    function synthClave(d, sr) {
      var ph = 0;
      for (var i = 0; i < d.length; i++) {
        var t = i / sr;
        ph += 2500 * 6.2832 / sr;
        d[i] = Math.sin(ph) * Math.exp(-t * 50) * 0.6;
      }
    }
    function synthCowbell(d, sr) {
      var ph1 = 0, ph2 = 0;
      for (var i = 0; i < d.length; i++) {
        var t = i / sr, env = Math.exp(-t * 8);
        ph1 += 545 * 6.2832 / sr; ph2 += 815 * 6.2832 / sr;
        d[i] = ((Math.sin(ph1) > 0 ? 0.3 : -0.3) + (Math.sin(ph2) > 0 ? 0.25 : -0.25)) * env;
      }
      hpf(d, 400, sr); lpf(d, 5000, sr);
    }
    function synthConga(d, sr) {
      var ph = 0;
      for (var i = 0; i < d.length; i++) {
        var t = i / sr, env = Math.exp(-t * 6);
        ph += (280 * Math.exp(-t * 5) + 120) * 6.2832 / sr;
        d[i] = Math.sin(ph) * env * 0.7;
      }
    }
    function synthShaker(d, sr) {
      for (var i = 0; i < d.length; i++) {
        var t = i / sr;
        d[i] = (Math.random() * 2 - 1) * Math.exp(-t * 15) * 0.5;
      }
      hpf(d, 6000, sr);
    }
    function synthCrash(d, sr) {
      var phs = [0, 0, 0, 0];
      var freqs = [1200, 2800, 4200, 6800];
      for (var i = 0; i < d.length; i++) {
        var t = i / sr, env = Math.exp(-t * 2.5), s = 0;
        for (var h = 0; h < 4; h++) {
          phs[h] += freqs[h] * 6.2832 / sr;
          s += (Math.sin(phs[h]) > 0 ? 0.08 : -0.08);
        }
        d[i] = s * env + (Math.random() * 2 - 1) * env * 0.35;
      }
      hpf(d, 3000, sr);
    }
    function synthRide(d, sr) {
      var phs = [0, 0, 0, 0, 0];
      var freqs = [1000, 2400, 3600, 5200, 7000];
      for (var i = 0; i < d.length; i++) {
        var t = i / sr, env = Math.exp(-t * 4), s = 0;
        for (var h = 0; h < 5; h++) {
          phs[h] += freqs[h] * 6.2832 / sr;
          s += (Math.sin(phs[h]) > 0 ? 0.06 : -0.06);
        }
        d[i] = s * env + (Math.random() * 2 - 1) * env * 0.15;
      }
      hpf(d, 4000, sr);
    }
    function synthPerc(d, sr) {
      var ph = 0;
      for (var i = 0; i < d.length; i++) {
        var t = i / sr, env = Math.exp(-t * 20);
        ph += (1200 * Math.exp(-t * 15) + 400) * 6.2832 / sr;
        d[i] = Math.sin(ph) * env * 0.5;
        if (t < 0.001) d[i] += (Math.random() * 2 - 1) * (1 - t / 0.001) * 0.4;
      }
    }

    /* ═══════════════════ LIBRARY ═══════════════════ */

    var LIB = [
      { cat: 'KICKS', sounds: [
        { name: '808', fn: synthKick808, dur: 0.8 },
        { name: 'PUNCH', fn: synthKickPunch, dur: 0.35 },
        { name: 'DEEP', fn: synthKickDeep, dur: 1.0 },
      ]},
      { cat: 'SNARES', sounds: [
        { name: 'TIGHT', fn: synthSnareTight, dur: 0.25 },
        { name: 'FAT', fn: synthSnareFat, dur: 0.4 },
        { name: 'RIM', fn: synthRimshot, dur: 0.12 },
      ]},
      { cat: 'HATS', sounds: [
        { name: 'CLOSED', fn: synthHatClosed, dur: 0.08 },
        { name: 'OPEN', fn: synthHatOpen, dur: 0.5 },
      ]},
      { cat: 'CLAPS', sounds: [
        { name: 'CLAP', fn: synthClap, dur: 0.3 },
      ]},
      { cat: 'TOMS', sounds: [
        { name: 'HIGH', fn: synthTomHi, dur: 0.3 },
        { name: 'MID', fn: synthTomMid, dur: 0.4 },
        { name: 'LOW', fn: synthTomLo, dur: 0.5 },
      ]},
      { cat: 'PERC', sounds: [
        { name: 'CLAVE', fn: synthClave, dur: 0.08 },
        { name: 'COWBELL', fn: synthCowbell, dur: 0.3 },
        { name: 'CONGA', fn: synthConga, dur: 0.35 },
        { name: 'SHAKER', fn: synthShaker, dur: 0.2 },
        { name: 'CRASH', fn: synthCrash, dur: 1.5 },
        { name: 'RIDE', fn: synthRide, dur: 0.8 },
        { name: 'PERC', fn: synthPerc, dur: 0.15 },
      ]},
    ];

    // Pre-render library buffers
    var libBuffers = {};
    function initLibrary() {
      for (var c = 0; c < LIB.length; c++) {
        for (var s = 0; s < LIB[c].sounds.length; s++) {
          var snd = LIB[c].sounds[s];
          var key = LIB[c].cat + ':' + snd.name;
          snd.buffer = makeBuffer(snd.fn, snd.dur);
          snd.key = key;
          libBuffers[key] = snd.buffer;
        }
      }
    }

    // Default pad assignments
    var DEFAULT_KIT = [
      ['KICKS','808'],['SNARES','TIGHT'],['HATS','CLOSED'],['HATS','OPEN'],
      ['CLAPS','CLAP'],['SNARES','RIM'],['TOMS','HIGH'],['TOMS','LOW'],
      ['PERC','CLAVE'],['PERC','COWBELL'],['PERC','CONGA'],['PERC','SHAKER'],
      ['KICKS','PUNCH'],['SNARES','FAT'],['PERC','CRASH'],['PERC','RIDE'],
    ];

    function loadDefaultKit() {
      for (var i = 0; i < NUM_PADS; i++) {
        var cat = DEFAULT_KIT[i][0], snd = DEFAULT_KIT[i][1];
        var key = cat + ':' + snd;
        pads[i].name = snd;
        pads[i].buffer = libBuffers[key] || null;
        pads[i].pitch = 0;
        pads[i].libKey = key;
      }
    }

    // Default pattern (basic beat on kit positions 0,1,2,3)
    function loadDefaultPattern() {
      // Kick on 0, 8
      pattern[0][0] = 1; pattern[0][8] = 1;
      // Snare on 4, 12
      pattern[1][4] = 1; pattern[1][12] = 1;
      // CH Hat on every even
      for (var i = 0; i < 16; i += 2) pattern[2][i] = 1;
      // OH Hat on 11
      pattern[3][11] = 1;
    }

    /* ═══════════════════ TRIGGER ═══════════════════ */

    function triggerPad(idx, time) {
      var pad = pads[idx];
      if (!pad.buffer) return;
      var src = ctx.createBufferSource();
      src.buffer = pad.buffer;
      src.playbackRate.value = Math.pow(2, pad.pitch / 12);
      var g = ctx.createGain();
      g.gain.value = pad.vol;
      src.connect(g);
      g.connect(master);
      g.connect(reverbNode);
      if (time) src.start(time); else src.start();
    }

    /* ═══════════════════ SEQUENCER ═══════════════════ */

    function stepDur(stepNum) {
      var base = 60 / bpm / 4; // 16th note
      if (swing === 0) return base;
      if (stepNum % 2 === 1) return base * (1 + swing / 100 * 0.6);
      return base * (1 - swing / 100 * 0.6);
    }

    function advanceStep() {
      switch (direction) {
        case 'fwd': curStep = (curStep + 1) % stepLen; break;
        case 'rev': curStep = (curStep - 1 + stepLen) % stepLen; break;
        case 'ping':
          if (stepLen <= 1) { curStep = 0; break; }
          if (pingFwd) { curStep++; if (curStep >= stepLen - 1) { curStep = stepLen - 1; pingFwd = false; } }
          else { curStep--; if (curStep <= 0) { curStep = 0; pingFwd = true; } }
          break;
        case 'rnd': curStep = Math.floor(Math.random() * stepLen); break;
      }
    }

    function scheduler() {
      while (nextTime < ctx.currentTime + 0.1) {
        // Trigger pads for current step
        for (var p = 0; p < NUM_PADS; p++) {
          if (pattern[p][curStep]) triggerPad(p, nextTime);
        }
        // Visual update (send to UI thread)
        var step = curStep;
        setTimeout((function(s) { return function() { highlightStep(s); flashPads(s); }; })(step), Math.max(0, (nextTime - ctx.currentTime) * 1000));
        nextTime += stepDur(curStep);
        advanceStep();
      }
    }

    function startSeq() {
      if (ctx.state === 'suspended') ctx.resume();
      playing = true;
      curStep = direction === 'rev' ? stepLen - 1 : 0;
      pingFwd = true;
      nextTime = ctx.currentTime + 0.05;
      schedTimer = setInterval(scheduler, 25);
      renderTransport();
    }

    function stopSeq() {
      playing = false;
      if (schedTimer) { clearInterval(schedTimer); schedTimer = null; }
      curStep = 0;
      highlightStep(-1);
      renderTransport();
    }

    /* ═══════════════════ DOM REFS ═══════════════════ */

    var pGridEl = document.getElementById('pGrid');
    var stepWEl = document.getElementById('stepW');
    var bpmREl = document.getElementById('bpmR');
    var bpmVEl = document.getElementById('bpmV');
    var swgREl = document.getElementById('swgR');
    var swgVEl = document.getElementById('swgV');
    var lenGEl = document.getElementById('lenG');
    var dirGEl = document.getElementById('dirG');
    var playBEl = document.getElementById('playB');
    var clrBEl = document.getElementById('clrB');
    var browseBEl = document.getElementById('browseB');
    var libOvEl = document.getElementById('libOv');
    var libCatsEl = document.getElementById('libCats');
    var libListEl = document.getElementById('libList');
    var libXEl = document.getElementById('libX');
    var libFileEl = document.getElementById('libFile');
    var pitchREl = document.getElementById('pitchR');
    var pitchVEl = document.getElementById('pitchV');
    var libTitleEl = document.getElementById('libTitle');
    var toastEl = document.getElementById('toast');
    var shareBtnEl = document.getElementById('shareBtn');

    /* ═══════════════════ RENDER ═══════════════════ */

    var padEls = [];
    var stepEls = [];

    function renderPads() {
      pGridEl.innerHTML = '';
      padEls = [];
      for (var i = 0; i < NUM_PADS; i++) {
        var el = document.createElement('div');
        el.className = 'pad' + (i === selPad ? ' sel' : '');
        el.innerHTML = '<span class="idx">' + (i + 1) + '</span><span class="nm">' + pads[i].name + '</span>';
        (function(idx) {
          el.addEventListener('pointerdown', function(e) {
            e.preventDefault();
            if (ctx.state === 'suspended') ctx.resume();
            selPad = idx;
            triggerPad(idx);
            renderPadSel();
            renderSteps();
          });
        })(i);
        pGridEl.appendChild(el);
        padEls.push(el);
      }
    }

    function renderPadSel() {
      for (var i = 0; i < padEls.length; i++) {
        padEls[i].classList.toggle('sel', i === selPad);
      }
    }

    function renderSteps() {
      stepWEl.innerHTML = '';
      stepEls = [];
      for (var s = 0; s < stepLen; s++) {
        var el = document.createElement('div');
        el.className = 'step' + (pattern[selPad][s] ? ' on' : '') + (s % 4 === 0 ? ' beat' : '');
        (function(idx) {
          el.addEventListener('pointerdown', function(e) {
            e.preventDefault();
            pattern[selPad][idx] = pattern[selPad][idx] ? 0 : 1;
            el.classList.toggle('on', !!pattern[selPad][idx]);
          });
        })(s);
        stepWEl.appendChild(el);
        stepEls.push(el);
      }
    }

    function highlightStep(s) {
      for (var i = 0; i < stepEls.length; i++) stepEls[i].classList.remove('cur');
      if (s >= 0 && s < stepEls.length) {
        stepEls[s].classList.add('cur');
        // Auto-scroll to current step
        var el = stepEls[s];
        var wrap = stepWEl;
        if (el.offsetLeft < wrap.scrollLeft || el.offsetLeft + el.offsetWidth > wrap.scrollLeft + wrap.clientWidth) {
          wrap.scrollLeft = el.offsetLeft - wrap.clientWidth / 2 + el.offsetWidth / 2;
        }
      }
    }

    function flashPads(step) {
      for (var p = 0; p < NUM_PADS; p++) {
        if (pattern[p][step]) {
          padEls[p].classList.add('flash');
          (function(el) { setTimeout(function() { el.classList.remove('flash'); }, 80); })(padEls[p]);
        }
      }
    }

    function renderLenBtns() {
      lenGEl.innerHTML = '';
      [8, 16, 32].forEach(function(n) {
        var b = document.createElement('button');
        b.className = 'pbtn' + (n === stepLen ? ' on' : '');
        b.textContent = n;
        b.addEventListener('pointerdown', function(e) {
          e.preventDefault();
          if (playing) stopSeq();
          stepLen = n;
          renderLenBtns();
          renderSteps();
        });
        lenGEl.appendChild(b);
      });
    }

    function renderDirBtns() {
      dirGEl.innerHTML = '';
      [['fwd','FWD'],['rev','REV'],['ping','PNG'],['rnd','RND']].forEach(function(d) {
        var b = document.createElement('button');
        b.className = 'pbtn' + (d[0] === direction ? ' on' : '');
        b.textContent = d[1];
        b.addEventListener('pointerdown', function(e) {
          e.preventDefault();
          direction = d[0];
          renderDirBtns();
        });
        dirGEl.appendChild(b);
      });
    }

    function renderTransport() {
      playBEl.textContent = playing ? '■ stop' : '▶ play';
      playBEl.classList.toggle('playing', playing);
    }

    /* ═══════════════════ LIBRARY MODAL ═══════════════════ */

    function openLib() {
      libOvEl.classList.add('open');
      libTitleEl.textContent = 'PAD ' + (selPad + 1) + ': ' + pads[selPad].name;
      pitchREl.value = pads[selPad].pitch;
      pitchVEl.textContent = (pads[selPad].pitch > 0 ? '+' : '') + pads[selPad].pitch;
      renderLibCats();
      renderLibList();
    }

    function closeLib() {
      libOvEl.classList.remove('open');
    }

    function renderLibCats() {
      libCatsEl.innerHTML = '';
      for (var c = 0; c < LIB.length; c++) {
        var b = document.createElement('button');
        b.className = 'lib-cat' + (c === libCat ? ' on' : '');
        b.textContent = LIB[c].cat;
        (function(idx) {
          b.addEventListener('pointerdown', function(e) {
            e.preventDefault();
            libCat = idx;
            renderLibCats();
            renderLibList();
          });
        })(c);
        libCatsEl.appendChild(b);
      }
    }

    function renderLibList() {
      libListEl.innerHTML = '';
      var cat = LIB[libCat];
      for (var s = 0; s < cat.sounds.length; s++) {
        var snd = cat.sounds[s];
        var el = document.createElement('div');
        var isLoaded = pads[selPad].libKey === snd.key;
        el.className = 'lib-item' + (isLoaded ? ' loaded' : '');
        el.innerHTML = '<span class="dot"></span>' + snd.name;
        (function(sound) {
          el.addEventListener('pointerdown', function(e) {
            e.preventDefault();
            if (ctx.state === 'suspended') ctx.resume();
            // Preview + assign
            pads[selPad].buffer = sound.buffer;
            pads[selPad].name = sound.name;
            pads[selPad].libKey = sound.key;
            triggerPad(selPad);
            libTitleEl.textContent = 'PAD ' + (selPad + 1) + ': ' + pads[selPad].name;
            renderLibList();
            renderPads();
          });
        })(snd);
        libListEl.appendChild(el);
      }
    }

    function loadFile() {
      var input = document.createElement('input');
      input.type = 'file';
      input.accept = 'audio/*';
      input.onchange = function() {
        var file = input.files[0];
        if (!file) return;
        var reader = new FileReader();
        reader.onload = function() {
          ctx.decodeAudioData(reader.result).then(function(buffer) {
            pads[selPad].buffer = buffer;
            pads[selPad].name = file.name.replace(/\.[^.]+$/, '').substring(0, 8).toUpperCase();
            pads[selPad].libKey = null;
            triggerPad(selPad);
            libTitleEl.textContent = 'PAD ' + (selPad + 1) + ': ' + pads[selPad].name;
            renderLibList();
            renderPads();
          });
        };
        reader.readAsArrayBuffer(file);
      };
      input.click();
    }

    /* ═══════════════════ EVENTS ═══════════════════ */

    bpmREl.addEventListener('input', function() { bpm = +bpmREl.value; bpmVEl.textContent = bpm; });
    swgREl.addEventListener('input', function() { swing = +swgREl.value; swgVEl.textContent = swing + '%'; });

    playBEl.addEventListener('pointerdown', function(e) {
      e.preventDefault();
      if (playing) stopSeq(); else startSeq();
    });

    clrBEl.addEventListener('pointerdown', function(e) {
      e.preventDefault();
      for (var s = 0; s < 32; s++) pattern[selPad][s] = 0;
      renderSteps();
    });

    browseBEl.addEventListener('pointerdown', function(e) {
      e.preventDefault();
      openLib();
    });

    libXEl.addEventListener('pointerdown', function(e) { e.preventDefault(); closeLib(); });
    libOvEl.addEventListener('pointerdown', function(e) { if (e.target === libOvEl) closeLib(); });
    libFileEl.addEventListener('pointerdown', function(e) { e.preventDefault(); loadFile(); });

    pitchREl.addEventListener('input', function() {
      pads[selPad].pitch = +pitchREl.value;
      pitchVEl.textContent = (pads[selPad].pitch > 0 ? '+' : '') + pads[selPad].pitch;
    });

    shareBtnEl.addEventListener('pointerdown', function(e) {
      e.preventDefault();
      if (navigator.share) {
        navigator.share({ title: 'BREAKS — cbay.ing', url: location.href }).catch(function(){});
      } else {
        navigator.clipboard.writeText(location.href).then(function() {
          toastEl.classList.add('show');
          setTimeout(function() { toastEl.classList.remove('show'); }, 1800);
        }).catch(function(){});
      }
    });

    // Keyboard
    var KEY_MAP = {
      '1':0,'2':1,'3':2,'4':3,
      'q':4,'w':5,'e':6,'r':7,
      'a':8,'s':9,'d':10,'f':11,
      'z':12,'x':13,'c':14,'v':15
    };
    var keysDown = {};
    document.addEventListener('keydown', function(e) {
      if (e.repeat || e.target.tagName === 'INPUT') return;
      var k = e.key.toLowerCase();
      if (k === ' ') { e.preventDefault(); if (playing) stopSeq(); else startSeq(); return; }
      if (KEY_MAP[k] !== undefined && !keysDown[k]) {
        keysDown[k] = true;
        if (ctx.state === 'suspended') ctx.resume();
        var idx = KEY_MAP[k];
        selPad = idx;
        triggerPad(idx);
        renderPadSel();
        renderSteps();
        padEls[idx].classList.add('flash');
        setTimeout(function() { padEls[idx].classList.remove('flash'); }, 80);
      }
    });
    document.addEventListener('keyup', function(e) {
      keysDown[e.key.toLowerCase()] = false;
    });

    /* ═══════════════════ INIT ═══════════════════ */

    initLibrary();
    loadDefaultKit();
    loadDefaultPattern();
    renderPads();
    renderSteps();
    renderLenBtns();
    renderDirBtns();
    renderTransport();

  })();
  </script>
</body>
</html>
