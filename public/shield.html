<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHIELD — cbay</title>
  <link rel="manifest" href="data:application/json,%7B%22name%22%3A%22SHIELD%22%2C%22short_name%22%3A%22SHIELD%22%2C%22start_url%22%3A%22%2Fshield%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%230a0a14%22%2C%22theme_color%22%3A%22%23FF2D55%22%7D">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a14">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0e10;
      --surface: rgba(140,180,140,0.08);
      --surface-hover: rgba(140,180,140,0.13);
      --border: rgba(140,180,140,0.14);
      --border-hover: rgba(140,180,140,0.22);
      --text: #d4e0d4;
      --text-dim: rgba(180,210,180,0.65);
      --text-muted: rgba(180,210,180,0.40);
      --accent: #FF2D55;
      --accent-dim: rgba(255,45,85,0.20);
      --accent-border: rgba(255,45,85,0.45);
      --accent-glow: rgba(255,45,85,0.18);
      --safe: #00FF9F;
      --safe-dim: rgba(0,255,159,0.18);
      --cyan: #00E5FF;
      --sub-accent: #FF8800;
      --sub-accent-dim: rgba(255,136,0,0.10);
      --sub-accent-border: rgba(255,136,0,0.3);
      --radius: 4px;
      --knob: linear-gradient(135deg, #708070 0%, #3a4a3a 50%, #708070 100%);
    }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -webkit-user-select: none; user-select: none;
      touch-action: manipulation;
    }
    #app { display: flex; flex-direction: column; width: 100%; height: 100dvh; }

    /* ── Topbar ── */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      height: 48px; padding: 0 16px;
      background: rgba(6,6,16,0.85);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0; z-index: 10; position: relative;
    }
    .topbar a {
      color: var(--accent); text-decoration: none;
      font-size: 14px; letter-spacing: 2px; font-weight: 500;
      opacity: 0.8; transition: opacity 0.2s;
    }
    .topbar a:hover { opacity: 1; }
    .topbar .title {
      font-size: 13px; letter-spacing: 5px; text-transform: uppercase;
      color: var(--text-dim); font-weight: 700;
      position: absolute; left: 50%; transform: translateX(-50%);
    }
    .topbar .mode-label {
      font-size: 12px; letter-spacing: 2px; color: var(--accent); font-weight: 600;
    }
    .topbar .controls { display: flex; gap: 8px; align-items: center; }
    .topbar .controls button {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); width: 42px; height: 42px;
      font-size: 18px; cursor: pointer; display: flex; align-items: center;
      justify-content: center; font-family: inherit; transition: border-color 0.2s, background 0.2s;
    }
    .topbar .controls button:hover { border-color: var(--border-hover); }
    .topbar .controls button:active { background: var(--accent-dim); border-color: var(--accent-border); }

    .main { flex: 1; display: flex; flex-direction: column; padding: 14px; overflow-y: auto; gap: 12px; }

    /* ── Threat display ── */
    .threat-display {
      display: flex; align-items: center; gap: 12px; padding: 14px;
      border-radius: var(--radius); background: var(--surface); border: 1px solid var(--border);
    }
    .threat-indicator {
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--safe); transition: background 0.3s; flex-shrink: 0;
      box-shadow: 0 0 12px rgba(0,255,159,0.3);
    }
    .threat-indicator.threat { background: var(--accent); box-shadow: 0 0 16px var(--accent-glow); animation: pulse 0.5s ease infinite alternate; }
    @keyframes pulse { to { opacity: 0.5; } }
    .threat-text { font-size: 12px; letter-spacing: 3px; text-transform: uppercase; color: var(--safe); font-weight: 700; }
    .threat-text.threat { color: var(--accent); }
    .pulse-count { margin-left: auto; font-size: 11px; color: var(--text-muted); letter-spacing: 2px; }

    /* ── FFT bands ── */
    .bands { display: flex; gap: 5px; }
    .band {
      flex: 1; background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 8px 4px; text-align: center;
    }
    .band-name { font-size: 11px; letter-spacing: 1px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; }
    .band-bar { height: 40px; display: flex; align-items: flex-end; justify-content: center; }
    .band-fill { width: 12px; border-radius: 3px 3px 0 0; background: var(--cyan); transition: height 0.15s; min-height: 2px; }
    .band-fill.threat { background: var(--accent); }

    /* ── Viz canvas ── */
    .viz { width: 100%; height: 100px; border-radius: var(--radius); background: var(--surface); border: 1px solid var(--border); flex-shrink: 0; }

    /* ── Mode buttons ── */
    .modes { display: flex; gap: 5px; flex-wrap: wrap; }
    .modes button {
      font-family: inherit; font-size: 13px; letter-spacing: 1.5px; text-transform: uppercase;
      padding: 12px 16px; border-radius: var(--radius);
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text-dim); cursor: pointer; transition: all 0.2s;
      min-height: 44px;
    }
    .modes button:hover { border-color: var(--border-hover); color: var(--text); background: var(--surface-hover); }
    .modes button.active {
      background: var(--accent-dim); border-color: var(--accent-border); color: var(--accent);
      box-shadow: 0 0 20px var(--accent-glow);
    }

    /* ── Counter sub-modes ── */
    .sub-modes { display: flex; gap: 5px; }
    .sub-modes button {
      font-family: inherit; font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase;
      padding: 10px 14px; border-radius: 10px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text-muted); cursor: pointer; transition: all 0.2s;
      min-height: 44px;
    }
    .sub-modes button:hover { border-color: var(--border-hover); color: var(--text); }
    .sub-modes button.active {
      background: var(--sub-accent-dim); border-color: var(--sub-accent-border); color: var(--sub-accent);
    }

    /* ── Sliders ── */
    .slider-row { display: flex; align-items: center; gap: 12px; padding: 3px 0; }
    .slider-label { font-size: 12px; letter-spacing: 1.5px; color: var(--text-muted); text-transform: uppercase; width: 65px; flex-shrink: 0; }
    .slider-row input[type=range] {
      flex: 1; -webkit-appearance: none; height: 4px; border-radius: 2px;
      background: rgba(255,255,255,0.08); outline: none;
    }
    .slider-row input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 30px; height: 30px; border-radius: 50%;
      background: var(--accent); cursor: pointer; box-shadow: 0 0 12px var(--accent-glow);
    }
    .slider-val { font-size: 13px; color: var(--text-dim); width: 50px; text-align: right; }

    .info-bar {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 12px; letter-spacing: 1px; color: var(--text-muted);
      padding: 10px 0; border-top: 1px solid var(--border); margin-top: auto;
    }

    .rec-btn {
      font-family: inherit; font-size: 13px; letter-spacing: 1.5px;
      padding: 12px 20px; border-radius: var(--radius);
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text-dim); cursor: pointer; transition: all 0.2s;
      min-height: 44px;
    }
    .rec-btn:hover { border-color: var(--border-hover); color: var(--text); }
    .rec-btn.recording {
      background: var(--accent-dim); border-color: var(--accent-border); color: var(--accent);
      box-shadow: 0 0 20px var(--accent-glow);
    }

    @media (max-width: 380px) {
      .main { padding: 10px; gap: 8px; }
      .modes button { padding: 10px 12px; font-size: 10px; }
    }

    /* ══ Tactical Field Scanner Hardware ══ */
    body {
      background: #040605;
      background-image:
        repeating-linear-gradient(45deg, transparent 0, transparent 2px, rgba(0,255,100,0.01) 2px, rgba(0,255,100,0.01) 3px),
        repeating-linear-gradient(-45deg, transparent 0, transparent 2px, rgba(0,255,100,0.007) 2px, rgba(0,255,100,0.007) 3px);
    }
    #app {
      max-width: 600px; margin: 0 auto;
      border-left: 3px solid rgba(0,255,100,0.06);
      border-right: 3px solid rgba(0,255,100,0.06);
      box-shadow: 4px 0 20px rgba(0,0,0,0.5), -4px 0 20px rgba(0,0,0,0.5);
    }
    .topbar {
      background: linear-gradient(180deg, #0c110e 0%, #060a07 100%);
      border-bottom: 3px solid rgba(0,255,100,0.08);
      box-shadow: 0 3px 10px rgba(0,0,0,0.6);
    }
    .topbar .title {
      font-family: 'Courier New', Courier, monospace;
      color: rgba(0,255,100,0.35);
      text-shadow: 0 0 12px rgba(0,255,100,0.1);
      letter-spacing: 8px;
    }
    .topbar .mode-label {
      font-family: 'Courier New', Courier, monospace;
      font-weight: 700; font-size: 14px;
      text-shadow: 0 0 14px rgba(255,45,85,0.6), 0 0 30px rgba(255,45,85,0.2);
    }
    .topbar .controls button {
      background: linear-gradient(180deg, #0e140f 0%, #060a07 100%);
      border: 2px solid rgba(0,255,100,0.08);
      border-radius: 4px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.03);
    }
    .topbar .controls button:active { box-shadow: inset 0 3px 6px rgba(0,0,0,0.6); transform: translateY(1px); }

    .main {
      background: linear-gradient(180deg, rgba(8,16,10,0.6) 0%, rgba(4,8,5,0.8) 100%);
      box-shadow: inset 0 0 80px rgba(0,0,0,0.4);
    }

    /* Threat display panel */
    .threat-display {
      background: #030504;
      border: 3px solid rgba(0,255,100,0.08);
      border-radius: 4px;
      box-shadow: inset 0 0 40px rgba(0,0,0,0.7), 0 3px 8px rgba(0,0,0,0.5);
    }
    .threat-indicator {
      box-shadow: 0 0 20px rgba(0,255,159,0.5), 0 0 40px rgba(0,255,159,0.2), inset 0 0 3px rgba(255,255,255,0.3);
    }
    .threat-indicator.threat {
      box-shadow: 0 0 24px rgba(255,45,85,0.7), 0 0 50px rgba(255,45,85,0.3), inset 0 0 3px rgba(255,255,255,0.3);
    }
    .threat-text {
      font-family: 'Courier New', Courier, monospace;
      font-weight: 700; font-size: 13px;
      text-shadow: 0 0 10px rgba(0,255,159,0.5);
    }
    .threat-text.threat { text-shadow: 0 0 12px rgba(255,45,85,0.6); }
    .pulse-count {
      font-family: 'Courier New', Courier, monospace;
      text-shadow: 0 0 8px rgba(0,255,100,0.25);
    }

    /* FFT band meters - LED bar style */
    .band {
      background: #030504;
      border: 2px solid rgba(0,255,100,0.06);
      border-radius: 4px;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.6), 0 2px 4px rgba(0,0,0,0.3);
    }
    .band-name {
      font-family: 'Courier New', Courier, monospace;
      font-size: 8px; letter-spacing: 0.5px;
      text-shadow: 0 0 6px rgba(0,255,100,0.15);
    }
    .band-fill {
      border-radius: 1px 1px 0 0;
      box-shadow: 0 0 10px rgba(0,229,255,0.5), 0 0 20px rgba(0,229,255,0.2);
    }
    .band-fill.threat {
      box-shadow: 0 0 12px rgba(255,45,85,0.6), 0 0 24px rgba(255,45,85,0.25);
    }

    /* Phosphor CRT spectrum display */
    .viz {
      background: #020403;
      border: 3px solid rgba(0,255,100,0.08);
      border-radius: 4px;
      box-shadow:
        inset 0 0 60px rgba(0,0,0,0.9),
        inset 0 0 12px rgba(0,229,255,0.03),
        0 3px 8px rgba(0,0,0,0.5);
      position: relative; overflow: hidden;
    }
    .viz::after {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(0deg, transparent 0, transparent 1px, rgba(0,255,100,0.04) 1px, rgba(0,255,100,0.04) 2px);
      pointer-events: none;
      border-radius: 4px;
    }

    /* Tactical toggle switches */
    .modes button, .sub-modes button {
      background: linear-gradient(180deg, #0e140f 0%, #060a07 100%);
      border: 2px solid rgba(0,255,100,0.08);
      border-radius: 4px;
      box-shadow:
        0 4px 8px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.04);
      font-family: 'Courier New', Courier, monospace;
      font-weight: 700;
      text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    }
    .modes button:hover, .sub-modes button:hover {
      border-color: rgba(0,255,100,0.14);
      background: linear-gradient(180deg, #101810 0%, #080c09 100%);
    }
    .modes button:active, .sub-modes button:active {
      box-shadow: inset 0 4px 10px rgba(0,0,0,0.7);
      transform: translateY(2px);
    }
    .modes button.active {
      background: linear-gradient(180deg, #160a0e 0%, #0a0508 100%);
      border-color: rgba(255,45,85,0.35);
      box-shadow:
        inset 0 3px 10px rgba(0,0,0,0.5),
        0 0 24px rgba(255,45,85,0.18);
      text-shadow: 0 0 10px rgba(255,45,85,0.6);
    }
    .sub-modes button.active {
      background: linear-gradient(180deg, #14100a 0%, #0a0806 100%);
      border-color: rgba(255,136,0,0.30);
      box-shadow: inset 0 3px 8px rgba(0,0,0,0.4), 0 0 18px rgba(255,136,0,0.12);
      text-shadow: 0 0 10px rgba(255,136,0,0.5);
    }

    /* Heavy mil-spec rotary knobs */
    .slider-label {
      font-family: 'Courier New', Courier, monospace;
      font-weight: 700;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }
    .slider-row input[type=range] {
      height: 10px;
      background: #030504;
      border: 2px solid rgba(0,255,100,0.06);
      border-radius: 3px;
      box-shadow: inset 0 3px 8px rgba(0,0,0,0.8);
    }
    .slider-row input[type=range]::-webkit-slider-thumb {
      background: linear-gradient(135deg, #607060 0%, #2a382a 25%, #708070 50%, #2a382a 75%, #607060 100%);
      border: 2px solid rgba(30,50,30,0.7);
      box-shadow: 0 3px 10px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.18), 0 1px 0 rgba(100,140,100,0.08);
      width: 32px; height: 32px;
    }
    .slider-val {
      font-family: 'Courier New', Courier, monospace;
      color: rgba(0,229,255,0.8);
      text-shadow: 0 0 10px rgba(0,229,255,0.4);
      font-weight: 700;
    }

    /* Evidence recorder */
    .rec-btn {
      background: linear-gradient(180deg, #120c0e 0%, #080508 100%);
      border: 2px solid rgba(0,255,100,0.08);
      border-radius: 4px;
      box-shadow: 0 3px 6px rgba(0,0,0,0.5);
      font-family: 'Courier New', Courier, monospace;
      font-weight: 700;
    }
    .rec-btn.recording {
      border-color: rgba(255,45,85,0.45);
      box-shadow: inset 0 3px 8px rgba(0,0,0,0.4), 0 0 24px rgba(255,45,85,0.25);
      text-shadow: 0 0 12px rgba(255,45,85,0.6);
    }

    /* Status readout */
    .info-bar {
      font-family: 'Courier New', Courier, monospace;
      border-top: 3px solid rgba(0,255,100,0.06);
    }
    #statusInfo {
      color: rgba(0,229,255,0.7);
      text-shadow: 0 0 10px rgba(0,229,255,0.35);
      font-weight: 700;
    }

    .share-toast {
      position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
      background: var(--accent); color: var(--bg); padding: 10px 20px;
      border-radius: 10px; font-size: 11px; letter-spacing: 1.5px;
      text-transform: uppercase; font-weight: 700; z-index: 200;
      opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    .share-toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="share-toast" id="shareToast">link copied</div>
  <div id="app">
    <div class="topbar">
      <a href="/apps" aria-label="Back to apps">&larr; apps</a>
      <span class="title">SHIELD</span>
      <div class="controls">
        <span class="mode-label" id="modeLabel">OFF</span>
        <button id="shareBtn" title="share">&#x2197;</button>
      </div>
    </div>

    <div class="main">
      <div class="threat-display" role="status" aria-live="polite">
        <div class="threat-indicator" id="threatDot"></div>
        <span class="threat-text" id="threatText">CLEAR</span>
        <span class="pulse-count" id="pulseCount">PULSES: 0</span>
      </div>

      <div class="bands" id="bands" aria-label="Frequency band levels">
        <div class="band"><div class="band-name">Sub-Bass</div><div class="band-bar"><div class="band-fill" id="b0" style="height:2px;"></div></div></div>
        <div class="band"><div class="band-name">Infra</div><div class="band-bar"><div class="band-fill" id="b1" style="height:2px;"></div></div></div>
        <div class="band"><div class="band-name">Voice</div><div class="band-bar"><div class="band-fill" id="b2" style="height:2px;"></div></div></div>
        <div class="band"><div class="band-name">Ultra</div><div class="band-bar"><div class="band-fill" id="b3" style="height:2px;"></div></div></div>
        <div class="band"><div class="band-name">Hi-Ultra</div><div class="band-bar"><div class="band-fill" id="b4" style="height:2px;"></div></div></div>
      </div>

      <canvas class="viz" id="viz" aria-label="Frequency spectrum"></canvas>

      <div class="modes" id="modes" role="group" aria-label="Defense modes">
        <button data-mode="monitor">Monitor</button>
        <button data-mode="phase">Phase Cancel</button>
        <button data-mode="sweep">Sweep Jam</button>
        <button data-mode="broadband">Broadband</button>
        <button data-mode="counter">Counter</button>
        <button data-mode="off" class="active">Off</button>
      </div>

      <div class="sub-modes" id="subModes" style="display:none;" role="group" aria-label="Counter sub-modes">
        <button data-sub="0" class="active">Harmonic</button>
        <button data-sub="1">Detune</button>
        <button data-sub="2">Binaural</button>
        <button data-sub="3">Sub-Harm</button>
      </div>

      <div class="slider-row">
        <span class="slider-label">Volume</span>
        <input type="range" id="volume" min="0" max="100" value="60" aria-label="Volume">
        <span class="slider-val" id="volVal">60</span>
      </div>
      <div class="slider-row">
        <span class="slider-label">Target</span>
        <input type="range" id="targetFreq" min="20" max="20000" value="1000" aria-label="Target frequency">
        <span class="slider-val" id="targetVal">1000 Hz</span>
      </div>
      <div class="slider-row">
        <span class="slider-label">Intensity</span>
        <input type="range" id="intensity" min="0" max="100" value="70" aria-label="Intensity">
        <span class="slider-val" id="intVal">70</span>
      </div>

      <div style="display:flex;gap:8px;">
        <button class="rec-btn" id="recBtn" aria-label="Record evidence">REC</button>
      </div>

      <div class="info-bar">
        <span id="statusInfo">Shield standby</span>
        <span>cbay.ing/shield</span>
      </div>
    </div>
  </div>

<script>
(function(){
  /* ── Share ── */
  var shareBtn = document.getElementById('shareBtn');
  var shareToast = document.getElementById('shareToast');
  shareBtn.addEventListener('pointerdown', function(e) {
    e.preventDefault();
    if (navigator.share) {
      navigator.share({ title: 'SHIELD — cbay.ing', url: window.location.href }).catch(function(){});
    } else {
      navigator.clipboard.writeText(window.location.href).then(function() {
        shareToast.classList.add('show');
        setTimeout(function() { shareToast.classList.remove('show'); }, 1800);
      }).catch(function(){});
    }
  });

  var ctx = null, masterGain = null, analyser = null, micStream = null, micSource = null;
  var activeNodes = [];
  var currentMode = 'off';
  var counterMode = 0;
  var volume = 0.6;
  var targetFreq = 1000;
  var intensity = 0.7;
  var pulseCount = 0;
  var lastThreat = false;
  var isRecording = false;
  var recorder = null, recordChunks = [];
  var workletReady = false;

  var BANDS = [
    { name: 'Sub-Bass', lo: 10, hi: 60, thresh: 0.30 },
    { name: 'Infrasonic', lo: 60, hi: 200, thresh: 0.25 },
    { name: 'Voice', lo: 200, hi: 4000, thresh: 0.40 },
    { name: 'Ultrasonic', lo: 15000, hi: 20000, thresh: 0.20 },
    { name: 'Hi-Ultra', lo: 20000, hi: 22050, thresh: 0.15 }
  ];

  /* ── AudioWorklet white-noise processor (inline) ── */
  var workletCode = [
    'class WhiteNoiseProcessor extends AudioWorkletProcessor {',
    '  constructor() { super(); this.intensity = 0.7; this.port.onmessage = (e) => { this.intensity = e.data.intensity; }; }',
    '  process(inputs, outputs) {',
    '    const out = outputs[0][0]; if (!out) return true;',
    '    for (let i = 0; i < out.length; i++) out[i] = (Math.random() * 2 - 1) * 0.4 * this.intensity;',
    '    return true;',
    '  }',
    '}',
    'registerProcessor("white-noise-processor", WhiteNoiseProcessor);'
  ].join('\n');

  function ensureCtx() {
    if (ctx) return Promise.resolve();
    ctx = new AudioContext({ sampleRate: 44100 });
    masterGain = ctx.createGain();
    masterGain.gain.value = volume;
    analyser = ctx.createAnalyser();
    analyser.fftSize = 8192;
    masterGain.connect(ctx.destination);

    var workletP;
    try {
      var blob = new Blob([workletCode], { type: 'application/javascript' });
      var url = URL.createObjectURL(blob);
      workletP = ctx.audioWorklet.addModule(url).then(function() {
        URL.revokeObjectURL(url);
        workletReady = true;
      }).catch(function() { workletReady = false; });
    } catch(e) { workletP = Promise.resolve(); }

    return workletP.then(function() {
      return navigator.mediaDevices.getUserMedia({ audio: true });
    }).then(function(stream) {
      micStream = stream;
      micSource = ctx.createMediaStreamSource(stream);
      micSource.connect(analyser);
      drawViz();
      startAnalysis();
    }).catch(function() {
      drawViz();
      startAnalysis();
    });
  }

  function stopAll() {
    activeNodes.forEach(function(n) {
      try { if (n.stop) n.stop(); n.disconnect(); } catch(e) {}
    });
    activeNodes = [];
  }

  function setMode(mode) {
    ensureCtx().then(function() {
      stopAll();
      currentMode = mode;
      document.getElementById('modeLabel').textContent = mode.toUpperCase();
      document.querySelectorAll('#modes button').forEach(function(b) {
        b.classList.toggle('active', b.dataset.mode === mode);
      });
      document.getElementById('subModes').style.display = mode === 'counter' ? 'flex' : 'none';
      document.getElementById('statusInfo').textContent = mode === 'off' ? 'Shield standby' : mode + ' active';

      if (mode === 'phase') startPhaseCancel();
      else if (mode === 'sweep') startSweepJam();
      else if (mode === 'broadband') startBroadband();
      else if (mode === 'counter') startCounter();
    });
  }

  function startPhaseCancel() {
    if (!micSource) return;
    var delay = ctx.createDelay(0.01);
    delay.delayTime.value = 0.005;
    var inv = ctx.createGain();
    inv.gain.value = -1;
    micSource.connect(delay);
    delay.connect(inv);
    inv.connect(masterGain);
    activeNodes.push(delay, inv);
  }

  function startSweepJam() {
    var osc = ctx.createOscillator();
    osc.type = 'sawtooth';
    var lfo = ctx.createOscillator();
    lfo.type = 'triangle'; lfo.frequency.value = 2;
    var lfoGain = ctx.createGain();
    lfoGain.gain.value = 1250;
    lfo.connect(lfoGain);
    lfoGain.connect(osc.frequency);
    osc.frequency.value = 2750;

    var bp = ctx.createBiquadFilter();
    bp.type = 'bandpass'; bp.frequency.value = 2750; bp.Q.value = 2;
    var outGain = ctx.createGain();
    outGain.gain.value = 0.3 * intensity;
    osc.connect(bp); bp.connect(outGain); outGain.connect(masterGain);
    osc.start(); lfo.start();
    activeNodes.push(osc, lfo, lfoGain, bp, outGain);
  }

  function startBroadband() {
    if (workletReady) {
      var node = new AudioWorkletNode(ctx, 'white-noise-processor');
      node.port.postMessage({ intensity: intensity });
      var bp = ctx.createBiquadFilter();
      bp.type = 'bandpass'; bp.frequency.value = 2000; bp.Q.value = 0.5;
      node.connect(bp); bp.connect(masterGain);
      activeNodes.push(node, bp);
    } else {
      // Fallback: buffer-based white noise
      var dur = 4, len = ctx.sampleRate * dur;
      var buf = ctx.createBuffer(1, len, ctx.sampleRate);
      var d = buf.getChannelData(0);
      for (var i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * 0.4 * intensity;
      var src = ctx.createBufferSource();
      src.buffer = buf; src.loop = true;
      var bp = ctx.createBiquadFilter();
      bp.type = 'bandpass'; bp.frequency.value = 2000; bp.Q.value = 0.5;
      src.connect(bp); bp.connect(masterGain); src.start();
      activeNodes.push(src, bp);
    }
  }

  function startCounter() {
    stopAll();
    var f = targetFreq;
    var g;

    if (counterMode === 0) {
      for (var h = 2; h <= 5; h++) {
        var osc = ctx.createOscillator();
        osc.type = 'sine'; osc.frequency.value = f * h + 3.7 * (h - 1);
        g = ctx.createGain(); g.gain.value = 0.25 * intensity / h;
        osc.connect(g); g.connect(masterGain); osc.start();
        activeNodes.push(osc, g);
      }
    } else if (counterMode === 1) {
      var o1 = ctx.createOscillator(); o1.type = 'sine'; o1.frequency.value = f;
      var o2 = ctx.createOscillator(); o2.type = 'sine'; o2.frequency.value = f + 7.5;
      g = ctx.createGain(); g.gain.value = 0.3 * intensity;
      o1.connect(g); o2.connect(g); g.connect(masterGain);
      o1.start(); o2.start();
      activeNodes.push(o1, o2, g);
    } else if (counterMode === 2) {
      var merger = ctx.createChannelMerger(2);
      var oL = ctx.createOscillator(); oL.type = 'sine'; oL.frequency.value = f - 5;
      var oR = ctx.createOscillator(); oR.type = 'sine'; oR.frequency.value = f + 5;
      g = ctx.createGain(); g.gain.value = 0.3 * intensity;
      oL.connect(merger, 0, 0); oR.connect(merger, 0, 1);
      merger.connect(g); g.connect(masterGain);
      oL.start(); oR.start();
      activeNodes.push(oL, oR, merger, g);
    } else {
      var s1 = ctx.createOscillator(); s1.type = 'sine'; s1.frequency.value = f / 2;
      var s2 = ctx.createOscillator(); s2.type = 'sine'; s2.frequency.value = f / 3;
      g = ctx.createGain(); g.gain.value = 0.25 * intensity;
      s1.connect(g); s2.connect(g); g.connect(masterGain);
      s1.start(); s2.start();
      activeNodes.push(s1, s2, g);
    }
  }

  function startAnalysis() {
    var freqData = new Float32Array(analyser.frequencyBinCount);
    var binHz = 44100 / analyser.fftSize;

    function analyze() {
      requestAnimationFrame(analyze);
      if (currentMode === 'off') return;
      analyser.getFloatFrequencyData(freqData);

      var anyThreat = false;
      for (var b = 0; b < BANDS.length; b++) {
        var band = BANDS[b];
        var startBin = Math.floor(band.lo / binHz);
        var endBin = Math.min(Math.ceil(band.hi / binHz), freqData.length - 1);
        var sum = 0; var count = 0;
        for (var i = startBin; i <= endBin; i++) {
          var mag = Math.pow(10, freqData[i] / 20);
          sum += mag;
          count++;
        }
        var avg = count > 0 ? sum / count : 0;
        var norm = Math.min(avg / band.thresh, 1);
        var el = document.getElementById('b' + b);
        el.style.height = Math.max(2, norm * 40) + 'px';
        if (norm > 0.8) { el.classList.add('threat'); anyThreat = true; }
        else el.classList.remove('threat');
      }

      var dot = document.getElementById('threatDot');
      var txt = document.getElementById('threatText');
      if (anyThreat) {
        dot.classList.add('threat'); txt.classList.add('threat');
        txt.textContent = 'THREAT DETECTED';
        if (!lastThreat) { pulseCount++; document.getElementById('pulseCount').textContent = 'PULSES: ' + pulseCount; }
      } else {
        dot.classList.remove('threat'); txt.classList.remove('threat');
        txt.textContent = 'CLEAR';
      }
      lastThreat = anyThreat;
    }
    analyze();
  }

  function drawViz() {
    var canvas = document.getElementById('viz');
    var c = canvas.getContext('2d');
    function resize() {
      var r = canvas.getBoundingClientRect();
      canvas.width = r.width * devicePixelRatio;
      canvas.height = r.height * devicePixelRatio;
    }
    resize(); window.addEventListener('resize', resize);

    var dataArr = new Uint8Array(analyser.frequencyBinCount);
    function draw() {
      requestAnimationFrame(draw);
      analyser.getByteFrequencyData(dataArr);
      var w = canvas.width; var h = canvas.height;
      c.clearRect(0, 0, w, h);
      var barW = w / 128;
      for (var i = 0; i < 128; i++) {
        var v = dataArr[i] / 255;
        c.fillStyle = v > 0.7 ? '#FF2D55' : '#00E5FF';
        c.globalAlpha = 0.6 + v * 0.4;
        c.fillRect(i * barW, h - v * h, barW - 1, v * h);
      }
      c.globalAlpha = 1;
    }
    draw();
  }

  document.getElementById('recBtn').addEventListener('click', function() {
    ensureCtx().then(function() {
      var btn = document.getElementById('recBtn');
      if (!isRecording) {
        var dest = ctx.createMediaStreamDestination();
        masterGain.connect(dest);
        if (micSource) micSource.connect(dest);
        recorder = new MediaRecorder(dest.stream);
        recordChunks = [];
        recorder.ondataavailable = function(e) { if (e.data.size > 0) recordChunks.push(e.data); };
        recorder.onstop = function() {
          var blob = new Blob(recordChunks, { type: 'audio/webm' });
          var url = URL.createObjectURL(blob);
          var a = document.createElement('a');
          a.href = url; a.download = 'shield_evidence_' + Date.now() + '.webm';
          a.click(); URL.revokeObjectURL(url);
          masterGain.disconnect(dest);
        };
        recorder.start();
        isRecording = true;
        btn.textContent = '\u25CF REC'; btn.classList.add('recording');
      } else {
        recorder.stop();
        isRecording = false;
        btn.textContent = 'REC'; btn.classList.remove('recording');
      }
    });
  });

  document.querySelectorAll('#modes button').forEach(function(b) {
    b.addEventListener('click', function() { setMode(this.dataset.mode); });
  });
  document.querySelectorAll('#subModes button').forEach(function(b) {
    b.addEventListener('click', function() {
      counterMode = parseInt(this.dataset.sub);
      document.querySelectorAll('#subModes button').forEach(function(s) { s.classList.remove('active'); });
      this.classList.add('active');
      if (currentMode === 'counter') { stopAll(); startCounter(); }
    });
  });

  document.getElementById('volume').addEventListener('input', function() {
    volume = this.value / 100;
    document.getElementById('volVal').textContent = this.value;
    if (masterGain) masterGain.gain.setTargetAtTime(volume, ctx.currentTime, 0.02);
  });
  document.getElementById('targetFreq').addEventListener('input', function() {
    targetFreq = parseInt(this.value);
    document.getElementById('targetVal').textContent = targetFreq + ' Hz';
    if (currentMode === 'counter') { stopAll(); startCounter(); }
  });
  document.getElementById('intensity').addEventListener('input', function() {
    intensity = this.value / 100;
    document.getElementById('intVal').textContent = this.value;
  });
})();
</script>
</body>
</html>
