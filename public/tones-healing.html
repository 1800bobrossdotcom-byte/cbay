<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>b0b Healing Tones</title>
<meta name="description" content="Solfeggio healing frequency generator - standalone, zero dependencies">
<meta name="theme-color" content="#0a0a14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Healing Tones">
<link rel="manifest" href="/manifest-healing.json">
<link rel="icon" href="/favicon.png" type="image/png">
<link rel="apple-touch-icon" href="/favicon.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;color:#e8e8f0;font-family:system-ui,sans-serif;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom);user-select:none;-webkit-user-select:none}
.app{max-width:500px;width:100%;padding:24px;border:1px solid #1e1e3a;border-radius: 8px}
.app h1{color:#FF00E5;font-size:1rem;letter-spacing:2px;margin-bottom:16px;text-align:center}
.freq-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.btn{padding:10px 14px;background:transparent;border:1px solid #00E5FF;color:#00E5FF;font-family:inherit;font-size:0.8rem;cursor:pointer;border-radius: 8px;flex:1 1 calc(50% - 6px);min-width:100px;text-align:center;transition:background 0.2s,color 0.2s}
.btn:hover,.btn.active{background:#00E5FF;color:#0a0a14}
.status{margin:12px 0;color:#8888aa;font-size:0.85rem;text-align:center;min-height:1.2em}
.toggle{display:flex;align-items:center;justify-content:center;gap:10px;margin:16px 0;cursor:pointer;font-size:0.9rem}
.toggle input{width:22px;height:22px;accent-color:#00E5FF}
input[type=range]{width:100%;margin:12px 0;accent-color:#00E5FF;height:28px}
.credit{margin-top:20px;color:#1e1e3a;font-size:0.6rem;text-align:center}
.credit a{color:#8888aa;text-decoration:none}
.install-banner{display:none;background:#12121e;border:1px solid #00E5FF;padding:12px;margin-bottom:16px;border-radius: 8px;font-size:0.75rem;color:#aaaacc;text-align:center;line-height:1.5}
.install-banner strong{color:#00E5FF}
.install-banner .dismiss{color:#8888aa;cursor:pointer;font-size:0.65rem;margin-top:6px;display:block}
@media(max-width:360px){.btn{flex:1 1 calc(50% - 4px);padding:8px 8px;font-size:0.7rem;min-width:80px}}
</style>
</head>
<body>
<div class="app">
  <div class="install-banner" id="installBanner">
    <strong>📱 INSTALL TO HOME SCREEN</strong><br>
    <span id="installInstructions"></span>
    <span class="dismiss" onclick="document.getElementById('installBanner').style.display='none'">dismiss</span>
  </div>
  <h1>🎵 b0b HEALING TONES</h1>
  <label class="toggle"><input type="checkbox" id="tog" onchange="toggle(this.checked)"><span>ACTIVATE</span></label>
  <div class="status" id="st">INACTIVE</div>
  <div class="freq-grid" id="grid">
    <button class="btn" data-f="174" data-n="Pain Relief" onclick="sel(this)">174 Hz</button>
    <button class="btn" data-f="285" data-n="Tissue Healing" onclick="sel(this)">285 Hz</button>
    <button class="btn active" data-f="396" data-n="Liberation" onclick="sel(this)">396 Hz</button>
    <button class="btn" data-f="417" data-n="Change" onclick="sel(this)">417 Hz</button>
    <button class="btn" data-f="432" data-n="Natural Calm" onclick="sel(this)">432 Hz</button>
    <button class="btn" data-f="528" data-n="Love / DNA Repair" onclick="sel(this)">528 Hz</button>
    <button class="btn" data-f="639" data-n="Connection" onclick="sel(this)">639 Hz</button>
    <button class="btn" data-f="741" data-n="Intuition" onclick="sel(this)">741 Hz</button>
    <button class="btn" data-f="852" data-n="Spiritual" onclick="sel(this)">852 Hz</button>
    <button class="btn" data-f="963" data-n="Higher Self" onclick="sel(this)">963 Hz</button>
  </div>
  <input type="range" min="0" max="100" value="25" oninput="vol(this.value)" title="Volume">
  <div class="credit"><a href="https://cbay.ing">cbay.ing</a> - COUNTERMEASURES</div>
</div>
<script>
var ctx,osc,sub,gain,on=false,freq=396,name="Liberation",v=0.06;

function toggle(e){
  if(e){
    if(!ctx) ctx=new(window.AudioContext||window.webkitAudioContext)();
    if(ctx.state==="suspended") ctx.resume();
    if(osc){try{osc.stop();osc.disconnect()}catch(x){}}
    if(sub){try{sub.stop();sub.disconnect()}catch(x){}}
    osc=ctx.createOscillator();osc.type="sine";osc.frequency.value=freq;
    gain=ctx.createGain();gain.gain.setValueAtTime(0,ctx.currentTime);
    gain.gain.linearRampToValueAtTime(v,ctx.currentTime+0.5);
    osc.connect(gain);
    sub=ctx.createOscillator();sub.type="sine";sub.frequency.value=freq/2;
    var sg=ctx.createGain();sg.gain.value=0.15;sub.connect(sg);sg.connect(gain);
    gain.connect(ctx.destination);osc.start();sub.start();
    on=true;
    document.getElementById("st").textContent="ACTIVE - "+freq+" Hz";
    document.getElementById("st").style.color="#00E5FF";
  } else {
    if(gain&&ctx){
      gain.gain.linearRampToValueAtTime(0,ctx.currentTime+0.3);
      setTimeout(function(){
        try{if(osc){osc.stop();osc.disconnect();osc=null}if(sub){sub.stop();sub.disconnect();sub=null}if(gain){gain.disconnect();gain=null}}catch(x){}
      },350);
    }
    on=false;
    document.getElementById("st").textContent="INACTIVE";
    document.getElementById("st").style.color="#8888aa";
  }
}

function sel(b){
  document.querySelectorAll(".btn").forEach(function(x){x.classList.remove("active")});
  b.classList.add("active");freq=parseInt(b.dataset.f);name=b.dataset.n;
  if(on&&osc&&ctx){
    osc.frequency.linearRampToValueAtTime(freq,ctx.currentTime+0.3);
    if(sub) sub.frequency.linearRampToValueAtTime(freq/2,ctx.currentTime+0.3);
    document.getElementById("st").textContent="ACTIVE - "+freq+" Hz";
  }
}

function vol(val){v=(val/100)*0.25;if(on&&gain&&ctx) gain.gain.linearRampToValueAtTime(v,ctx.currentTime+0.1)}

// Install prompt
(function(){
  var ua=navigator.userAgent||'';
  var ios=/iPad|iPhone|iPod/.test(ua)||(/Macintosh/.test(ua)&&'ontouchend' in document);
  var standalone=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone;
  if(standalone) return;
  var banner=document.getElementById('installBanner');
  var inst=document.getElementById('installInstructions');
  if(ios){
    inst.innerHTML='Tap <strong>Share ↑</strong> then <strong>"Add to Home Screen"</strong>';
    banner.style.display='block';
  } else if(/android/i.test(ua)){
    inst.innerHTML='Tap <strong>⋮ Menu</strong> then <strong>"Add to Home Screen"</strong> or <strong>"Install App"</strong>';
    banner.style.display='block';
  }
  // Chrome install prompt
  var deferredPrompt=null;
  window.addEventListener('beforeinstallprompt',function(e){
    e.preventDefault();deferredPrompt=e;
    inst.innerHTML='<button onclick="installPWA()" style="background:#00E5FF;color:#0a0a14;border:none;padding:8px 16px;font-family:inherit;cursor:pointer;border-radius: 8px;font-size:0.8rem">⬇ INSTALL TO HOME SCREEN</button>';
    banner.style.display='block';
  });
  window.installPWA=function(){
    if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(function(){deferredPrompt=null;banner.style.display='none'})}
  };
})();
</script>
</body>
</html>
