<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>SYNTH — cbay.ing</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0e0e1a;--surface:rgba(255,255,255,0.07);--border:rgba(255,255,255,0.12);
  --text:#f0e8f4;--text-dim:rgba(255,255,255,0.6);--text-muted:rgba(255,255,255,0.4);
  --accent:#FF0080;--accent-dim:rgba(255,0,128,0.18);--accent-border:rgba(255,0,128,0.40);
  --accent-glow:rgba(255,0,128,0.15);--pad-bg:rgba(255,255,255,0.06);
  --rec:#FF3333;--rec-dim:rgba(255,51,51,0.18);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  color:var(--text);-webkit-user-select:none;user-select:none;touch-action:manipulation}
#app{display:flex;flex-direction:column;width:100%;height:100%;height:100dvh}

.topbar{display:flex;align-items:center;justify-content:space-between;height:44px;padding:0 10px;
  background:rgba(8,8,16,0.9);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);flex-shrink:0;z-index:10;position:relative}
.topbar a{color:var(--accent);text-decoration:none;font-size:12px;letter-spacing:2px;font-weight:500;opacity:0.7}
.topbar a:hover{opacity:1}
.topbar .title{font-size:11px;letter-spacing:5px;text-transform:uppercase;color:var(--text-dim);
  position:absolute;left:50%;transform:translateX(-50%);font-weight:700;pointer-events:none}
.topbar button{background:var(--surface);border:1px solid var(--border);border-radius:10px;
  color:var(--text);width:34px;height:34px;font-size:13px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-family:inherit}
.topbar button:active{background:var(--accent-dim);border-color:var(--accent-border)}

.ctrl-bar{display:flex;align-items:center;gap:4px;padding:3px 8px;
  background:rgba(0,0,0,0.3);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.ctrl-bar .lbl{font-size:8px;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase}
.ctrl-bar .val{font-size:11px;color:var(--accent);min-width:22px;text-align:center;
  font-variant-numeric:tabular-nums;letter-spacing:1px}
.ctrl-bar input[type=range]{flex:1;height:3px;-webkit-appearance:none;appearance:none;
  background:var(--border);border-radius:2px;outline:none}
.ctrl-bar input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;
  border-radius:50%;background:var(--accent);border:none;cursor:pointer}

.scale-bar{display:flex;align-items:center;gap:3px;padding:3px 8px;
  background:rgba(0,0,0,0.2);border-bottom:1px solid var(--border);flex-shrink:0}
.scale-btn{padding:3px 8px;border:1px solid var(--border);border-radius:6px;background:var(--surface);
  color:var(--accent);font-size:9px;letter-spacing:1.5px;cursor:pointer;font-family:inherit;
  text-transform:uppercase;transition:all 0.15s;-webkit-tap-highlight-color:transparent}
.scale-btn:active{background:var(--accent-dim);border-color:var(--accent)}
.scale-btn .lbl{font-size:6px;letter-spacing:2px;color:var(--text-muted);display:block;margin-bottom:0}
.oct-btn{padding:3px 6px;border:1px solid var(--border);border-radius:6px;background:var(--surface);
  color:var(--text-muted);font-size:10px;cursor:pointer;font-family:inherit;min-width:24px;text-align:center}
.oct-btn:active{color:var(--accent);border-color:var(--accent)}

.engine-bar{display:flex;gap:1px;padding:2px 4px;overflow-x:auto;flex-shrink:0;
  background:rgba(0,0,0,0.3);border-bottom:1px solid var(--border);
  scrollbar-width:none;-ms-overflow-style:none}
.engine-bar::-webkit-scrollbar{display:none}
.knob{display:flex;flex-direction:column;align-items:center;gap:0;min-width:40px;
  padding:1px 2px;flex:1;flex-shrink:0}
.knob .lbl{font-size:6px;letter-spacing:1.5px;color:var(--text-muted);text-transform:uppercase;line-height:1}
.knob input[type=range]{width:100%;min-width:28px;height:2px;-webkit-appearance:none;appearance:none;
  background:var(--border);border-radius:2px;outline:none;margin:2px 0 1px}
.knob input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:9px;height:9px;
  border-radius:50%;background:var(--accent);border:none;cursor:pointer}
.knob .val{font-size:6px;color:var(--accent);font-variant-numeric:tabular-nums;
  letter-spacing:0.5px;line-height:1;opacity:0.7}

/* ── Mode tabs ── */
.mode-tabs{display:flex;gap:2px;padding:3px 8px;background:rgba(0,0,0,0.25);
  border-bottom:1px solid var(--border);flex-shrink:0}
.mtab{flex:1;padding:5px 4px;border:1px solid var(--border);border-radius:6px;background:var(--surface);
  color:var(--text-muted);font-size:9px;letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;font-family:inherit;text-align:center;transition:all 0.15s}
.mtab.on{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}

/* ── PLAY view ── */
.play-view{flex:1;display:flex;flex-direction:column;min-height:0}
.play-view.hidden{display:none}
.pad-grid{flex:1;display:grid;grid-template-columns:repeat(8,1fr);gap:3px;padding:4px;
  min-height:0;align-content:center;max-width:600px;margin:0 auto;width:100%}
.pad{border-radius:8px;background:var(--pad-bg);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:0;
  cursor:pointer;transition:transform 0.06s,background 0.06s,border-color 0.15s,box-shadow 0.18s;
  -webkit-tap-highlight-color:transparent;position:relative;min-height:0;touch-action:none;
  min-height:36px}
.pad:active,.pad.flash{transform:scale(0.93);background:var(--accent-dim);border-color:var(--accent)}
.pad.sel{border-color:var(--accent);box-shadow:0 0 10px var(--accent-glow)}
.pad .nm{font-size:9px;letter-spacing:0.5px;color:var(--text-dim);text-transform:uppercase;
  text-align:center;line-height:1;pointer-events:none;font-weight:600}
.pad .sub{font-size:6px;color:var(--text-muted);pointer-events:none;letter-spacing:0.5px}
.pad .idx{position:absolute;top:2px;left:4px;font-size:6px;color:var(--text-muted);pointer-events:none}

.step-wrap{display:flex;gap:2px;padding:3px 6px;overflow-x:auto;flex-shrink:0;
  background:rgba(0,0,0,0.25);border-top:1px solid var(--border);
  scrollbar-width:none;-ms-overflow-style:none}
.step-wrap::-webkit-scrollbar{display:none}
.step{flex:0 0 auto;width:18px;height:22px;border-radius:3px;border:1px solid var(--border);
  background:var(--surface);cursor:pointer;transition:background 0.08s;position:relative}
.step.on::after{content:'';position:absolute;inset:3px;border-radius:2px;background:var(--accent);opacity:0.8}
.step.on{background:var(--accent-dim);border-color:rgba(255,0,128,0.2)}
.step.cur{box-shadow:inset 0 0 0 2px var(--accent)}
.step.beat{border-top:2px solid rgba(255,255,255,0.06)}
.step.multi::after{opacity:1;box-shadow:0 0 4px var(--accent)}

/* ── GRID view (master loop matrix) ── */
.grid-view{flex:1;overflow:auto;min-height:0;-webkit-overflow-scrolling:touch;display:none;
  background:rgba(0,0,0,0.3)}
.grid-view.active{display:flex;flex-direction:column}
.matrix{display:flex;flex-direction:column;padding:2px 0}
.m-row{display:flex;height:28px;flex-shrink:0}
.m-row:nth-child(even){background:rgba(255,255,255,0.015)}
.m-row.sel-row{background:rgba(255,0,128,0.06)}
.m-row.sel-row .m-label{color:var(--accent);font-weight:700}
.m-label{width:42px;flex-shrink:0;position:sticky;left:0;z-index:2;background:var(--bg);
  display:flex;align-items:center;justify-content:flex-end;padding-right:4px;
  font-size:8px;color:rgba(255,255,255,0.5);letter-spacing:0.5px;border-right:1px solid rgba(255,255,255,0.12);
  cursor:pointer}
.m-label:active{color:var(--accent)}
.m-cell{width:28px;height:28px;flex-shrink:0;border:1px solid rgba(255,255,255,0.10);
  background:rgba(255,255,255,0.04);cursor:pointer;box-sizing:border-box;
  touch-action:none;transition:background 0.06s}
.m-cell:hover{background:rgba(255,255,255,0.08)}
.m-cell.on{background:rgba(255,0,128,0.35);border-color:rgba(255,0,128,0.5);
  box-shadow:inset 0 0 6px rgba(255,0,128,0.3)}
.m-cell.cur-col{box-shadow:inset 0 0 0 2px var(--accent);background:rgba(255,0,128,0.08)}
.m-cell.on.cur-col{box-shadow:inset 0 0 0 2px #fff;background:rgba(255,0,128,0.5)}
.m-cell.beat-col{border-left:2px solid rgba(255,255,255,0.15)}
.m-cell:active{background:rgba(255,0,128,0.25)}

/* ── LAYERS view ── */
.layers-view{flex:1;overflow-y:auto;min-height:0;display:none;background:rgba(0,0,0,0.3);padding:6px;
  -webkit-overflow-scrolling:touch}
.layers-view.active{display:flex;flex-direction:column;gap:3px}
.layer-strip{display:flex;align-items:center;gap:4px;padding:4px 6px;border:1px solid var(--border);
  border-radius:6px;background:var(--surface);min-height:28px;flex-shrink:0;transition:all 0.15s}
.layer-strip.muted{opacity:0.3}
.layer-strip .l-num{font-size:8px;color:var(--text-muted);letter-spacing:1px;min-width:16px;flex-shrink:0}
.layer-strip .l-bar{flex:1;height:14px;display:flex;gap:0;overflow:hidden;border-radius:3px;
  background:rgba(0,0,0,0.3)}
.layer-strip .l-cell{flex:1;height:100%;background:transparent}
.layer-strip .l-cell.on{border-radius:1px}
.layer-strip .l-mute{font-size:7px;letter-spacing:1px;color:var(--text-muted);padding:2px 6px;
  border:1px solid var(--border);border-radius:4px;background:var(--surface);cursor:pointer;
  flex-shrink:0;text-transform:uppercase}
.layer-strip .l-mute:active{border-color:var(--accent)}
.layer-empty{text-align:center;padding:20px;font-size:9px;letter-spacing:2px;color:var(--text-muted);
  text-transform:uppercase}
.transport .stutter-on{border-color:#00DDFF;color:#00DDFF;background:rgba(0,221,255,0.15);
  animation:rec-pulse 0.4s ease infinite}
.transport .live-on{border-color:#FF3333;color:#FF3333;background:rgba(255,51,51,0.18);
  animation:rec-pulse 1s ease infinite}

/* ── Pattern bar + transport ── */
.pattern-bar{display:flex;align-items:center;justify-content:center;gap:2px;
  padding:3px 6px;background:rgba(0,0,0,0.3);border-top:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.seg{display:flex;gap:2px}
.seg .sep{width:1px;background:var(--border);margin:0 2px}
.pbtn{padding:3px 7px;border:1px solid var(--border);border-radius:6px;background:var(--surface);
  color:var(--text-muted);font-size:8px;letter-spacing:1px;cursor:pointer;
  font-family:inherit;text-transform:uppercase;transition:all 0.15s}
.pbtn.on{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.pbtn.has-data{color:var(--text-dim)}

.transport{display:flex;gap:4px;padding:5px 8px;border-top:1px solid var(--border);
  background:rgba(0,0,0,0.35);flex-shrink:0}
.transport button{flex:1;padding:9px 2px;border:1px solid var(--border);border-radius:10px;
  background:var(--surface);color:var(--text-dim);font-size:9px;letter-spacing:1px;
  text-transform:uppercase;cursor:pointer;font-family:inherit;transition:all 0.15s}
.transport button:active{background:var(--accent-dim);border-color:var(--accent-border)}
.transport .playing{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.transport .rec-armed{border-color:var(--rec);color:var(--rec);background:var(--rec-dim);
  animation:rec-pulse 1s ease infinite}
@keyframes rec-pulse{0%,100%{opacity:1}50%{opacity:0.6}}

.lib-ov{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:none;z-index:100;
  align-items:center;justify-content:center;padding:16px}
.lib-ov.open{display:flex}
.lib-modal{width:100%;max-width:400px;max-height:80vh;background:var(--bg);
  border:1px solid var(--border);border-radius:16px;overflow:hidden;display:flex;flex-direction:column}
.lib-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;
  border-bottom:1px solid var(--border)}
.lib-hdr span{font-size:10px;letter-spacing:3px;color:var(--text-dim);text-transform:uppercase}
.lib-hdr button{background:none;border:none;color:var(--text-dim);font-size:18px;cursor:pointer;
  width:32px;height:32px;display:flex;align-items:center;justify-content:center}
.lib-cats{display:flex;gap:3px;padding:6px;overflow-x:auto;flex-shrink:0;
  scrollbar-width:none;-ms-overflow-style:none}
.lib-cats::-webkit-scrollbar{display:none}
.lib-cat{padding:4px 8px;border:1px solid var(--border);border-radius:6px;background:var(--surface);
  color:var(--text-muted);font-size:8px;letter-spacing:1px;cursor:pointer;white-space:nowrap;
  font-family:inherit;text-transform:uppercase}
.lib-cat.on{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.lib-list{flex:1;overflow-y:auto;padding:4px 6px;-webkit-overflow-scrolling:touch}
.lib-item{padding:8px 10px;border:1px solid var(--border);border-radius:8px;margin-bottom:3px;
  cursor:pointer;font-size:10px;letter-spacing:2px;color:var(--text-dim);
  display:flex;align-items:center;gap:8px;transition:all 0.12s;text-transform:uppercase}
.lib-item:active,.lib-item.loaded{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.lib-item .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);opacity:0;flex-shrink:0}
.lib-item.loaded .dot{opacity:1}

.toast{position:fixed;top:56px;left:50%;transform:translateX(-50%);padding:6px 16px;
  border-radius:8px;background:var(--accent);color:#fff;font-size:10px;letter-spacing:2px;
  opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:200;text-transform:uppercase}
.toast.show{opacity:1}

@media(max-width:380px){.pad .nm{font-size:8px}.pad-grid{grid-template-columns:repeat(4,1fr)}
  .transport button{font-size:8px;padding:8px 1px}.step{width:14px;height:18px}.knob{min-width:34px}
  .m-cell{width:24px;height:24px}.m-row{height:24px}.m-label{width:36px;font-size:7px}}
@media(min-width:600px){.pad-grid{max-width:520px}}
@media(min-height:750px){.pad-grid{gap:5px;padding:6px}}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <a href="/apps">&#8592; apps</a>
    <span class="title">SYNTH</span>
    <button id="shareBtn" aria-label="share">&#8599;</button>
  </div>
  <div class="ctrl-bar">
    <span class="lbl">BPM</span><span class="val" id="bpmV">120</span>
    <input type="range" id="bpmR" min="60" max="200" value="120">
    <span class="lbl">SWG</span><span class="val" id="swgV">0%</span>
    <input type="range" id="swgR" min="0" max="80" value="0" style="max-width:50px">
  </div>
  <div class="scale-bar">
    <div class="scale-btn" id="rootBtn"><span class="lbl">ROOT</span><span id="rootV">C</span></div>
    <div class="scale-btn" id="scaleBtn"><span class="lbl">SCALE</span><span id="scaleV">MINOR</span></div>
    <div style="flex:1"></div>
    <div class="oct-btn" id="octDn">&#8722;</div>
    <span class="val" id="octV" style="font-size:9px;min-width:30px;color:var(--accent)">OCT 3</span>
    <div class="oct-btn" id="octUp">+</div>
  </div>
  <div class="engine-bar">
    <div class="knob"><span class="lbl">CUT</span><input type="range" id="cutR" min="0" max="100" value="100"><span class="val" id="cutV">20k</span></div>
    <div class="knob"><span class="lbl">RES</span><input type="range" id="resR" min="0" max="100" value="0"><span class="val" id="resV">0</span></div>
    <div class="knob"><span class="lbl">ATK</span><input type="range" id="atkR" min="0" max="100" value="27"><span class="val" id="atkV">8ms</span></div>
    <div class="knob"><span class="lbl">DEC</span><input type="range" id="decR" min="0" max="100" value="38"><span class="val" id="decV">100ms</span></div>
    <div class="knob"><span class="lbl">SUS</span><input type="range" id="susR" min="0" max="100" value="100"><span class="val" id="susV">100%</span></div>
    <div class="knob"><span class="lbl">REL</span><input type="range" id="relR" min="0" max="100" value="46"><span class="val" id="relV">180ms</span></div>
    <div class="knob"><span class="lbl">VRB</span><input type="range" id="vrbR" min="0" max="100" value="36"><span class="val" id="vrbV">36</span></div>
    <div class="knob"><span class="lbl">DLY</span><input type="range" id="dlyR" min="0" max="100" value="0"><span class="val" id="dlyV">0</span></div>
  </div>
  <div class="mode-tabs">
    <button class="mtab on" id="playTab">&#9654; PLAY</button>
    <button class="mtab" id="gridTab">&#9638; GRID</button>
    <button class="mtab" id="layersTab">&#9776; LYRS</button>
  </div>
  <!-- PLAY view: touch pads + step row -->
  <div class="play-view" id="playView">
    <div class="pad-grid" id="pGrid"></div>
    <div class="step-wrap" id="stepW"></div>
  </div>
  <!-- GRID view: 32×32 master loop matrix -->
  <div class="grid-view" id="gridView">
    <div class="matrix" id="matrix"></div>
  </div>
  <!-- LAYERS view: looper layer stack -->
  <div class="layers-view" id="layersView"></div>
  <div class="pattern-bar">
    <div class="seg" id="lenG"></div>
    <div class="seg"><div class="sep"></div></div>
    <div class="seg" id="dirG"></div>
    <div class="seg"><div class="sep"></div></div>
    <div class="seg" id="bankG"></div>
  </div>
  <div class="transport">
    <button id="playB">&#9654; play</button>
    <button id="recB">&#9679; rec</button>
    <button id="clrB">&#10005; clr</button>
    <button id="sttB">&#8644; stt</button>
    <button id="soundB">&#9834; snd</button>
    <button id="wavB">&#11015; wav</button>
    <button id="liveB">&#9679; live</button>
  </div>
  <div class="lib-ov" id="libOv">
    <div class="lib-modal">
      <div class="lib-hdr"><span id="libTitle">SOUND LIBRARY</span><button id="libLoad" style="font-size:9px;background:var(--surface);border:1px solid var(--border);color:var(--text-dim);border-radius:6px;padding:4px 8px;cursor:pointer;letter-spacing:1px;font-family:inherit;width:auto;height:auto">&#128193; LOAD</button><button id="libX">&#10005;</button></div>
      <input type="file" id="sampleInput" accept=".wav,.mp3,audio/*" style="display:none">
      <div class="lib-cats" id="libCats"></div>
      <div class="lib-list" id="libList"></div>
    </div>
  </div>
  <div class="toast" id="toast">link copied</div>
</div>

<script>
(function(){
'use strict';
var AudioCtx=window.AudioContext||window.webkitAudioContext;
if(!AudioCtx)return;
var ctx=new AudioCtx();

/* ═══ SCALES ═══ */
var SCALES={
  'MAJOR':[0,2,4,5,7,9,11],'MINOR':[0,2,3,5,7,8,10],
  'PENTA MIN':[0,3,5,7,10],'PENTA MAJ':[0,2,4,7,9],
  'DORIAN':[0,2,3,5,7,9,10],'BLUES':[0,3,5,6,7,10],
  'HARMONIC':[0,2,3,5,7,8,11],'PHRYGIAN':[0,1,3,5,7,8,10],
  'MIXO':[0,2,4,5,7,9,10],'JAPANESE':[0,1,5,7,8],
  'ARABIC':[0,1,4,5,7,8,11]
};
var SCALE_NAMES=Object.keys(SCALES);
var NOTE_NAMES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

/* ═══ STATE ═══ */
var NUM=32,selPad=0,bpm=120,swing=0,stepLen=32,direction='fwd',
    playing=false,recording=false,curStep=0,audibleStep=0,pingFwd=true,
    schedTimer=null,nextTime=0,libCat=0,curBank=0,
    rootNote=0,scaleIdx=1,baseOctave=3,viewMode='play';
var layers=[],curLayerNotes=null;
var stutterActive=false,stutterRate=2,stutterTimer=null,lastPlayedPad=0;
var liveRecording=false,liveRecorder=null,liveChunks=[],liveDest=null;
var userSounds=[];
var LAYER_COLORS=['#FF0080','#00DDFF','#39FF14','#FFD700','#FF6B35','#A855F7','#06B6D4','#F43F5E'];
function layerColor(idx){return LAYER_COLORS[idx%LAYER_COLORS.length];}
var pattern=[];
for(var p=0;p<NUM;p++)pattern.push(new Uint8Array(32));
var padNotes=new Array(NUM);
var globalSoundKey=null,globalSoundBuffer=null,globalSoundName='---';

var engCut=100,engRes=0,engAtk=27,engDec=38,engSus=100,engRel=46,engVrb=36,engDly=0;
var adsrA=0.008,adsrD=0.1,adsrS=1.0,adsrR=0.18;

function getScaleName(){return SCALE_NAMES[scaleIdx];}
function getScaleIntervals(){return SCALES[getScaleName()];}
function computePadNotes(){
  var intervals=getScaleIntervals();
  var base=rootNote+baseOctave*12;
  for(var i=0;i<NUM;i++){
    var deg=i%intervals.length;
    var oct=Math.floor(i/intervals.length);
    padNotes[i]=base+intervals[deg]+oct*12;
  }
}
function midiToName(midi){
  var note=midi%12,oct=Math.floor(midi/12)-1;
  return NOTE_NAMES[note]+oct;
}

/* ═══ ENGINE MAPPING ═══ */
function mapCut(v){return 200*Math.pow(100,v/100);}
function mapRes(v){return v*0.2;}
function mapAtk(v){return 0.001*Math.pow(2000,v/100);}
function mapDec(v){return 0.01*Math.pow(300,v/100);}
function mapSus(v){return v/100;}
function mapRel(v){return 0.01*Math.pow(500,v/100);}
function mapVrb(v){return v/100*0.5;}
function mapDly(v){return v/100*0.5;}
function fmtMs(s){return s<1?Math.round(s*1000)+'ms':s.toFixed(1)+'s';}
function fmtHz(hz){return hz>=1000?(hz/1000).toFixed(1)+'k':Math.round(hz)+'';}

/* ═══ AUDIO GRAPH ═══ */
var master=ctx.createGain();master.gain.value=0.8;
var lpFilter=ctx.createBiquadFilter();
lpFilter.type='lowpass';lpFilter.frequency.value=20000;lpFilter.Q.value=0;
var comp=ctx.createDynamicsCompressor();
comp.threshold.value=-8;comp.ratio.value=4;comp.attack.value=0.003;comp.release.value=0.12;
var limiter=ctx.createDynamicsCompressor();
limiter.threshold.value=-1;limiter.ratio.value=20;limiter.attack.value=0.001;limiter.release.value=0.05;
var reverbNode=ctx.createConvolver(),reverbGain=ctx.createGain();
reverbGain.gain.value=0.18;
function makeReverbIR(len,decay){
  var sr=ctx.sampleRate,n=Math.floor(sr*len),buf=ctx.createBuffer(2,n,sr);
  for(var c=0;c<2;c++){var d=buf.getChannelData(c);for(var i=0;i<n;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(sr*decay));}
  return buf;
}
reverbNode.buffer=makeReverbIR(2.0,0.4);
reverbNode.connect(reverbGain);reverbGain.connect(master);
var delayNode=ctx.createDelay(2.0);delayNode.delayTime.value=0.375;
var delayFB=ctx.createGain();delayFB.gain.value=0.35;
var delayWet=ctx.createGain();delayWet.gain.value=0;
delayNode.connect(delayFB);delayFB.connect(delayNode);delayNode.connect(delayWet);
master.connect(lpFilter);master.connect(delayNode);delayWet.connect(lpFilter);
lpFilter.connect(comp);comp.connect(limiter);limiter.connect(ctx.destination);

function syncDelay(){delayNode.delayTime.value=Math.min(60/bpm*0.75,2.0);}
function applyEngine(){
  lpFilter.frequency.setTargetAtTime(mapCut(engCut),ctx.currentTime,0.02);
  lpFilter.Q.setTargetAtTime(mapRes(engRes),ctx.currentTime,0.02);
  adsrA=mapAtk(engAtk);adsrD=mapDec(engDec);adsrS=mapSus(engSus);adsrR=mapRel(engRel);
  reverbGain.gain.setTargetAtTime(mapVrb(engVrb),ctx.currentTime,0.02);
  delayWet.gain.setTargetAtTime(mapDly(engDly),ctx.currentTime,0.02);
}

/* ═══ DSP ═══ */
function makeBuffer(fn,dur){
  var sr=ctx.sampleRate,n=Math.floor(sr*dur),buf=ctx.createBuffer(1,n,sr);
  fn(buf.getChannelData(0),sr,n);return buf;
}
function lpf(d,fc,sr){var dt=1/sr,rc=1/(6.2832*fc),a=dt/(rc+dt),y=0;for(var i=0;i<d.length;i++){y+=a*(d[i]-y);d[i]=y;}}
function hpf(d,fc,sr){var dt=1/sr,rc=1/(6.2832*fc),a=rc/(rc+dt),y=0,px=0;for(var i=0;i<d.length;i++){y=a*(y+d[i]-px);px=d[i];d[i]=y;}}

/* ═══ MELODIC SYNTHESIS ═══ */
function synthSubBass(d,sr){for(var i=0;i<d.length;i++){var t=i/sr;d[i]=Math.sin(261.63*6.2832*t)*Math.exp(-t*2)*0.7+Math.sin(261.63*2*6.2832*t)*Math.exp(-t*4)*0.15;}}
function synthBassGrowl(d,sr){var ph=0;for(var i=0;i<d.length;i++){var t=i/sr;ph+=261.63*6.2832/sr;var saw=(ph%(6.2832))/3.1416-1;d[i]=saw*Math.exp(-t*2.5)*0.5;}}
function synthBassPluck(d,sr){for(var i=0;i<d.length;i++){var t=i/sr;var env=Math.exp(-t*12);d[i]=(Math.sin(261.63*6.2832*t)+Math.sin(261.63*3*6.2832*t)*0.3)*env*0.5;}}
function synthBassAcid(d,sr){var ph=0,filt=0;for(var i=0;i<d.length;i++){var t=i/sr;ph+=261.63*6.2832/sr;var saw=(ph%(6.2832))/3.1416-1;var fc=600+3000*Math.exp(-t*8);var rc=1/(6.2832*fc),a=(1/sr)/(rc+1/sr);filt+=a*(saw-filt);d[i]=filt*Math.exp(-t*3)*0.7;}}
function synthPiano(d,sr){for(var i=0;i<d.length;i++){var t=i/sr;d[i]=(Math.sin(261.63*6.2832*t)*0.5+Math.sin(261.63*2*6.2832*t)*0.25+Math.sin(261.63*3*6.2832*t)*0.12+Math.sin(261.63*4*6.2832*t)*0.06)*Math.exp(-t*3)*0.6;}}
function synthEPiano(d,sr){for(var i=0;i<d.length;i++){var t=i/sr;var mod=Math.sin(261.63*3.5*6.2832*t)*200*Math.exp(-t*5);d[i]=Math.sin(261.63*6.2832*t+mod/sr)*Math.exp(-t*2.5)*0.5;}}
function synthOrgan(d,sr){for(var i=0;i<d.length;i++){var t=i/sr;var env=Math.min(t/0.01,1)*Math.exp(-t*1.5);d[i]=(Math.sin(261.63*6.2832*t)+Math.sin(261.63*2*6.2832*t)*0.5+Math.sin(261.63*3*6.2832*t)*0.25+Math.sin(261.63*4*6.2832*t)*0.12)*env*0.3;}}
function synthBell(d,sr){for(var i=0;i<d.length;i++){var t=i/sr;d[i]=(Math.sin(261.63*6.2832*t)*Math.exp(-t*2)+Math.sin(261.63*2.76*6.2832*t)*Math.exp(-t*4)*0.4+Math.sin(261.63*5.04*6.2832*t)*Math.exp(-t*6)*0.2)*0.5;}}
function synthLeadSaw(d,sr){var ph=0;for(var i=0;i<d.length;i++){var t=i/sr;ph+=261.63*6.2832/sr;var saw=(ph%(6.2832))/3.1416-1;d[i]=saw*Math.min(t/0.005,1)*Math.exp(-t*2)*0.45;}}
function synthLeadSquare(d,sr){var ph=0;for(var i=0;i<d.length;i++){var t=i/sr;ph+=261.63*6.2832/sr;d[i]=(Math.sin(ph)>0?0.4:-0.4)*Math.min(t/0.005,1)*Math.exp(-t*2);}}
function synthLeadSine(d,sr){for(var i=0;i<d.length;i++){var t=i/sr;d[i]=Math.sin(261.63*6.2832*t)*Math.min(t/0.005,1)*Math.exp(-t*2)*0.5;}}
function synthPadWarm(d,sr){var ph1=0,ph2=0;for(var i=0;i<d.length;i++){var t=i/sr;ph1+=261.63*6.2832/sr;ph2+=262.63*6.2832/sr;var env=Math.min(t/0.1,1)*Math.exp(-t*0.8);d[i]=((ph1%(6.2832))/3.1416-1+(ph2%(6.2832))/3.1416-1)*env*0.2;}}
function synthPadShimmer(d,sr){for(var i=0;i<d.length;i++){var t=i/sr;var env=Math.min(t/0.15,1)*Math.exp(-t*0.6);var lfo=1+Math.sin(5*6.2832*t)*0.003;d[i]=(Math.sin(261.63*lfo*6.2832*t)+Math.sin(261.63*2.01*lfo*6.2832*t)*0.5)*env*0.3;}}
function synthPadChoir(d,sr){for(var i=0;i<d.length;i++){var t=i/sr;var env=Math.min(t/0.2,1)*Math.exp(-t*0.7);var f1=Math.sin(261.63*6.2832*t),f2=Math.sin(261.63*1.002*6.2832*t),f3=Math.sin(261.63*0.998*6.2832*t);d[i]=(f1+f2+f3)*env*0.2;}}
function synthPluckString(d,sr,n){for(var i=0;i<n;i++){d[i]=(Math.random()*2-1);}var dl=Math.round(sr/261.63);for(var i=dl;i<n;i++){d[i]=(d[i-dl]+d[i-dl+1])*0.498;}for(var i=0;i<n;i++)d[i]*=Math.min(i/100,1)*0.7;}
function synthPluckHarp(d,sr){for(var i=0;i<d.length;i++){var t=i/sr;d[i]=(Math.sin(261.63*6.2832*t)+Math.sin(261.63*2*6.2832*t)*0.4+Math.sin(261.63*3*6.2832*t)*0.15)*Math.exp(-t*5)*0.6;}}
function synthPluckMallet(d,sr){for(var i=0;i<d.length;i++){var t=i/sr;d[i]=(Math.sin(261.63*6.2832*t)+Math.sin(261.63*4*6.2832*t)*0.3)*Math.exp(-t*8)*0.55;}}
function synthNoiseSweep(d,sr){for(var i=0;i<d.length;i++){var t=i/sr;d[i]=(Math.random()*2-1)*Math.exp(-t*3)*0.5;}lpf(d,1000+4000*0.5,sr);}
function synthRiser(d,sr){var ph=0;for(var i=0;i<d.length;i++){var t=i/sr;ph+=(261.63+t*500)*6.2832/sr;d[i]=(Math.sin(ph)>0?0.3:-0.3)*Math.min(t/0.05,1)*Math.min((d.length/sr-t)/0.05,1);}}
function synthHit(d,sr){for(var i=0;i<d.length;i++){var t=i/sr;d[i]=(Math.sin(261.63*6.2832*t)+Math.sin(261.63*1.5*6.2832*t)*0.5+(Math.random()*2-1)*0.3)*Math.exp(-t*6)*0.5;}lpf(d,3000,sr);}

function initLibrary(){
  for(var c=0;c<LIB.length;c++)for(var s=0;s<LIB[c].sounds.length;s++){
    var snd=LIB[c].sounds[s],key=LIB[c].cat+':'+snd.name;

  }

function setGlobalSound(key,name,buffer){globalSoundKey=key;globalSoundName=name;globalSoundBuffer=buffer;}

/* ═══ SUSTAIN + ADSR + RECORDING ═══ */
var activeVoices={};
function noteOn(padIdx,pointerId){
  if(!globalSoundBuffer)return;
  noteOff(pointerId);
  var midi=padNotes[padIdx],semi=midi-60;
  var src=ctx.createBufferSource();src.buffer=globalSoundBuffer;
  src.playbackRate.value=Math.pow(2,semi/12);
  src.loop=true;
  var dur=globalSoundBuffer.duration;
  src.loopStart=Math.min(0.08,dur*0.1);src.loopEnd=Math.max(dur-0.01,dur*0.9);
  var g=ctx.createGain();
  var now=ctx.currentTime,peak=0.7;
  g.gain.setValueAtTime(0,now);
  g.gain.linearRampToValueAtTime(peak,now+adsrA);
  g.gain.linearRampToValueAtTime(peak*adsrS,now+adsrA+adsrD);
  src.connect(g);g.connect(master);g.connect(reverbNode);
  src.start();
  activeVoices[pointerId]={src:src,gain:g,pad:padIdx};
  lastPlayedPad=padIdx;
  // ── RECORD: write pad to current audible step ──
  if(recording&&playing){
    pattern[padIdx][audibleStep]=1;
    refreshCellAt(padIdx,audibleStep);
    if(curLayerNotes)curLayerNotes.push({p:padIdx,s:audibleStep});
  }
}
function noteOff(pointerId){
  var v=activeVoices[pointerId];if(!v)return;
  var now=ctx.currentTime;
  v.gain.gain.cancelScheduledValues(now);
  v.gain.gain.setValueAtTime(v.gain.gain.value,now);
  v.gain.gain.linearRampToValueAtTime(0,now+adsrR);
  var s=v.src;setTimeout(function(){try{s.stop();}catch(e){}},Math.max(250,(adsrR+0.05)*1000));
  delete activeVoices[pointerId];
}
function setGlow(el,p){
  p=Math.max(0.2,Math.min(1,p));
  el.style.boxShadow='0 0 '+(p*28)+'px rgba(255,0,128,'+(p*0.7)+')';
  el.style.background='radial-gradient(circle,rgba(255,0,128,'+(p*0.35)+') 0%,var(--surface) 70%)';
}
function clearGlow(el){el.style.boxShadow='';el.style.background='';}
function triggerNote(padIdx,time){
  if(!globalSoundBuffer)return;
  var midi=padNotes[padIdx],semi=midi-60;
  var src=ctx.createBufferSource();src.buffer=globalSoundBuffer;
  src.playbackRate.value=Math.pow(2,semi/12);
  var g=ctx.createGain();
  var t=time||ctx.currentTime,peak=0.7;
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(peak,t+adsrA);
  g.gain.linearRampToValueAtTime(peak*adsrS,t+adsrA+adsrD);
  src.connect(g);g.connect(master);g.connect(reverbNode);
  src.start(t);
}

/* ═══ SEQUENCER ═══ */
function stepDur(stepNum){
  var base=60/bpm/4;if(swing===0)return base;
  return base*(stepNum%2===1?1+swing/100*0.6:1-swing/100*0.6);
}
function advanceStep(){
  switch(direction){
    case'fwd':curStep=(curStep+1)%stepLen;break;
    case'rev':curStep=(curStep-1+stepLen)%stepLen;break;
    case'ping':if(stepLen<=1){curStep=0;break;}
      if(pingFwd){curStep++;if(curStep>=stepLen-1){curStep=stepLen-1;pingFwd=false;}}
      else{curStep--;if(curStep<=0){curStep=0;pingFwd=true;}}break;
    case'rnd':curStep=Math.floor(Math.random()*stepLen);break;
  }
}
function scheduler(){
  while(nextTime<ctx.currentTime+0.1){
    for(var p=0;p<NUM;p++){
      if(pattern[p][curStep]) triggerNote(p,nextTime);
    }
    var step=curStep;
    setTimeout((function(s){return function(){
      audibleStep=s;
      highlightStep(s);flashPadsAtStep(s);
      if(viewMode==='grid')highlightMatrixCol(s);
    };})(step),Math.max(0,(nextTime-ctx.currentTime)*1000));
    nextTime+=stepDur(curStep);advanceStep();
  }
}
function startSeq(){
  if(ctx.state==='suspended')ctx.resume();
  playing=true;curStep=direction==='rev'?stepLen-1:0;pingFwd=true;
  nextTime=ctx.currentTime+0.05;schedTimer=setInterval(scheduler,25);renderTransport();
}
function stopSeq(){
  playing=false;
  if(recording&&curLayerNotes&&curLayerNotes.length>0){
    layers.push({notes:curLayerNotes.slice(),muted:false,color:layerColor(layers.length)});
    if(viewMode==='layers')renderLayers();
  }
  recording=false;curLayerNotes=null;
  if(schedTimer){clearInterval(schedTimer);schedTimer=null;}
  curStep=0;audibleStep=0;highlightStep(-1);
  if(viewMode==='grid')highlightMatrixCol(-1);
  renderTransport();
}

/* ═══ STUTTER ═══ */
function startStutter(){
  if(!globalSoundBuffer)return;
  stutterActive=true;
  var ms=60000/bpm/Math.pow(2,stutterRate+1);
  if(stutterTimer)clearInterval(stutterTimer);
  stutterTimer=setInterval(function(){
    triggerNote(lastPlayedPad);
    if(padEls[lastPlayedPad]){setGlow(padEls[lastPlayedPad],0.9);
      setTimeout(function(){if(padEls[lastPlayedPad])clearGlow(padEls[lastPlayedPad]);},ms*0.6);}
  },ms);
  renderTransport();
}
function stopStutter(){
  stutterActive=false;
  if(stutterTimer){clearInterval(stutterTimer);stutterTimer=null;}
  renderTransport();
}
function cycleStutterRate(){
  stutterRate=(stutterRate+1)%3;
  var labels=['1/8','1/16','1/32'];
  showToast('stutter '+labels[stutterRate]);
  if(stutterActive){stopStutter();startStutter();}
}

/* ═══ WAV EXPORT ═══ */
function exportWAV(){
  if(!globalSoundBuffer){showToast('no sound');return;}
  var dur=0;for(var s=0;s<stepLen;s++)dur+=stepDur(s);
  dur+=Math.max(2.0,adsrR+1.5);
  var sr=ctx.sampleRate,len=Math.ceil(sr*dur);
  var offline=new OfflineAudioContext(2,len,sr);
  var oMaster=offline.createGain();oMaster.gain.value=0.8;
  var oFilter=offline.createBiquadFilter();
  oFilter.type='lowpass';oFilter.frequency.value=mapCut(engCut);oFilter.Q.value=mapRes(engRes);
  var oComp=offline.createDynamicsCompressor();
  oComp.threshold.value=-8;oComp.ratio.value=4;oComp.attack.value=0.003;oComp.release.value=0.12;
  var oLim=offline.createDynamicsCompressor();
  oLim.threshold.value=-1;oLim.ratio.value=20;oLim.attack.value=0.001;oLim.release.value=0.05;
  var oRev=offline.createConvolver(),oRevG=offline.createGain();
  oRevG.gain.value=mapVrb(engVrb);
  var rIR=offline.createBuffer(2,Math.floor(sr*2),sr);
  for(var c=0;c<2;c++){var rd=rIR.getChannelData(c);for(var i=0;i<rd.length;i++)rd[i]=(Math.random()*2-1)*Math.exp(-i/(sr*0.4));}
  oRev.buffer=rIR;oRev.connect(oRevG);oRevG.connect(oMaster);
  var oDly=offline.createDelay(2.0);
  oDly.delayTime.value=Math.min(60/bpm*0.75,2.0);
  var oDlyFB=offline.createGain();oDlyFB.gain.value=0.35;
  var oDlyWet=offline.createGain();oDlyWet.gain.value=mapDly(engDly);
  oDly.connect(oDlyFB);oDlyFB.connect(oDly);oDly.connect(oDlyWet);
  oMaster.connect(oFilter);oMaster.connect(oDly);oDlyWet.connect(oFilter);
  oFilter.connect(oComp);oComp.connect(oLim);oLim.connect(offline.destination);
  var time=0,localStep=direction==='rev'?stepLen-1:0,localPing=true;
  for(var s=0;s<stepLen;s++){
    for(var p=0;p<NUM;p++){
      if(pattern[p][localStep]){
        var midi=padNotes[p],semi=midi-60;
        var src=offline.createBufferSource();src.buffer=globalSoundBuffer;
        src.playbackRate.value=Math.pow(2,semi/12);
        var g=offline.createGain();var peak=0.7;
        g.gain.setValueAtTime(0,time);
        g.gain.linearRampToValueAtTime(peak,time+adsrA);
        g.gain.linearRampToValueAtTime(peak*adsrS,time+adsrA+adsrD);
        src.connect(g);g.connect(oMaster);g.connect(oRev);src.start(time);
      }
    }
    time+=stepDur(localStep);
    switch(direction){
      case'fwd':localStep=(localStep+1)%stepLen;break;
      case'rev':localStep=(localStep-1+stepLen)%stepLen;break;
      case'ping':if(stepLen<=1){localStep=0;break;}
        if(localPing){localStep++;if(localStep>=stepLen-1){localStep=stepLen-1;localPing=false;}}
        else{localStep--;if(localStep<=0){localStep=0;localPing=true;}}break;
      case'rnd':localStep=Math.floor(Math.random()*stepLen);break;
    }
  }
  offline.startRendering().then(function(buffer){
    var blob=new Blob([encodeWAV(buffer)],{type:'audio/wav'});
    var a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download='synth-loop.wav';a.click();URL.revokeObjectURL(a.href);
    showToast('wav exported');
  });
}
function encodeWAV(buf){
  var nc=buf.numberOfChannels,sr=buf.sampleRate,ns=buf.length,
      bps=16,ba=nc*(bps/8),br=sr*ba,ds=ns*nc*(bps/8),sz=44+ds;
  var ab=new ArrayBuffer(sz),dv=new DataView(ab);
  function ws(o,s){for(var i=0;i<s.length;i++)dv.setUint8(o+i,s.charCodeAt(i));}
  ws(0,'RIFF');dv.setUint32(4,sz-8,true);ws(8,'WAVE');ws(12,'fmt ');
  dv.setUint32(16,16,true);dv.setUint16(20,1,true);dv.setUint16(22,nc,true);
  dv.setUint32(24,sr,true);dv.setUint32(28,br,true);dv.setUint16(32,ba,true);
  dv.setUint16(34,bps,true);ws(36,'data');dv.setUint32(40,ds,true);
  var ch=[];for(var c=0;c<nc;c++)ch.push(buf.getChannelData(c));
  var off=44;
  for(var i=0;i<ns;i++)for(var c=0;c<nc;c++){
    var s=Math.max(-1,Math.min(1,ch[c][i]));
    dv.setInt16(off,s<0?s*0x8000:s*0x7FFF,true);off+=2;
  }
  return ab;
}

/* ═══ SAMPLE IMPORT ═══ */
function handleSampleLoad(file){
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(){
    ctx.decodeAudioData(reader.result,function(buffer){
      var name=file.name.replace(/\.[^.]+$/,'').substring(0,12).toUpperCase();
      var key='USER:'+name;
      var snd={name:name,buffer:buffer,key:key,dur:buffer.duration};
      userSounds.push(snd);
      libBuffers[key]=buffer;
      var userCat=null;
      for(var c=0;c<LIB.length;c++){if(LIB[c].cat==='USER'){userCat=LIB[c];break;}}
      if(!userCat){userCat={cat:'USER',sounds:[]};LIB.push(userCat);}
      userCat.sounds.push(snd);
      setGlobalSound(key,name,buffer);
      libCat=LIB.length-1;
      if(libOvEl.classList.contains('open')){renderLibCats();renderLibList();}
      libTitleEl.textContent='SOUND: '+name;
      renderPads();
      showToast(name+' loaded');
    },function(){showToast('decode error');});
  };
  reader.readAsArrayBuffer(file);
}

/* ═══ LIVE RECORDING ═══ */
function startLiveRec(){
  if(liveRecording)return;
  if(!liveDest){
    liveDest=ctx.createMediaStreamDestination();
    limiter.connect(liveDest);
  }
  liveChunks=[];
  try{liveRecorder=new MediaRecorder(liveDest.stream,{mimeType:'audio/webm;codecs=opus'});}
  catch(e){try{liveRecorder=new MediaRecorder(liveDest.stream);}catch(e2){showToast('no recorder');return;}}
  liveRecorder.ondataavailable=function(e){if(e.data.size>0)liveChunks.push(e.data);};
  liveRecorder.onstop=function(){
    var blob=new Blob(liveChunks,{type:liveRecorder.mimeType||'audio/webm'});
    var ext=blob.type.indexOf('webm')>=0?'webm':'ogg';
    var a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download='synth-live.'+ext;a.click();URL.revokeObjectURL(a.href);
    showToast('live exported');
  };
  liveRecorder.start(100);
  liveRecording=true;
  renderTransport();
  showToast('live rec on');
}
function stopLiveRec(){
  if(!liveRecording||!liveRecorder)return;
  liveRecorder.stop();
  liveRecording=false;
  renderTransport();
}

/* ═══ PATTERN BANKS ═══ */
var BKEY='synth_bank_';
function saveBank(slot){
  var data={bpm:bpm,swing:swing,stepLen:stepLen,direction:direction,
    rootNote:rootNote,scaleIdx:scaleIdx,baseOctave:baseOctave,
    globalSoundKey:globalSoundKey,globalSoundName:globalSoundName,
    engCut:engCut,engRes:engRes,engAtk:engAtk,engDec:engDec,
    engSus:engSus,engRel:engRel,engVrb:engVrb,engDly:engDly,
    pattern:pattern.map(function(p){return Array.from(p);})
  };
  try{localStorage.setItem(BKEY+slot,JSON.stringify(data));}catch(e){}
  renderBankBtns();showToast('P'+(slot+1)+' saved');
}
function loadBank(slot){
  try{
    var raw=localStorage.getItem(BKEY+slot);if(!raw)return false;
    var data=JSON.parse(raw);
    if(playing)stopSeq();
    bpm=data.bpm||120;swing=data.swing||0;stepLen=data.stepLen||32;direction=data.direction||'fwd';
    rootNote=data.rootNote||0;scaleIdx=data.scaleIdx!==undefined?data.scaleIdx:1;
    baseOctave=data.baseOctave!==undefined?data.baseOctave:3;
    if(data.globalSoundKey&&libBuffers[data.globalSoundKey])
      setGlobalSound(data.globalSoundKey,data.globalSoundName,libBuffers[data.globalSoundKey]);
    engCut=data.engCut!==undefined?data.engCut:100;
    engRes=data.engRes!==undefined?data.engRes:0;
    engAtk=data.engAtk!==undefined?data.engAtk:27;
    engDec=data.engDec!==undefined?data.engDec:38;
    engSus=data.engSus!==undefined?data.engSus:100;
    engRel=data.engRel!==undefined?data.engRel:46;
    engVrb=data.engVrb!==undefined?data.engVrb:36;
    engDly=data.engDly!==undefined?data.engDly:0;
    for(var i=0;i<NUM;i++){
      if(!pattern[i])pattern[i]=new Uint8Array(32);
      for(var s=0;s<32;s++)pattern[i][s]=(data.pattern&&data.pattern[i])?data.pattern[i][s]||0:0;
    }
    curBank=slot;computePadNotes();applyEngine();syncDelay();
    bpmREl.value=bpm;bpmVEl.textContent=bpm;swgREl.value=swing;swgVEl.textContent=swing+'%';
    renderAll();return true;
  }catch(e){return false;}
}
function bankHasData(slot){try{return!!localStorage.getItem(BKEY+slot);}catch(e){return false;}}

/* ═══ RENDER ═══ */
var padEls=[],stepEls=[];

function renderPads(){
  pGridEl.innerHTML='';padEls=[];
  for(var i=0;i<NUM;i++){
    var el=document.createElement('div');
    el.className='pad'+(i===selPad?' sel':'');
    var noteName=midiToName(padNotes[i]);
    el.innerHTML='<span class="idx">'+(i+1)+'</span><span class="nm">'+noteName+'</span>'
      +'<span class="sub">'+globalSoundName+'</span>';
    (function(idx,padEl){
      padEl.addEventListener('pointerdown',function(e){
        e.preventDefault();padEl.setPointerCapture(e.pointerId);
        if(ctx.state==='suspended')ctx.resume();
        selPad=idx;noteOn(idx,e.pointerId);
        setGlow(padEl,e.pressure||0.5);
        renderPadSel();renderSteps();
      });
      padEl.addEventListener('pointermove',function(e){
        if(activeVoices[e.pointerId]&&activeVoices[e.pointerId].pad===idx)
          setGlow(padEl,e.pressure||0.5);
      });
      padEl.addEventListener('pointerup',function(e){noteOff(e.pointerId);clearGlow(padEl);});
      padEl.addEventListener('pointerleave',function(e){noteOff(e.pointerId);clearGlow(padEl);});
      padEl.addEventListener('pointercancel',function(e){noteOff(e.pointerId);clearGlow(padEl);});
    })(i,el);
    pGridEl.appendChild(el);padEls.push(el);
  }
}
function renderPadSel(){for(var i=0;i<padEls.length;i++)padEls[i].classList.toggle('sel',i===selPad);}

function renderSteps(){
  stepWEl.innerHTML='';stepEls=[];
  for(var s=0;s<stepLen;s++){
    var el=document.createElement('div');
    var on=pattern[selPad][s]>0;
    var multi=false;
    if(on)for(var p=0;p<NUM;p++){if(p!==selPad&&pattern[p][s]>0){multi=true;break;}}
    el.className='step'+(on?' on':'')+(s%4===0?' beat':'')+(multi?' multi':'');
    (function(idx){
      el.addEventListener('pointerdown',function(e){
        e.preventDefault();
        pattern[selPad][idx]=pattern[selPad][idx]?0:1;
        var isOn=pattern[selPad][idx]>0;
        var isMulti=false;
        if(isOn)for(var p=0;p<NUM;p++){if(p!==selPad&&pattern[p][idx]>0){isMulti=true;break;}}
        el.className='step'+(isOn?' on':'')+(idx%4===0?' beat':'')+(isMulti?' multi':'');
        refreshCellAt(selPad,idx);
      });
    })(s);
    stepWEl.appendChild(el);stepEls.push(el);
  }
}

function highlightStep(s){
  for(var i=0;i<stepEls.length;i++)stepEls[i].classList.remove('cur');
  if(s>=0&&s<stepEls.length){
    stepEls[s].classList.add('cur');
    var el=stepEls[s],w=stepWEl;
    if(el.offsetLeft<w.scrollLeft||el.offsetLeft+el.offsetWidth>w.scrollLeft+w.clientWidth)
      w.scrollLeft=el.offsetLeft-w.clientWidth/2+el.offsetWidth/2;
  }
}
function flashPadEl(idx){if(!padEls[idx])return;padEls[idx].classList.add('flash');setTimeout(function(){padEls[idx].classList.remove('flash');},80);}
function flashPadsAtStep(step){for(var p=0;p<NUM;p++)if(pattern[p][step])flashPadEl(p);}

/* ── GRID matrix (master loop) ── */
var matCells=[];  // matCells[pad][step] -> DOM element
var prevMatCol=-1;

function renderMatrix(){
  matrixEl.innerHTML='';matCells=[];prevMatCol=-1;
  for(var p=NUM-1;p>=0;p--){
    var row=document.createElement('div');
    row.className='m-row'+(p===selPad?' sel-row':'');
    var label=document.createElement('div');
    label.className='m-label';
    label.textContent=midiToName(padNotes[p]);
    (function(pi){
      label.addEventListener('pointerdown',function(e){
        e.preventDefault();selPad=pi;
        renderPadSel();renderSteps();updateMatrixSelRow();
        if(ctx.state==='suspended')ctx.resume();
        triggerNote(pi);
      });
    })(p);
    row.appendChild(label);
    matCells[p]=[];
    for(var s=0;s<stepLen;s++){
      var cell=document.createElement('div');
      cell.className='m-cell'+(pattern[p][s]?' on':'')+(s%4===0?' beat-col':'');
      (function(pi,si,el){
        el.addEventListener('pointerdown',function(e){
          e.preventDefault();e.stopPropagation();
          pattern[pi][si]=pattern[pi][si]?0:1;
          el.classList.toggle('on',!!pattern[pi][si]);
          if(pi===selPad)renderSteps();
          // audible feedback on tap
          if(pattern[pi][si]&&ctx.state!=='suspended')triggerNote(pi);
        });
      })(p,s,cell);
      row.appendChild(cell);
      matCells[p][s]=cell;
    }
    matrixEl.appendChild(row);
  }
}

function updateMatrixSelRow(){
  var rows=matrixEl.querySelectorAll('.m-row');
  for(var i=0;i<rows.length;i++){
    var pi=NUM-1-i;
    rows[i].classList.toggle('sel-row',pi===selPad);
  }
}

function highlightMatrixCol(s){
  if(prevMatCol>=0){
    for(var p=0;p<NUM;p++){
      if(matCells[p]&&matCells[p][prevMatCol])
        matCells[p][prevMatCol].classList.remove('cur-col');
    }
  }
  if(s>=0){
    for(var p=0;p<NUM;p++){
      if(matCells[p]&&matCells[p][s])
        matCells[p][s].classList.add('cur-col');
    }
  }
  prevMatCol=s;
}

// Refresh a single cell in matrix + step row (after recording writes a note)
function refreshCellAt(pad,step){
  if(matCells[pad]&&matCells[pad][step])
    matCells[pad][step].classList.toggle('on',!!pattern[pad][step]);
  if(pad===selPad&&stepEls[step]){
    var isOn=pattern[pad][step]>0;
    var isMulti=false;
    if(isOn)for(var p=0;p<NUM;p++){if(p!==pad&&pattern[p][step]>0){isMulti=true;break;}}
    stepEls[step].className='step'+(isOn?' on':'')+(step%4===0?' beat':'')+(isMulti?' multi':'');
  }
}

/* ── LAYERS rendering ── */
function renderLayers(){
  layersViewEl.innerHTML='';
  if(layers.length===0){
    layersViewEl.innerHTML='<div class="layer-empty">no layers yet \u2014 arm REC and play</div>';
    return;
  }
  for(var i=layers.length-1;i>=0;i--){
    var layer=layers[i];
    var strip=document.createElement('div');
    strip.className='layer-strip'+(layer.muted?' muted':'');
    var num=document.createElement('span');
    num.className='l-num';num.textContent='L'+(i+1);
    strip.appendChild(num);
    var bar=document.createElement('div');bar.className='l-bar';
    var stepMap=new Uint8Array(stepLen);
    for(var n=0;n<layer.notes.length;n++)stepMap[layer.notes[n].s]=1;
    for(var s=0;s<stepLen;s++){
      var cell=document.createElement('div');cell.className='l-cell'+(stepMap[s]?' on':'');
      if(stepMap[s])cell.style.background=layer.color;
      bar.appendChild(cell);
    }
    strip.appendChild(bar);
    var mute=document.createElement('button');mute.className='l-mute';
    mute.textContent=layer.muted?'ON':'MUTE';
    (function(idx){mute.addEventListener('pointerdown',function(e){
      e.preventDefault();e.stopPropagation();toggleLayerMute(idx);
    });})(i);
    strip.appendChild(mute);
    layersViewEl.appendChild(strip);
  }
}
function toggleLayerMute(idx){
  var layer=layers[idx];layer.muted=!layer.muted;
  for(var n=0;n<layer.notes.length;n++){
    var note=layer.notes[n];
    if(layer.muted){
      var hasOther=false;
      for(var li=0;li<layers.length;li++){
        if(li===idx||layers[li].muted)continue;
        for(var ni=0;ni<layers[li].notes.length;ni++){
          if(layers[li].notes[ni].p===note.p&&layers[li].notes[ni].s===note.s){hasOther=true;break;}}
        if(hasOther)break;
      }
      if(!hasOther)pattern[note.p][note.s]=0;
    } else {
      pattern[note.p][note.s]=1;
    }
    refreshCellAt(note.p,note.s);
  }
  renderLayers();
  if(viewMode!=='layers'){renderSteps();renderMatrix();}
}

function renderLenBtns(){
  lenGEl.innerHTML='';
  [8,16,32].forEach(function(n){
    var b=document.createElement('button');b.className='pbtn'+(n===stepLen?' on':'');b.textContent=n;
    b.addEventListener('pointerdown',function(e){e.preventDefault();if(playing)stopSeq();stepLen=n;renderLenBtns();renderSteps();renderMatrix();});

function renderBankBtns(){

});
libLoadEl.addEventListener('pointerdown',function(e){e.preventDefault();sampleInputEl.click();});
sampleInputEl.addEventListener('change',function(){if(sampleInputEl.files.length)handleSampleLoad(sampleInputEl.files[0]);sampleInputEl.value='';});
libXEl.addEventListener('pointerdown',function(e){e.preventDefault();closeLib();});
libOvEl.addEventListener('pointerdown',function(e){if(e.target===libOvEl)closeLib();});
shareBtnEl.addEventListener('pointerdown',function(e){
  e.preventDefault();
  if(navigator.share)navigator.share({title:'SYNTH \u2014 cbay.ing',url:location.href}).catch(function(){});
  else navigator.clipboard.writeText(location.href).then(function(){showToast('link copied');}).catch(function(){});
});

// Keyboard: 1-8 = pads 0-7, q-i = 8-15, a-k = 16-23, z-comma = 24-31
var KEY_MAP={
  '1':0,'2':1,'3':2,'4':3,'5':4,'6':5,'7':6,'8':7,
  'q':8,'w':9,'e':10,'r':11,'t':12,'y':13,'u':14,'i':15,
  'a':16,'s':17,'d':18,'f':19,'g':20,'h':21,'j':22,'k':23,
  'z':24,'x':25,'c':26,'v':27,'b':28,'n':29,'m':30,',':31
};
var keysDown={};
document.addEventListener('keydown',function(e){
  if(e.repeat||e.target.tagName==='INPUT')return;var k=e.key.toLowerCase();
  if(k===' '){e.preventDefault();if(playing)stopSeq();else startSeq();return;}
  if(KEY_MAP[k]!==undefined&&!keysDown[k]){
    keysDown[k]=true;if(ctx.state==='suspended')ctx.resume();
    var idx=KEY_MAP[k];selPad=idx;noteOn(idx,'kb_'+k);
    if(padEls[idx])setGlow(padEls[idx],0.7);
    renderPadSel();renderSteps();
    if(viewMode==='grid')updateMatrixSelRow();
  }
});
document.addEventListener('keyup',function(e){
  var k=e.key.toLowerCase();keysDown[k]=false;
  if(KEY_MAP[k]!==undefined){noteOff('kb_'+k);if(padEls[KEY_MAP[k]])clearGlow(padEls[KEY_MAP[k]]);}
});

/* ═══ INIT ═══ */
initLibrary();computePadNotes();
var dflt=LIB[1].sounds[0];
setGlobalSound(dflt.key,dflt.name,dflt.buffer);
applyEngine();syncDelay();
renderAll();

})();
</script>
