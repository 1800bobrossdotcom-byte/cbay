<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" width="640" height="400">
  <defs>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#060e0a"/>
      <stop offset="100%" stop-color="#040806"/>
    </linearGradient>
  </defs>
  <!-- phone frame -->
  <rect x="200" y="20" width="240" height="360" rx="20" fill="#0c1a12" stroke="#1a3a2a" stroke-width="1"/>
  <rect x="210" y="40" width="220" height="310" rx="4" fill="url(#screen)"/>
  <!-- waveform display area -->
  <rect x="225" y="55" width="190" height="100" rx="6" fill="#041a0e" stroke="#00FF9F" stroke-width="0.5" opacity="0.3"/>
  <!-- sine wave in display -->
  <path d="M230,105 C250,70 270,70 290,105 C310,140 330,140 350,105 C370,70 390,70 410,105" fill="none" stroke="#00FF9F" stroke-width="1.5" opacity="0.7"/>
  <!-- grid lines in display -->
  <g stroke="#00FF9F" stroke-width="0.3" opacity="0.15">
    <line x1="225" y1="80" x2="415" y2="80"/>
    <line x1="225" y1="105" x2="415" y2="105"/>
    <line x1="225" y1="130" x2="415" y2="130"/>
    <line x1="290" y1="55" x2="290" y2="155"/>
    <line x1="350" y1="55" x2="350" y2="155"/>
  </g>
  <!-- frequency label -->
  <text x="235" y="68" font-family="monospace" font-size="7" fill="#00FF9F" opacity="0.6">440 Hz</text>
  <text x="385" y="68" font-family="monospace" font-size="6" fill="#00FF9F" opacity="0.4">SINE</text>
  <!-- tone controls -->
  <g font-family="monospace" font-size="7" fill="#00FF9F" opacity="0.5">
    <text x="235" y="180">FREQ</text>
    <rect x="265" y="172" width="140" height="4" rx="2" fill="#0a2a1a"/>
    <rect x="265" y="172" width="80" height="4" rx="2" fill="#00FF9F" opacity="0.4"/>
    <circle cx="345" cy="174" r="5" fill="#00FF9F" opacity="0.6"/>
    <text x="235" y="205">AMP</text>
    <rect x="265" y="197" width="140" height="4" rx="2" fill="#0a2a1a"/>
    <rect x="265" y="197" width="105" height="4" rx="2" fill="#00FF9F" opacity="0.4"/>
    <circle cx="370" cy="199" r="5" fill="#00FF9F" opacity="0.6"/>
    <text x="235" y="230">DUR</text>
    <rect x="265" y="222" width="140" height="4" rx="2" fill="#0a2a1a"/>
    <rect x="265" y="222" width="60" height="4" rx="2" fill="#00FF9F" opacity="0.4"/>
    <circle cx="325" cy="224" r="5" fill="#00FF9F" opacity="0.6"/>
  </g>
  <!-- waveform selector buttons -->
  <g font-family="monospace" font-size="7" fill="#00FF9F" opacity="0.5">
    <rect x="230" y="250" width="40" height="20" rx="3" fill="#00FF9F" fill-opacity="0.15" stroke="#00FF9F" stroke-width="0.5"/>
    <text x="239" y="264">SINE</text>
    <rect x="278" y="250" width="40" height="20" rx="3" fill="none" stroke="#00FF9F" stroke-width="0.5" opacity="0.3"/>
    <text x="284" y="264">SAW</text>
    <rect x="326" y="250" width="40" height="20" rx="3" fill="none" stroke="#00FF9F" stroke-width="0.5" opacity="0.3"/>
    <text x="331" y="264">SQR</text>
    <rect x="374" y="250" width="40" height="20" rx="3" fill="none" stroke="#00FF9F" stroke-width="0.5" opacity="0.3"/>
    <text x="379" y="264">TRI</text>
  </g>
  <!-- play button -->
  <circle cx="320" cy="310" r="18" fill="none" stroke="#00FF9F" stroke-width="1" opacity="0.6"/>
  <polygon points="314,300 314,320 332,310" fill="#00FF9F" opacity="0.6"/>
  <!-- bottom bar -->
  <rect x="230" y="335" width="180" height="10" fill="#041a0e"/>
  <text x="240" y="343" font-family="monospace" font-size="6" fill="#00FF9F" opacity="0.4">TONES v1.0</text>
</svg>
