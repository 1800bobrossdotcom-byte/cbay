<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" width="640" height="400">
  <defs>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a060e"/>
      <stop offset="100%" stop-color="#060408"/>
    </linearGradient>
  </defs>
  <!-- phone frame -->
  <rect x="200" y="20" width="240" height="360" rx="20" fill="#140a1a" stroke="#2a1a3a" stroke-width="1"/>
  <rect x="210" y="40" width="220" height="310" rx="4" fill="url(#screen)"/>
  <!-- oscilloscope display -->
  <rect x="225" y="55" width="190" height="90" rx="6" fill="#0a041a" stroke="#A855F7" stroke-width="0.5" opacity="0.3"/>
  <!-- complex waveform -->
  <path d="M230,100 Q245,65 260,100 T290,100 Q305,80 320,100 Q335,120 350,90 Q365,60 380,100 Q395,110 410,100"
        fill="none" stroke="#A855F7" stroke-width="1.5" opacity="0.7"/>
  <!-- secondary waveform -->
  <path d="M230,100 C250,115 270,85 290,100 C310,115 330,85 350,100 C370,115 390,85 410,100"
        fill="none" stroke="#A855F7" stroke-width="0.8" opacity="0.3"/>
  <!-- grid in display -->
  <g stroke="#A855F7" stroke-width="0.3" opacity="0.1">
    <line x1="225" y1="77" x2="415" y2="77"/>
    <line x1="225" y1="100" x2="415" y2="100"/>
    <line x1="225" y1="123" x2="415" y2="123"/>
    <line x1="320" y1="55" x2="320" y2="145"/>
  </g>
  <text x="235" y="68" font-family="monospace" font-size="6" fill="#A855F7" opacity="0.5">OSC 1 + OSC 2</text>
  <!-- knob controls row -->
  <g opacity="0.5">
    <circle cx="260" cy="175" r="16" fill="none" stroke="#A855F7" stroke-width="1"/>
    <line x1="260" y1="163" x2="260" y2="159" stroke="#A855F7" stroke-width="1.5"/>
    <text x="248" y="200" font-family="monospace" font-size="6" fill="#A855F7" opacity="0.5">FREQ</text>
    <circle cx="320" cy="175" r="16" fill="none" stroke="#A855F7" stroke-width="1"/>
    <line x1="330" y1="163" x2="334" y2="159" stroke="#A855F7" stroke-width="1.5"/>
    <text x="308" y="200" font-family="monospace" font-size="6" fill="#A855F7" opacity="0.5">RESO</text>
    <circle cx="380" cy="175" r="16" fill="none" stroke="#A855F7" stroke-width="1"/>
    <line x1="372" y1="163" x2="368" y2="159" stroke="#A855F7" stroke-width="1.5"/>
    <text x="370" y="200" font-family="monospace" font-size="6" fill="#A855F7" opacity="0.5">MIX</text>
  </g>
  <!-- ADSR envelope -->
  <rect x="230" y="215" width="180" height="55" rx="4" fill="#0a041a" stroke="#A855F7" stroke-width="0.3" opacity="0.3"/>
  <text x="238" y="228" font-family="monospace" font-size="6" fill="#A855F7" opacity="0.4">ENVELOPE</text>
  <!-- ADSR shape -->
  <path d="M240,260 L260,235 L280,245 L340,245 L380,260" fill="none" stroke="#A855F7" stroke-width="1" opacity="0.5"/>
  <g font-family="monospace" font-size="5" fill="#A855F7" opacity="0.3">
    <text x="246" y="268">A</text>
    <text x="268" y="268">D</text>
    <text x="306" y="268">S</text>
    <text x="358" y="268">R</text>
  </g>
  <!-- filter type buttons -->
  <g font-family="monospace" font-size="6" fill="#A855F7" opacity="0.4">
    <rect x="230" y="280" width="35" height="16" rx="2" fill="#A855F7" fill-opacity="0.12" stroke="#A855F7" stroke-width="0.5"/>
    <text x="237" y="291">LPF</text>
    <rect x="270" y="280" width="35" height="16" rx="2" fill="none" stroke="#A855F7" stroke-width="0.3"/>
    <text x="277" y="291">HPF</text>
    <rect x="310" y="280" width="35" height="16" rx="2" fill="none" stroke="#A855F7" stroke-width="0.3"/>
    <text x="317" y="291">BPF</text>
    <rect x="350" y="280" width="60" height="16" rx="2" fill="none" stroke="#A855F7" stroke-width="0.3"/>
    <text x="357" y="291">NOTCH</text>
  </g>
  <!-- bottom bar -->
  <rect x="230" y="310" width="180" height="20" fill="#0a060e"/>
  <text x="240" y="324" font-family="monospace" font-size="7" fill="#A855F7" opacity="0.5">▶ PATCH 01</text>
  <text x="370" y="324" font-family="monospace" font-size="6" fill="#A855F7" opacity="0.35">TONE LAB</text>
</svg>
